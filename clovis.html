<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clovis</title>
<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />

  <style>
    *, *::before, *::after { 
      margin:0; 
      padding:0; 
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent !important; /* remove azul */
    }

    html, body { 
      width:100%; 
      height:100%; 
      overflow:hidden;
      background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
    }

    /* remove azul de foco */
    *:focus { outline:none !important; }

    /* remove flash azul do iOS */
    img, button {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    img:active, button:active {
      opacity: 1 !important; /* impede flash azul */
    }

    #myVideo {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      object-fit:cover; z-index:1;
    }

    #btn-play {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:10%; cursor:pointer; z-index:10; transition:opacity .3s;
    }

    #btn-idx {
      position:fixed; bottom:3.5%; right:3.4%;
      width:8%; cursor:pointer; z-index:10;
      opacity:0; pointer-events:none; transition:opacity .5s;
    }

    #btn-idx.show { opacity:1; pointer-events:all; }

    @media (max-width: 768px) {
      #btn-play { width:20%; }
      #btn-idx  { width:16%; }
    }

    @media (max-width: 480px) {
      #btn-play { width:28%; }
      #btn-idx  { width:22%; }
    }
  </style>
</head>

<body>

  <video id="myVideo" playsinline>
    <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/membros/clovis1.mp4">
  </video>

  <img id="btn-play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png" alt="Play" />
  <img id="btn-idx"  src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/botao%20(2).png" alt="Índice" />

  <script>
    var play = document.getElementById('btn-play');
    var vid  = document.getElementById('myVideo');
    var idx  = document.getElementById('btn-idx');

    play.onclick = function () {
  // 🔊 SOM — motor de avião de papel
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    // ruído de motor suave
    var buf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for(var i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.8;
    var noise = ctx.createBufferSource();
    noise.buffer = buf;
    
    var filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(400, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 1.5);
    
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(1.0, ctx.currentTime + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    noise.start();
    noise.stop(ctx.currentTime + 1.5);
  } catch(e) {}

  // ✈️ ANIMAÇÃO — inclina e levanta voo
  play.style.transition = 'transform 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 1.5s ease';
  play.style.transform = 'translate(150%, -120%) rotate(-25deg) scale(0.4)';
  play.style.opacity = '0';

  vid.play().catch(function(){
    vid.muted = true;
    vid.play();
  });
};

    vid.onended = function () {
      idx.classList.add('show');
    };

    idx.onclick = function () {
      window.location.href = 'indice.html?skip=1';
    };
  </script>
<script src="/notif.js"></script>
</body>
</html>
