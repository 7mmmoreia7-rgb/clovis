<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clovis</title>
 <link rel="icon" href="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/app%20nova/comuns/botao%20(2).png" />
<link rel="apple-touch-icon" href="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/app%20nova/comuns/botao%20(2).png" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #myVideo {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      object-fit:cover; z-index:1;
    }
    #btn-play {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:10%; cursor:pointer; z-index:10; transition:opacity .3s;
    }
    #btn-idx {
      position:fixed; bottom:10%; right:5%;
      width:8%; cursor:pointer; z-index:10;
      opacity:0; pointer-events:none; transition:opacity .5s;
    }
    #btn-idx.show { opacity:1; pointer-events:all; }

    @media (max-width: 768px) {
      #btn-play { width:20%; }
      #btn-idx  { width:16%; }
    }
    @media (max-width: 480px) {
      #btn-play { width:28%; }
      #btn-idx  { width:22%; }
    }
  </style>
</head>
<body>

  <video id="myVideo" playsinline>
    <source src="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/clovis1.mp4" type="video/mp4">
  </video>

  <img id="btn-play" src="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/app%20nova/comuns/play.png" alt="Play" />
  <img id="btn-idx"  src="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/app%20nova/comuns/botao%20(2).png" alt="Índice" />

  <script>
    var play = document.getElementById('btn-play');
    var vid  = document.getElementById('myVideo');
    var idx  = document.getElementById('btn-idx');

    play.onclick = function () {
      play.style.opacity = '0';
      play.style.pointerEvents = 'none';
      vid.play();
    };

    vid.onended = function () {
      idx.classList.add('show');
    };

    idx.onclick = function () {
      window.location.href = '/indice';
    };
  </script>

</body>
</html>
