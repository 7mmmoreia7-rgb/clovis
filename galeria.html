<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Galeria</title>

<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap');
:root{
  --vh: 1vh;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

#wrap{
  position:relative;
  width:100%;
  height:100%;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

#stage{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  background: url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

/* remover preto atrás do vídeo */
#vid{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  background:transparent;
  transition: opacity .6s ease;
}

/* PLAY */
#play{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:10%;
  cursor:pointer;
  z-index:1000;
  transition:opacity .4s;
  filter:
    drop-shadow(0 2px 4px rgba(0,0,0,0.35))
    drop-shadow(0 0 6px rgba(255,255,255,0.25));
}
#play.gone{opacity:0;pointer-events:none;}

#gbg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
  opacity:0;
  transition:opacity 1.4s ease;
}
#gbg.show{opacity:1;}

#slots{
  position:absolute;
  left:9.10%;
top:11.50%;
width:81.40%;
bottom:10.30%;

  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:0;
 
  z-index:5;
  opacity:0;
  transition:opacity 1.4s ease;
}
#slots.show{ opacity:1; }

/* Cada slot */
.slot{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
}

.slot img.m,
.slot video.m{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* Linhas horizontais */
#slots::before,
#slots::after{
  content:'';
  position:absolute;
  left:0;
  right:0;
  height:3px;               /* espessura da linha */
  background:#7a6245;       /* cor da linha */
  z-index:6;
}
#slots::before{ top:calc(100%/3); }
#slots::after{  top:calc(200%/3); }

/* Linhas verticais */
#vline1,
#vline2{
  position:absolute;
  top:0;
  bottom:0;
  width:3px;                /* espessura da linha */
  background:#7a6245;
  z-index:6;
  pointer-events:none;
}
#vline1{ left:calc(100%/3 - 1.5px); }
#vline2{ left:calc(200%/3 - 1.5px); }

/* BOTÃO ÍNDICE */
#btn-idx{
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:8%;
  cursor:pointer;
  z-index:900;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s;
  filter:
    drop-shadow(0 2px 4px rgba(0,0,0,0.35))
    drop-shadow(0 0 6px rgba(255,255,255,0.25));
}
#btn-idx.show{opacity:1;pointer-events:all;}

/* SKIP */
#btn-skip{
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:8%;
  cursor:pointer;
  z-index:800;
  border:none;
  background:transparent;
  padding:0;
  opacity:1;
  pointer-events:all;
  transition:opacity .4s;
}
#btn-skip img{
  width:100%;
  height:auto;
  display:block;
  filter:
    drop-shadow(0 2px 4px rgba(0,0,0,0.35))
    drop-shadow(0 0 6px rgba(255,255,255,0.25));
}
#btn-skip:hover img{
  content:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/ok-vai-mesmo.png");
}

.gone{
  opacity:0 !important;
  pointer-events:none !important;
}

/* IMPORTS — ADICIONADOS */
.slot-add{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  transition:background .2s;
}
.slot-add:hover{background:rgba(0,0,0,.08);}
.slot-add svg{width:8%;min-width:18px;max-width:44px;opacity:.15;}
.slot-add span{
  font-family:sans-serif;
  font-size:clamp(8px,1.1vw,15px);
  font-weight:600;
  margin-top:5px;
  color:rgba(80,65,50,.3);
}

.slot-ctrl{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;justify-content:center;gap:4px;
  padding:4px 6px;
  background:linear-gradient(transparent,rgba(0,0,0,.65));
  opacity:0;transition:opacity .25s;z-index:5;
}
.slot:hover .slot-ctrl{opacity:1;}

.sc{
  background:rgba(255,255,255,.22);
  border:none;border-radius:5px;
  color:#fff;cursor:pointer;padding:4px 8px;
  font-family:sans-serif;
  font-size:clamp(8px,.9vw,12px);
  font-weight:600;
  display:flex;align-items:center;gap:3px;
  transition:background .15s;
}
.sc:hover{background:rgba(255,255,255,.38);}

/* FULLSCREEN */
#fsmod {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 100;
  background: url(https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/fundilho.png) center/cover;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

#fsmod.on {
  display: flex;
}

/* FULLSCREEN CONTENT */
#fscont {
  width: 100%;
  height: calc(100% - 60px);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* MEDIA */
#fscont img,
#fscont video {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
  display: block;
  border-radius: 8px;
  background: transparent !important;
}

/* REMOVE INTERAÇÃO DO MEDIA */
#fscont img {
  pointer-events: none;
}

#fscont video {
  pointer-events: auto;
}

/* Barra de botões */
#fsbar {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 9999;
}

/* Botões mais pequenos (reduz ~3–4 cm visualmente) */
.fsbtn {
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
  border-radius: 8px;
  padding: 8px 14px; /* ← diminuir aqui reduz o tamanho */
  font-family: sans-serif;
  font-size: clamp(10px, 0.9vw, 13px); /* ← reduz ainda mais */
  font-weight: 600;
  cursor: pointer;
  transition: background .2s;
  transform: scale(1); /* ← isto reduz ~3–4 cm visualmente */
}

.fsbtn:hover {
  background: rgba(255,255,255,.32);
}



/* TOAST */
#toast{
  position:absolute;
  bottom:3%;
  left:50%;
  transform:translateX(-50%) translateY(40px);
  background:rgba(10,10,10,.92);
  color:#fff;
  padding:10px 20px;
  border-radius:22px;
  opacity:0;
  transition:.4s;
}
#toast.on{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}
  #fscont video {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
}

#fsbar {
  z-index: 9999;
}

#btn-idx.gone {
  display: none !important;
}
/* Remove a caixa preta e o estilo nativo do player */
#fscont video {
  background: transparent !important;
  width: auto !important;
  height: auto !important;
  max-width: 90% !important;
  max-height: 90% !important;
  object-fit: contain !important;
  border: none !important;
  outline: none !important;
}

/* Remove a moldura e a caixa dos comandos */
#fscont video::-webkit-media-controls-enclosure {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  width: auto !important;
  margin: 0 auto !important;
  padding: 0 !important;
}

/* Reduz a barra de comandos sem mexer no vídeo */
#fscont video::-webkit-media-controls-panel {
  transform: scale(0.85);
  transform-origin: bottom center;
  background: rgba(0,0,0,0.2) !important; /* podes pôr transparente */
  border-radius: 8px;
}
/* REMOVE COMPLETAMENTE O RETÂNGULO ESCURO DO PLAYER NATIVO */
#fscont video::-webkit-media-controls-enclosure {
  background: transparent !important;
  box-shadow: none !important;
  border: none !important;
  outline: none !important;
}

/* REMOVE O FUNDO ESCURO POR TRÁS DOS COMANDOS */
#fscont video::-webkit-media-controls-panel {
  background: transparent !important;
}

/* GARANTE QUE O VÍDEO NÃO GANHA FUNDO PRETO */
#fscont video {
  background: transparent !important;
}
@media (max-width: 1024px) and (orientation: portrait){

#slots{
  position:absolute;
  left:9.2%;
  right:9.5%;
  top:9.5%;
  bottom:9.5%;

  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);

  z-index:5;
  opacity:0;
  transition:opacity 1.4s ease;
}
  }
</style>
</head>

<body>

<div id="wrap">
  <div id="stage">

   <video
  id="vid"
  src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/galeria/galeria.mp4"
  poster="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png"
  preload="auto"
  playsinline>
</video>

    <img id="play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

    <img id="gbg" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/galeria/isto%20n%C3%A3o%20%C3%A9%20para%20todos.png">

<div id="slots">

  <!-- LINHAS VERTICAIS -->
  <div id="vline1"></div>
  <div id="vline2"></div>

  <!-- AS 9 SLOTS -->
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>

</div>

    <div id="fsmod">
      <div id="fscont"></div>
      <div id="fsbar">
        <button class="fsbtn" id="fscls">✕ Fechar</button>
        <button class="fsbtn" id="fsdl">💾 Guardar</button>
      </div>
    </div>

    <div id="toast"></div>

  </div>
</div>

<img id="btn-idx" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/botao%20(2).png">

<button id="btn-skip">
  <img src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/vai-l-eu-deixo.png">
</button>

<input type="file" id="fsin" accept="image/*,video/*" style="display:none">

<script>
/* ------------------------------
   CONFIG WORKER / R2
--------------------------------*/
const API_BASE = "https://hidden-hall-2a03.7mmmoreia7.workers.dev";
const FILE_URL = API_BASE + "/file?key=";

/* ------------------------------
   ELEMENTOS
--------------------------------*/
const vid = document.getElementById("vid");
const play = document.getElementById("play");
const btnSkip = document.getElementById("btn-skip");
const gbg = document.getElementById("gbg");
const slots = document.getElementById("slots");
const btnIdx = document.getElementById("btn-idx");
const fsin = document.getElementById("fsin");

const fsmod = document.getElementById("fsmod");
const fscont = document.getElementById("fscont");
const fscls = document.getElementById("fscls");
const fsdl = document.getElementById("fsdl");

/* ------------------------------
   DADOS + PERSISTÊNCIA
--------------------------------*/
let data = Array(9).fill(null).map(() => ({ url: null, key: null }));
let activeSlot = null;

async function saveState() {
  await fetch(API_BASE + "/save-gallery", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });
}

async function loadState() {
  const res = await fetch(API_BASE + "/load-gallery", {
    cache: "no-store"
  });

  console.log("load-gallery status:", res.status);

  const json = await res.json();
  console.log("galeria recebida:", json);

  if (Array.isArray(json)) {
    data = Array(9).fill(null).map((_, i) => {
      const x = json[i] || {};

      return {
        key: x.key || null,
        url: x.url || (
          x.key
            ? API_BASE + "/file?key=" + encodeURIComponent(x.key)
            : null
        )
      };
    });
  }
}
/* ------------------------------
   PLAY / SKIP
--------------------------------*/
play.onclick = () => {
  play.classList.add("gone");
  btnSkip.classList.add("gone");

  vid.style.opacity = "1";

  vid.play().catch(() => {
    vid.muted = true;
    vid.play();
  });
};

btnSkip.onclick = () => {
  play.classList.add("gone");
  btnSkip.classList.add("gone");
  vid.pause();

  if (!isNaN(vid.duration)) {
    vid.currentTime = vid.duration;
  }

  goGallery();
};

vid.onended = () => goGallery();

/* ------------------------------
   MOSTRAR GALERIA
--------------------------------*/
function goGallery() {
  vid.pause();
  vid.style.opacity = "0";

  gbg.classList.add("show");
  slots.classList.add("show");
  btnIdx.classList.add("show");
}

/* ------------------------------
   TOAST
--------------------------------*/
let tt;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("on");
  clearTimeout(tt);
  tt = setTimeout(() => t.classList.remove("on"), 2600);
}

/* ------------------------------
   BUILD DAS SLOTS
--------------------------------*/
function build() {
  slots.innerHTML = `
    <div id="vline1"></div>
    <div id="vline2"></div>
  `;

  data.forEach((s, idx) => {
    const d = document.createElement("div");
    d.className = "slot";

    const url = s?.url || "";
    const key = s?.key || "";

    const hasMedia = url.trim() !== "" || key.trim() !== "";

    if (!hasMedia) {
      d.innerHTML = `
        <div class="slot-add" onclick="openImport(${idx})">
          <svg viewBox="0 0 24 24">
            <path fill="currentColor" d="M12 5v14m-7-7h14"/>
          </svg>
          <span>Adicionar</span>
        </div>
      `;
    } else {
      const mediaRef = url || (API_BASE + "/file?key=" + encodeURIComponent(key));

      const isVideo =
        /\.mp4|\.mov|\.webm|\.mkv|\.avi/i.test(key) ||
        /\.mp4|\.mov|\.webm|\.mkv|\.avi/i.test(url);

      if (isVideo) {
        d.innerHTML = `
          <video
            class="m"
            src="${mediaRef}"
            muted
            playsinline
            preload="metadata"
            onerror="this.parentElement.innerHTML=
              '<div class=slot-add onclick=openImport(${idx})>\
              <svg viewBox=0 0 24 24>\
              <path fill=currentColor d=\'M12 5v14m-7-7h14\'/>\
              </svg><span>Adicionar</span></div>';">
          </video>
        `;
      } else {
        d.innerHTML = `
          <img
            class="m"
            src="${mediaRef}"
            loading="lazy"
            onerror="this.parentElement.innerHTML=
              '<div class=slot-add onclick=openImport(${idx})>\
              <svg viewBox=0 0 24 24>\
              <path fill=currentColor d=\'M12 5v14m-7-7h14\'/>\
              </svg><span>Adicionar</span></div>';">
        `;
      }

      d.innerHTML += `
        <div class="slot-ctrl">
          <button class="sc" onclick="verSlot(${idx})">👁 Ver</button>
          <button class="sc" onclick="apagarSlot(${idx})">🗑 Apagar</button>
        </div>
      `;
    }

    slots.appendChild(d);
  });

  lazyVideos();
}

/* ------------------------------
   IMPORTAR
--------------------------------*/
function openImport(idx) {
  activeSlot = idx;
  fsin.value = "";
  fsin.click();
}

fsin.onchange = () => {
  const f = fsin.files[0];
  if (!f || activeSlot === null) return;

  if (f.type === "image/gif") {
    alert("❌ GIFs são pesados 😬\nUsa vídeo (.mp4)");
    return;
  }

  uploadStorage(f, activeSlot);
};

/* ------------------------------
   UPLOAD (via Worker)
--------------------------------*/
function uploadStorage(file, slot) {
  toast("A enviar...");

  const form = new FormData();
  form.append("file", file);

  fetch(API_BASE + "/upload", {
    method: "POST",
    body: form,
  })
    .then((r) => r.json())
    .then(async (res) => {
      if (!res.ok || !res.key) throw new Error("Upload falhou");

      const key = res.key;
      const url = API_BASE + "/file?key=" + encodeURIComponent(key);

      data[slot] = { url, key };

await saveState();
build();
toast("✓ Guardado!");
    })
    .catch(() => toast("Erro no upload"));
}

/* ------------------------------
   FULLSCREEN
--------------------------------*/
function verSlot(idx) {
  const s = data[idx];
  if (!s || !s.url) return;

  fscont.innerHTML = "";
  btnIdx.classList.add("gone");

  const isVideo = s.url.match(/\.(mp4|mov|webm|mkv|avi)$/i);

  if (isVideo) {
    const v = document.createElement("video");
    v.src = s.url;
    v.controls = true;
    v.playsInline = true;

    fscont.appendChild(v);

    v.load();
    v.play().catch(() => {});

    const enableSound = () => {
      v.muted = false;
      v.volume = 1;
      v.play().catch(() => {});
    };

    v.addEventListener("click", enableSound);
    v.addEventListener("touchstart", enableSound);

  } else {
    const img = document.createElement("img");
    img.src = s.url;
    fscont.appendChild(img);
  }

  fsmod.classList.add("on");
}
/* ------------------------------
   DOWNLOAD (Guardar no dispositivo)
--------------------------------*/
fsdl.onclick = async (e) => {
  e.preventDefault();
  e.stopPropagation();

  const el = fscont.querySelector("img,video");
  if (!el) return;

  try {
    const res = await fetch(el.src);
    const blob = await res.blob();

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "media";

    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);

  } catch (err) {
    console.error(err);
    toast("Erro ao descarregar");
  }
};

/* ------------------------------
   APAGAR PERMANENTE
--------------------------------*/
function apagarSlot(idx) {
  const s = data[idx];
  if (!s || !s.key) return;

  toast("A apagar...");

  fetch(API_BASE + "/file?key=" + encodeURIComponent(s.key), {
    method: "DELETE",
  })
    .then((r) => {
      if (!r.ok) throw new Error();
      data[idx] = { url: null, key: null };
      saveState();
      build();
      toast("✓ Apagado!");
    })
    .catch(() => toast("Erro ao apagar"));
}

/* ------------------------------
   BOTÃO ÍNDICE
--------------------------------*/
btnIdx.onclick = () => {
  window.location.href = "indice.html?skip=1";
};

/* ------------------------------
   INICIAR
--------------------------------*/
  function lazyVideos(){
  const vids = document.querySelectorAll("video.m");

  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const v = e.target;
        v.play().catch(()=>{});
        obs.unobserve(v);
      }
    });
  }, { threshold: 0.5 });

  vids.forEach(v=>obs.observe(v));
}
(async () => {
  await loadState();
  build();
  lazyVideos();
})();
  function setVH(){
  document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
}

setVH();
window.addEventListener('resize', setVH);
  fscls.onclick = (e) => {
  e.stopPropagation();

  const v = fscont.querySelector("video");

  if (v) {
    v.pause();
    v.src = "";
    v.load();
  }

  fscont.innerHTML = "";
  fsmod.classList.remove("on");
  btnIdx.classList.remove("gone");
};

fsmod.onclick = (e) => {
  if (e.target === fsmod) {
    fscls.onclick(e);
  }
};
</script>

</body>
</html>
