<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}

#wrap{
  width:100%;
  height:100%;
  position:relative;
  background:#000;
}

#stage{
  width:100%;
  height:100%;
  position:relative;
  overflow:hidden;
}

/* VÍDEO FULLSCREEN */
#vid{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

#play{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:10%;
  cursor:pointer;
  z-index:10;
  transition:opacity .5s;
}
#play.gone{opacity:0;pointer-events:none;}

#gbg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
  opacity:0;
  transition:opacity 1.4s ease;
  pointer-events:none;
}
#gbg.show{opacity:1;}

/* SLOTS */
#slots{
  position:absolute;
  left:9.6875%;
  top:14.8148%;
  width:80.3125%;
  height:70.0926%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  z-index:5;
  opacity:0;
  pointer-events:none;
  transition:opacity 1.4s ease;
}
#slots.show{opacity:1;pointer-events:auto;}

.slot{
  position:relative;
  overflow:hidden;
  background:transparent;
}

.slot img.m{
  width:100%;
  height:100%;
  object-fit:cover; /* SLOT TOTALMENTE PREENCHIDO */
  background:transparent;
}

/* ADICIONAR */
.slot-add{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.slot-add svg{width:40px;opacity:.2;}
.slot-add span{color:#aaa;font-size:14px;margin-top:5px;}

/* CONTROLOS */
.slot-ctrl{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  gap:6px;
  padding:6px;
  background:linear-gradient(transparent,rgba(0,0,0,.7));
  opacity:0;
  transition:opacity .25s;
}
.slot:hover .slot-ctrl{opacity:1;}

.sc{
  background:rgba(255,255,255,.25);
  border:none;
  padding:5px 10px;
  border-radius:5px;
  color:#fff;
  cursor:pointer;
  font-size:12px;
}

/* BOTÃO ÍNDICE */
#btn-idx{
  position:absolute;
  bottom:5%;
  right:3%;
  width:8%;
  cursor:pointer;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s;
  z-index:10;
}
#btn-idx.show{opacity:1;pointer-events:auto;}

/* FULLSCREEN REAL */
#fsmod{
  position:absolute;
  inset:0;
  display:none;
  background:#000;
  z-index:100;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#fsmod.on{display:flex;}

#fscont{
  width:100%;
  height:100%;
}

#fscont img{
  width:100%;
  height:100%;
  object-fit:cover; /* FULLSCREEN TOTALMENTE PREENCHIDO */
}

/* BARRA FULLSCREEN */
#fsbar{
  position:absolute;
  bottom:20px;
  display:flex;
  gap:10px;
}

.fsbtn{
  background:rgba(255,255,255,.25);
  border:1px solid rgba(255,255,255,.4);
  padding:10px 20px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  font-size:16px;
}

/* TOAST */
#toast{
  position:absolute;
  bottom:3%;
  left:50%;
  transform:translateX(-50%) translateY(40px);
  background:rgba(0,0,0,.85);
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:.4s;
}
#toast.on{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>
<div id="wrap">
  <div id="stage">

    <video id="vid" src="https://res.cloudinary.com/dxdemxfpe/video/upload/v1773223413/galeria_l9s4l4.mp4" preload="auto" playsinline></video>

    <img id="play" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1772958888/26_ujjdad.png">

    <img id="gbg" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773593841/isto_n%C3%A3o_%C3%A9_para_todos_2_nrkc13.png">

    <div id="slots"></div>

    <img id="btn-idx" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png">

    <div id="fsmod">
      <div id="fscont"></div>
      <div id="fsbar">
        <button class="fsbtn" id="fscls">✕ Fechar</button>
        <button class="fsbtn" id="fsdl">💾 Guardar</button>
      </div>
    </div>

    <div id="toast"></div>

  </div>
</div>

<input type="file" id="fsin" accept="image/*" style="display:none">

<script>
/* --- O TEU JS ORIGINAL, APENAS COM AJUSTES DE FULLSCREEN --- */

const SURL='https://itqzgxotbzsuwevjpnoi.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';
const HDR={'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=representation'};
const HDRD={'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=minimal'};
const STORAGE_URL=SURL+'/storage/v1/object/public/galeria/';
const STORAGE_UP=SURL+'/storage/v1/object/galeria/';
const SHDR={'apikey':SKEY,'Authorization':'Bearer '+SKEY};

var data=[];
for(var i=0;i<9;i++)data.push({url:null,name:null,id:null,path:null});
var fsSlot=null,activeSlot=null;

/* PLAY */
var vid=document.getElementById('vid');
document.getElementById('play').onclick=function(){
  this.classList.add('gone');
  vid.play().catch(()=>{vid.muted=true;vid.play();});
};

vid.addEventListener('dblclick',goGallery);
vid.addEventListener('ended',goGallery);

/* GALERIA */
function goGallery(){
  vid.pause();
  vid.style.opacity='0';
  document.getElementById('gbg').classList.add('show');
  document.getElementById('slots').classList.add('show');
  document.getElementById('btn-idx').classList.add('show');
  carregarGaleria();
}

function carregarGaleria(){
  fetch(SURL+'/rest/v1/galeria?order=created_at.asc',{headers:HDR})
  .then(r=>r.json())
  .then(rows=>{
    data=[];
    for(var i=0;i<9;i++)data.push({url:null,name:null,id:null,path:null});
    rows.forEach((row,i)=>{
      if(i<9 && row.imagem){
        data[i]={url:row.imagem,name:'imagem_'+row.id+'.jpg',id:row.id,path:row.path};
      }
    });
    build();
  });
}

function build(){
  var c=document.getElementById('slots');
  c.innerHTML='';
  for(let i=0;i<9;i++){
    let s=data[i];
    let d=document.createElement('div');
    d.className='slot';

    if(s.url){
      let img=document.createElement('img');
      img.src=s.url;
      img.className='m';
      d.appendChild(img);

      let ctrl=document.createElement('div');
      ctrl.className='slot-ctrl';

      let ver=document.createElement('button');
      ver.className='sc';
      ver.textContent='👁 Ver';
      ver.onclick=e=>{e.stopPropagation();openFS(i);};
      ctrl.appendChild(ver);

      let dl=document.createElement('button');
      dl.className='sc';
      dl.textContent='💾 Guardar';
      dl.onclick=e=>{e.stopPropagation();guardarSlot(i);};
      ctrl.appendChild(dl);

      d.appendChild(ctrl);

    } else {
      let add=document.createElement('div');
      add.className='slot-add';
      add.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke="white"/></svg><span>Adicionar</span>';
      add.onclick=()=>{activeSlot=i;document.getElementById('fsin').click();};
      d.appendChild(add);
    }

    c.appendChild(d);
  }
}

/* FULLSCREEN */
function openFS(i){
  fsSlot=i;
  let fc=document.getElementById('fscont');
  fc.innerHTML='';
  let img=document.createElement('img');
  img.src=data[i].url;
  fc.appendChild(img);
  document.getElementById('fsmod').classList.add('on');
}

document.getElementById('fscls').onclick=function(){
  document.getElementById('fsmod').classList.remove('on');
};

document.getElementById('fsdl').onclick=function(){
  if(fsSlot===null)return;
  guardarSlot(fsSlot);
};

/* DOWNLOAD */
function guardarSlot(i){
  let s=data[i];
  fetch(s.url)
  .then(r=>r.blob())
  .then(blob=>{
    let a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=s.name;
    a.click();
  });
}

/* UPLOAD */
document.getElementById('fsin').onchange=function(){
  let f=this.files[0];
  if(!f)return;
  uploadStorage(f,activeSlot);
};

function uploadStorage(file,slot){
  let path='img_'+slot+'_'+Date.now()+'.jpg';
  let reader=new FileReader();
  reader.onload=function(e){
    let img=new Image();
    img.onload=function(){
      let canvas=document.createElement('canvas');
      canvas.width=img.width;
      canvas.height=img.height;
      canvas.getContext('2d').drawImage(img,0,0);
      canvas.toBlob(blob=>{
        fetch(STORAGE_UP+path,{
          method:'POST',
          headers:Object.assign({'Content-Type':'image/jpeg','x-upsert':'true'},SHDR),
          body:blob
        }).then(()=>{
          let url=STORAGE_URL+path;
          data[slot]={url:url,name:file.name,id:null,path:path};
          build();
        });
      },'image/jpeg',0.92);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ÍNDICE */
document.getElementById('btn-idx').onclick=function(){
  window.location.href='/indice';
};
</script>
</body>
</html>
