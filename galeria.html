<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Galeria</title>

<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;

  /* 💣 FIX FLASH PRETO */
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

#wrap,#stage{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;

  /* 💣 FIX FLASH PRETO */
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

/* VIDEO */
#vid{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* PLAY */
#play{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:10%;
  cursor:pointer;
  z-index:1000;
}

#play.gone{opacity:0;pointer-events:none;}

/* GALERIA BACKGROUND */
#gbg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
  opacity:0;
  transition:opacity 1s ease;
}

#gbg.show{opacity:1;}

/* SLOTS */
#slots{
  position:absolute;
  left:9.2%;
  right:9.5%;
  top:8.87%;
  bottom:7.70%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  z-index:5;
  opacity:0;
  transition:opacity 1s ease;
}

#slots.show{opacity:1;}

.slot{position:relative;overflow:hidden;}
.slot img,.slot video{width:100%;height:100%;object-fit:cover}

/* FULLSCREEN */
#fsmod{
  display:none;
  position:absolute;
  inset:0;
  z-index:100;
  background:url(https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/fundilho.png) center/cover;
  align-items:center;
  justify-content:center;
}

#fsmod.on{display:flex;}

#fscont{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* VIDEO FULLSCREEN FIX */
#fscont video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

/* BOTÃO */
#btn-idx{
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:8%;
  opacity:0;
  pointer-events:none;
}

#btn-idx.show{
  opacity:1;
  pointer-events:all;
}

</style>
</head>

<body>

<div id="wrap">
  <div id="stage">

    <video id="vid" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/galeria/galeria.mp4" playsinline></video>

    <img id="play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

    <img id="gbg" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/galeria/galeria.png">

    <div id="slots"></div>

    <div id="fsmod">
      <div id="fscont"></div>
    </div>

  </div>
</div>

<img id="btn-idx">

<script>

let currentVideo = null;

const vid = document.getElementById("vid");
const play = document.getElementById("play");
const gbg = document.getElementById("gbg");
const slots = document.getElementById("slots");
const fsmod = document.getElementById("fsmod");
const fscont = document.getElementById("fscont");
const btnIdx = document.getElementById("btn-idx");

/* PLAY */
play.onclick = () => {
  play.classList.add("gone");
  vid.play().catch(()=>{});
};

/* TRANSIÇÃO SEM FLASH */
vid.onended = () => {
  vid.style.opacity = "0";

  setTimeout(() => {
    gbg.classList.add("show");
    slots.classList.add("show");
    btnIdx.classList.add("show");
  }, 120);
};

/* FULLSCREEN */
function verSlot(idx){
  const v = document.createElement("video");

  currentVideo = v;

  v.src = data[idx].url;
  v.controls = true;
  v.playsInline = true;
  v.preload = "auto";

  fscont.innerHTML = "";
  fscont.appendChild(v);

  fsmod.classList.add("on");
}

/* FECHAR FULLSCREEN */
fsmod.onclick = () => {
  fsmod.classList.remove("on");

  if(currentVideo){
    currentVideo.pause();
    currentVideo.remove();
    currentVideo = null;
  }

  fscont.innerHTML = "";
};

</script>

</body>
</html>
