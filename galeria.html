<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Galeria</title>

<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

/* WRAP */
#wrap{
  position:relative;
  width:100%;
  height:100%;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

#stage{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
}

/* VIDEO INICIAL */
#vid{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
  transition:opacity .2s ease;
}

/* PLAY */
#play{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:10%;
  cursor:pointer;
  z-index:1000;
  transition:opacity .4s;
}
#play.gone{opacity:0;pointer-events:none;}

/* SKIP (MANTIDO COMO TINHAS) */
#btn-skip{
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:8%;
  cursor:pointer;
  z-index:800;
  border:none;
  background:transparent;
}
#btn-skip img{
  width:100%;
  display:block;
}
#btn-skip:hover img{
  content:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/ok-vai-mesmo.png");
}

/* GALERIA */
#gbg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
  opacity:0;
  transition:opacity 1.2s ease;
}
#gbg.show{opacity:1;}

#slots{
  position:absolute;
  left:9.2%;
  right:9.5%;
  top:8.87%;
  bottom:7.70%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  z-index:5;
  opacity:0;
  transition:opacity 1.2s ease;
}
#slots.show{opacity:1;}

.slot{position:relative;overflow:hidden;}

.slot img,.slot video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BOTÃO ÍNDICE */
#btn-idx{
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:8%;
  cursor:pointer;
  z-index:900;
  opacity:0;
  pointer-events:none;
}
#btn-idx.show{opacity:1;pointer-events:all;}

/* FULLSCREEN */
#fsmod{
  display:none;
  position:absolute;
  inset:0;
  z-index:100;
  background:url(https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/fundilho.png) center/cover;
  align-items:center;
  justify-content:center;
}
#fsmod.on{display:flex;}

#fscont{
  width:100%;
  height:calc(100% - 60px);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* VIDEO FULLSCREEN (SEM BLOQUEAR CLIQUE NO CONTROLO) */
#fscont video,
#fscont img{
  max-width:90%;
  max-height:90%;
  object-fit:contain;
}

/* CONTROLOS */
#fsbar{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
}

.fsbtn{
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* TOAST */
#toast{
  position:absolute;
  bottom:3%;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.8);
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}
#toast.on{opacity:1;}
</style>
</head>

<body>

<div id="wrap">
  <div id="stage">

    <video id="vid" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/galeria/galeria.mp4" playsinline preload="auto"></video>

    <img id="play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

    <img id="gbg" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/galeria/galeria.png">

    <div id="slots"></div>

    <img id="btn-idx" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/botao%20(2).png">

    <button id="btn-skip">
      <img src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/vai-l-eu-deixo.png">
    </button>

    <div id="fsmod">
      <div id="fscont"></div>
      <div id="fsbar">
        <button class="fsbtn" id="fscls">Fechar</button>
      </div>
    </div>

    <div id="toast"></div>

  </div>
</div>

<script>
const vid = document.getElementById("vid");
const play = document.getElementById("play");
const btnSkip = document.getElementById("btn-skip");
const gbg = document.getElementById("gbg");
const slots = document.getElementById("slots");
const btnIdx = document.getElementById("btn-idx");

const fsmod = document.getElementById("fsmod");
const fscont = document.getElementById("fscont");
const fscls = document.getElementById("fscls");

let currentVideo = null;

/* PLAY */
play.onclick = () => {
  play.classList.add("gone");
  btnSkip.classList.add("gone");

  vid.play().catch(() => {
    vid.muted = true;
    vid.play();
  });
};

/* SKIP (CORRIGIDO E CONSISTENTE) */
btnSkip.onclick = () => {
  play.classList.add("gone");
  btnSkip.classList.add("gone");

  vid.pause();
  vid.currentTime = vid.duration;
  vid.style.opacity = "0";

  setTimeout(goGallery, 150);
};

/* FIM DO VÍDEO */
vid.onended = () => {
  vid.style.opacity = "0";
  goGallery();
};

/* GALERIA */
function goGallery(){
  gbg.classList.add("show");
  slots.classList.add("show");
  btnIdx.classList.add("show");
}

/* FULLSCREEN */
function verSlot(url){
  fscont.innerHTML = "";

  const v = document.createElement("video");
  v.src = url;
  v.controls = true;
  v.playsInline = true;

  fscont.appendChild(v);

  fsmod.classList.add("on");
}

fscls.onclick = () => {
  fsmod.classList.remove("on");
  fscont.innerHTML = "";
};

</script>

</body>
</html>
