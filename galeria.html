<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria</title>
<style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;}

    #wrap{width:100%;height:100%;position:relative;background:#000;}
    #stage{width:100%;height:100%;position:relative;overflow:hidden;}

    #vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
    #play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:10%;cursor:pointer;z-index:10;transition:opacity .5s;}
    #play.gone{opacity:0;pointer-events:none;}

    #gbg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;opacity:0;transition:opacity 1.4s ease;pointer-events:none;}
    #gbg.show{opacity:1;}

    /* Slots - preenchimento total */
    #slots{
        position:absolute;
        left:9.6875%; top:14.8148%;
        width:80.3125%; height:70.0926%;
        display:grid;
        grid-template-columns:repeat(3,1fr);
        grid-template-rows:repeat(3,1fr);
        gap:0;
        z-index:5;
        opacity:0;
        pointer-events:none;
        transition:opacity 1.4s ease;
    }
    #slots.show{opacity:1; pointer-events:all;}

    /* LINHAS - corrigidas para chegar exactamente à moldura colorida */
    #slots::before{
        content:''; position:absolute; left:0; right:0; top:33.333%;
        height:3px; background:#7a6245; z-index:6; pointer-events:none;
    }
    #slots::after{
        content:''; position:absolute; left:0; right:0; top:66.666%;
        height:3px; background:#7a6245; z-index:6; pointer-events:none;
    }
    #vline1, #vline2{
        position:absolute; 
        top:-3px;          /* estende um pouco para cima */
        bottom:-3px;       /* estende um pouco para baixo */
        width:3px;
        background:#7a6245; 
        z-index:6; 
        pointer-events:none;
    }
    #vline1{left:calc(33.333% - 1.5px);}
    #vline2{left:calc(66.666% - 1.5px);}

    .slot{position:relative;overflow:hidden;}
    .slot img.m{
        width:100%; 
        height:100%; 
        object-fit: cover;        /* preenche TODA a slot */
        display:block;
    }

    /* Slot vazio */
    .slot-add{
        position:absolute; inset:0;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        cursor:pointer; transition:background .2s;
    }
    .slot-add:hover{background:rgba(0,0,0,.08);}
    .slot-add svg{width:8%; min-width:18px; max-width:44px; opacity:.15;}
    .slot-add span{
        font-family:sans-serif; font-size:clamp(8px,1.1vw,15px); font-weight:600;
        margin-top:5px; color:rgba(80,65,50,.3);
    }

    /* Controlos */
    .slot-ctrl{
        position:absolute; bottom:0; left:0; right:0;
        display:flex; justify-content:center; gap:4px;
        padding:4px 6px;
        background:linear-gradient(transparent,rgba(0,0,0,.65));
        opacity:0; transition:opacity .25s; z-index:5;
    }
    .slot:hover .slot-ctrl{opacity:1;}

    .sc{
        background:rgba(255,255,255,.22); border:none; border-radius:5px;
        color:#fff; cursor:pointer; padding:4px 8px;
        font-family:sans-serif; font-size:clamp(8px,.9vw,12px); font-weight:600;
        display:flex; align-items:center; gap:3px;
        transition:background .15s;
    }
    .sc:hover{background:rgba(255,255,255,.38);}

    /* Botão Índice */
    #btn-idx{
        position:absolute; bottom:10%; right:3%; width:8%;
        cursor:pointer; z-index:10; opacity:0; pointer-events:none;
        transition:opacity .5s;
    }
    #btn-idx.show{opacity:1; pointer-events:all;}

    /* Fullscreen com o teu fundo personalizado */
    #fsmod{
        position:absolute; inset:0; display:none; 
        background: url('https://res.cloudinary.com/dxdemxfpe/image/upload/v1774445109/fundilho_yekwkp.png') center/cover no-repeat;
        z-index:100; 
        flex-direction:column; 
        align-items:center; 
        justify-content:center; 
        gap:15px;
    }
    #fsmod.on{display:flex;}

    #fscont{
        width:92%; height:78%; 
    }
    #fscont img{
        width:100%; 
        height:100%; 
        object-fit: contain;
        border-radius:8px;
    }

    #fsbar{display:flex; gap:10px;}
    .fsbtn{
        background:rgba(255,255,255,.18); 
        border:1px solid rgba(255,255,255,.3);
        color:#fff; border-radius:8px; padding:8px 18px;
        font-family:sans-serif; font-size:clamp(11px,1.2vw,15px); font-weight:600;
        cursor:pointer; transition:background .2s;
    }
    .fsbtn:hover{background:rgba(255,255,255,.32);}

    /* Toast */
    #toast{
        position:absolute; bottom:3%; left:50%; transform:translateX(-50%) translateY(40px);
        background:rgba(10,10,10,.92); color:#fff;
        font-family:sans-serif; font-size:clamp(11px,1.4vw,17px); font-weight:600;
        padding:clamp(6px,1vw,11px) clamp(12px,2vw,26px);
        border-radius:22px; border:1px solid rgba(255,255,255,.15);
        z-index:50; opacity:0; transition:transform .4s, opacity .4s;
        white-space:nowrap; pointer-events:none;
    }
    #toast.on{transform:translateX(-50%) translateY(0); opacity:1;}
</style>
</head>
<body>

<div id="wrap">
  <div id="stage">
    <video id="vid" src="https://res.cloudinary.com/dxdemxfpe/video/upload/v1773223413/galeria_l9s4l4.mp4" preload="auto" playsinline></video>
    <img id="play" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1772958888/26_ujjdad.png" alt="Play">

    <img id="gbg" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773593841/isto_n%C3%A3o_%C3%A9_para_todos_2_nrkc13.png" alt="">

    <div id="slots">
      <div id="vline1"></div>
      <div id="vline2"></div>
    </div>

    <img id="btn-idx" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png" alt="Índice">

    <div id="fsmod">
      <div id="fscont"></div>
      <div id="fsbar">
        <button class="fsbtn" id="fscls">✕ Fechar</button>
        <button class="fsbtn" id="fsdl">💾 Guardar</button>
      </div>
    </div>

    <div id="toast"></div>
  </div>
</div>

<input type="file" id="fsin" accept="image/*" style="display:none">

<script>
const SURL = 'https://itqzgxotbzsuwevjpnoi.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0cXpneG90YnpzdXdldmpwbm9pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDU4NTgsImV4cCI6MjA4NzI4MTg1OH0.nS4RuwfULc9uHGh_u93vLZ7uRsLnKl7NULrb2Yesw9k';

const HDR = {'apikey':SKEY, 'Authorization':'Bearer '+SKEY, 'Content-Type':'application/json', 'Prefer':'return=representation'};
const HDRD = {'apikey':SKEY, 'Authorization':'Bearer '+SKEY, 'Content-Type':'application/json', 'Prefer':'return=minimal'};
const SHDR = {'apikey':SKEY, 'Authorization':'Bearer '+SKEY};

const STORAGE_URL = SURL + '/storage/v1/object/public/galeria/';
const STORAGE_UP  = SURL + '/storage/v1/object/galeria/';

let data = [];
for(let i = 0; i < 9; i++) data.push({url:null, name:null, id:null, path:null});

let fsSlot = null;
let activeSlot = null;

function resize(){
    const stage = document.getElementById('stage');
    stage.style.width = '100%';
    stage.style.height = '100%';
}
resize();
window.addEventListener('resize', resize);

const vid = document.getElementById('vid');
document.getElementById('play').onclick = function(){
    this.classList.add('gone');
    vid.play().catch(() => { vid.muted = true; vid.play(); });
};

let lastTap = 0;
vid.addEventListener('touchend', function(){
    const now = Date.now();
    if(now - lastTap < 350) goGallery();
    lastTap = now;
});
vid.addEventListener('dblclick', goGallery);
vid.addEventListener('ended', goGallery);

function goGallery(){
    vid.pause();
    vid.style.opacity = '0';
    document.getElementById('gbg').classList.add('show');
    document.getElementById('slots').classList.add('show');
    document.getElementById('btn-idx').classList.add('show');
    carregarGaleria();
}

function carregarGaleria(){
    fetch(SURL + '/rest/v1/galeria?order=created_at.asc', {headers: HDR})
    .then(r => r.json())
    .then(rows => {
        data = [];
        for(let i = 0; i < 9; i++) data.push({url:null, name:null, id:null, path:null});
        rows.forEach((row, i) => {
            if(i < 9 && row.imagem){
                data[i] = {url: row.imagem, name: 'imagem_' + row.id + '.jpg', id: row.id, path: row.path || null};
            }
        });
        build();
    })
    .catch(() => build());
}

function build(){
    const c = document.getElementById('slots');
    c.innerHTML = `<div id="vline1"></div><div id="vline2"></div>`;

    for(let i = 0; i < 9; i++){
        const s = data[i];
        const d = document.createElement('div');
        d.className = 'slot';

        if(s.url){
            const img = document.createElement('img');
            img.src = s.url;
            img.className = 'm';
            d.appendChild(img);

            const ctrl = document.createElement('div');
            ctrl.className = 'slot-ctrl';

            const ver = document.createElement('button'); ver.className='sc'; ver.textContent='👁 Ver';
            ver.onclick = (e)=>{e.stopPropagation(); openFS(i);};
            ctrl.appendChild(ver);

            const dl = document.createElement('button'); dl.className='sc'; dl.textContent='💾 Guardar';
            dl.onclick = (e)=>{e.stopPropagation(); guardarSlot(i);};
            ctrl.appendChild(dl);

            const ap = document.createElement('button'); ap.className='sc'; ap.textContent='🗑 Apagar';
            ap.onclick = (e)=>{e.stopPropagation(); apagarSlot(i);};
            ctrl.appendChild(ap);

            d.appendChild(ctrl);
        } else {
            const ov = document.createElement('div');
            ov.className = 'slot-add';
            ov.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 4v16m8-8H4"/></svg><span>Adicionar</span>`;
            ov.onclick = () => { activeSlot = i; document.getElementById('fsin').value=''; document.getElementById('fsin').click(); };
            d.appendChild(ov);
        }
        c.appendChild(d);
    }
}

function openFS(idx){
    fsSlot = idx;
    const fc = document.getElementById('fscont');
    fc.innerHTML = '';
    const img = document.createElement('img');
    img.src = data[idx].url;
    fc.appendChild(img);
    document.getElementById('fsmod').classList.add('on');
}

document.getElementById('fscls').onclick = () => {
    document.getElementById('fsmod').classList.remove('on');
    document.getElementById('fscont').innerHTML = '';
    fsSlot = null;
};

function guardarSlot(idx){
    const s = data[idx];
    if(!s || !s.url) return toast('Nada para guardar');
    toast('A preparar...');
    fetch(s.url).then(r=>r.blob()).then(blob=>{
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = s.name || 'galeria.jpg';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        toast('✓ Guardado!');
    }).catch(()=>toast('Erro ao guardar'));
}

document.getElementById('fsdl').onclick = () => { if(fsSlot!==null) guardarSlot(fsSlot); };

function apagarSlot(idx){
    const s = data[idx];
    if(!s) return;
    data[idx] = {url:null,name:null,id:null,path:null};
    build(); toast('A apagar...');

    if(s.id) fetch(SURL+'/rest/v1/galeria?id=eq.'+s.id,{method:'DELETE',headers:HDRD}).catch(()=>{});
    if(s.path){
        fetch(STORAGE_UP + s.path,{method:'DELETE',headers:SHDR})
        .then(()=>toast('✓ Apagado')).catch(()=>toast('✓ Apagado'));
    } else toast('✓ Apagado');
}

document.getElementById('fsin').addEventListener('change', function(){
    const f = this.files[0];
    if(!f || activeSlot===null) return;
    uploadStorage(f, activeSlot);
    this.value = '';
});

function uploadStorage(file, slot){
    const path = 'img_'+slot+'_'+Date.now()+'.png';   /* ← PNG para transparência */
    toast('A enviar...');
    const reader = new FileReader();
    reader.onload = function(e){
        const img = new Image();
        img.onload = function(){
            const canvas = document.createElement('canvas');
            canvas.width = img.width; canvas.height = img.height;
            canvas.getContext('2d').drawImage(img,0,0);
            canvas.toBlob(blob=>{                          /* ← PNG (mantém transparência) */
                fetch(STORAGE_UP+path,{
                    method:'POST',
                    headers:Object.assign({'Content-Type':'image/png','x-upsert':'true'},SHDR),
                    body:blob
                }).then(()=>{
                    const url = STORAGE_URL + path;
                    data[slot] = {url:url, name:file.name, id:null, path:path};
                    build();

                    fetch(SURL+'/rest/v1/galeria',{method:'POST',headers:HDR,body:JSON.stringify({imagem:url,path:path})})
                    .then(r=>r.json()).then(rows=>{
                        if(rows&&rows[0]&&rows[0].id) data[slot].id = rows[0].id;
                        build(); toast('✓ Guardado!');
                    }).catch(()=>toast('✓ Guardado!'));
                }).catch(()=>toast('Erro ao enviar imagem'));
            },'image/png');   /* ← PNG (sem fundo preto) */
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

document.getElementById('btn-idx').onclick = () => window.location.href = 'indice.html?skip=1';

let tt;
function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('on');
    clearTimeout(tt);
    tt = setTimeout(()=>t.classList.remove('on'), 2800);
}
</script>
</body>
</html>
