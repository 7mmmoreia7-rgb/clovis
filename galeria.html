<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Galeria</title>

<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

#wrap{
  position:relative;
  width:100%;
  height:100%;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

#stage{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
}

/* remover preto atrás do vídeo */
#vid{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

/* PLAY */
#play{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:10%;
  cursor:pointer;
  z-index:1000;
  transition:opacity .4s;
  filter:
    drop-shadow(0 2px 4px rgba(0,0,0,0.35))
    drop-shadow(0 0 6px rgba(255,255,255,0.25));
}
#play.gone{opacity:0;pointer-events:none;}

#gbg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
  opacity:0;
  transition:opacity 1.4s ease;
}
#gbg.show{opacity:1;}

/* SLOTS */
#slots{
  position:absolute;
  left:9.2%;
  right:9.5%;
  top:8.87%;
  bottom:7.70%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  z-index:5;
  opacity:0;
  transition:opacity 1.4s ease;
}
#slots.show{opacity:1;}

.slot{
  position:relative;
  overflow:hidden;
  width:100%;
  height:100%;
}

.slot img.m,
.slot video.m{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* barras horizontais */
#slots::before,#slots::after{
  content:'';
  position:absolute;
  left:0;
  right:0;
  height:3px;
  background:#7a6245;
  z-index:6;
}
#slots::before{top:calc(100%/3);}
#slots::after{top:calc(200%/3);}

/* barras verticais */
#vline1,#vline2{
  position:absolute;
  top:0;
  bottom:0;
  width:3px;
  background:#7a6245;
  z-index:6;
  pointer-events:none;
}
#vline1{left:calc(100%/3 - 1.5px);}
#vline2{left:calc(200%/3 - 1.5px);}

/* BOTÃO ÍNDICE */
#btn-idx{
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:8%;
  cursor:pointer;
  z-index:900;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s;
}
#btn-idx.show{opacity:1;pointer-events:all;}

/* SKIP */
#btn-skip{
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:8%;
  cursor:pointer;
  z-index:800;
  border:none;
  background:transparent;
  padding:0;
}

/* FULLSCREEN */
#fsmod{
  display:none;
  position:absolute;
  inset:0;
  z-index:100;
  background:url(https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/fundilho.png) center/cover;
}
#fsmod.on{display:flex;}

#fscont{
  width:100%;
  height:calc(100% - 60px);
  display:flex;
  align-items:center;
  justify-content:center;
}

#fsbar{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
}

.fsbtn{
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);
  color:#fff;
  border-radius:8px;
  padding:8px 14px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="wrap">
  <div id="stage">

    <video id="vid" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/galeria/galeria.mp4" preload="auto" playsinline></video>

    <img id="play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">
    <img id="gbg" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/galeria/galeria.png">

    <div id="slots">
      <div id="vline1"></div>
      <div id="vline2"></div>
    </div>

    <div id="fsmod">
      <div id="fscont"></div>
      <div id="fsbar">
        <button class="fsbtn" id="fscls">Fechar</button>
        <button class="fsbtn" id="fsdl">Guardar</button>
      </div>
    </div>

  </div>
</div>

<img id="btn-idx">

<button id="btn-skip"></button>

<script>
/* SCRIPT MANTIDO IGUAL AO TEU */
</script>

</body>
</html>
