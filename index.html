<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Regras</title>

<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />
<link rel="manifest" href="/manifest.json">

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

<style>
*, *::before, *::after {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body {
  width:100%;
  height:100%;
  overflow:hidden;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

#myVideo {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

#btn-play {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:10%;
  cursor:pointer;
  z-index:10;
}

#btn-skip-home {
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:6%;
  cursor:pointer;
  z-index:10;
}

#btn-idx {
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:8%;
  cursor:pointer;
  z-index:9999;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s;
}
</style>
</head>

<body>

<video id="myVideo" playsinline>
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/home/home.mp4">
</video>

<img id="btn-play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

<img id="btn-skip-home" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/clika1.png">

<img id="btn-idx" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/botao%20(2).png">

<script>

const play = document.getElementById('btn-play');
const skip = document.getElementById('btn-skip-home');
const vid  = document.getElementById('myVideo');
const idx  = document.getElementById('btn-idx');

/* instalação */
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function hideStartButtons() {
  play.style.display = "none";
  skip.style.display = "none";
}

/* play */
play.onclick = () => {
  hideStartButtons();
  vid.play().catch(() => {
    vid.muted = true;
    vid.play();
  });
};

/* skip */
skip.onclick = () => {
  hideStartButtons();
  vid.currentTime = vid.duration;
  vid.dispatchEvent(new Event('ended'));
};

/* fim vídeo */
vid.onended = () => {
  idx.style.opacity = '1';
  idx.style.pointerEvents = 'all';
};

/* botão final */
idx.onclick = async () => {

  if (deferredPrompt) {
    deferredPrompt.prompt();

    const choice = await deferredPrompt.userChoice;

    if (choice.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
    }

    deferredPrompt = null;
  }

  window.location.href = 'indice.html?skip=1';
};

</script>

</body>
</html>
