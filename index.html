<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Regras</title>

<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />
<link rel="manifest" href="/manifest.json">

<script>
  const isStandalone =
  window.matchMedia('(display-mode: standalone)').matches ||
  window.navigator.standalone === true;

const jaInstalada = localStorage.getItem("app_instalada") === "true";

// 👉 se NÃO está instalada → manda para instalação
if (!isStandalone && !jaInstalada) {
  window.location.href = "instalar.html";
}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

<style>
*, *::before, *::after {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body {
  width:100%;
  height:100%;
  overflow:hidden;
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

/* VIDEO */
#myVideo {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* PLAY */
#btn-play {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:10%;
  cursor:pointer;
  z-index:10;
  transition:opacity .3s;
}

/* SKIP */
#btn-skip-home {
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:6%;
  z-index:10;
  cursor:pointer;
  transition:transform .2s ease;
}

#btn-skip-home:hover {
  content:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/clika2.png");
  transform:scale(1.25);
}

/* ÍNDICE */
#btn-idx {
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:8%;
  cursor:pointer;
  z-index:9999;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s;
}
</style>
</head>

<body>

<video id="myVideo" playsinline>
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/home/home.mp4" type="video/mp4">
</video>

<!-- PLAY -->
<img id="btn-play"
     src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png"
     alt="Play" />

<!-- SKIP -->
<img id="btn-skip-home"
     src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/clika1.png"
     alt="Skip Home" />

<!-- ÍNDICE -->
<img id="btn-idx"
     src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/botao%20(2).png"
     alt="Índice" />

<script>

const play = document.getElementById('btn-play');
const skip = document.getElementById('btn-skip-home');
const vid  = document.getElementById('myVideo');
const idx  = document.getElementById('btn-idx');

function hideStartButtons() {
  play.style.opacity = '0';
  play.style.pointerEvents = 'none';

  skip.style.opacity = '0';
  skip.style.pointerEvents = 'none';
}

/* PLAY */
play.onclick = function () {
  // 🔊 SOM — fanfarra épica!
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();

    // nota 1 — arranque
    var o1 = ctx.createOscillator();
    var g1 = ctx.createGain();
    o1.connect(g1); g1.connect(ctx.destination);
    o1.type = 'square';
    o1.frequency.setValueAtTime(261, ctx.currentTime);
    o1.frequency.setValueAtTime(329, ctx.currentTime + 0.12);
    o1.frequency.setValueAtTime(392, ctx.currentTime + 0.24);
    o1.frequency.setValueAtTime(523, ctx.currentTime + 0.36);
    g1.gain.setValueAtTime(1.0, ctx.currentTime);
    g1.gain.setValueAtTime(1.0, ctx.currentTime + 0.36);
    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
    o1.start(ctx.currentTime);
    o1.stop(ctx.currentTime + 0.9);

    // nota 2 — eco suave
    var o2 = ctx.createOscillator();
    var g2 = ctx.createGain();
    o2.connect(g2); g2.connect(ctx.destination);
    o2.type = 'sine';
    o2.frequency.setValueAtTime(523, ctx.currentTime + 0.3);
    o2.frequency.setValueAtTime(659, ctx.currentTime + 0.5);
    o2.frequency.setValueAtTime(784, ctx.currentTime + 0.7);
    g2.gain.setValueAtTime(0.0, ctx.currentTime);
    g2.gain.setValueAtTime(0.8, ctx.currentTime + 0.3);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
    o2.start(ctx.currentTime + 0.3);
    o2.stop(ctx.currentTime + 1.2);

    // bombo final
    var o3 = ctx.createOscillator();
    var g3 = ctx.createGain();
    o3.connect(g3); g3.connect(ctx.destination);
    o3.type = 'sine';
    o3.frequency.setValueAtTime(120, ctx.currentTime + 0.36);
    o3.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.7);
    g3.gain.setValueAtTime(1.0, ctx.currentTime + 0.36);
    g3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
    o3.start(ctx.currentTime + 0.36);
    o3.stop(ctx.currentTime + 0.7);

  } catch(e) {}

  // 🎆 ANIMAÇÃO — explosão de partículas + rotação + ascensão
  var x0 = window.innerWidth / 2;
  var y0 = window.innerHeight / 2;
  var cores = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9A3C','#FF6BB5','#00C9A7'];

  // onda 1 — partículas grandes
  for(var p = 0; p < 16; p++){
    (function(i){
      setTimeout(function(){
        var dot = document.createElement('div');
        var angle = (i / 16) * Math.PI * 2;
        var dist = 80 + Math.random() * 60;
        dot.style.cssText = [
          'position:fixed',
          'width:14px',
          'height:14px',
          'border-radius:50%',
          'background:' + cores[i % cores.length],
          'left:'+(x0-7)+'px',
          'top:'+(y0-7)+'px',
          'z-index:9999',
          'pointer-events:none',
          'transition:all 0.7s cubic-bezier(0.25,0.46,0.45,0.94)',
          'opacity:1'
        ].join(';');
        document.body.appendChild(dot);
        setTimeout(function(){
          dot.style.left = (x0 + Math.cos(angle)*dist - 7)+'px';
          dot.style.top  = (y0 + Math.sin(angle)*dist - 7)+'px';
          dot.style.opacity = '0';
          dot.style.transform = 'scale(0.1)';
        }, 20);
        setTimeout(function(){ dot.remove(); }, 800);
      }, i * 20);
    })(p);
  }

  // onda 2 — partículas pequenas com delay
  for(var q = 0; q < 12; q++){
    (function(i){
      setTimeout(function(){
        var dot = document.createElement('div');
        var angle = (i / 12) * Math.PI * 2 + 0.3;
        var dist = 120 + Math.random() * 50;
        dot.style.cssText = [
          'position:fixed',
          'width:8px',
          'height:8px',
          'border-radius:50%',
          'background:' + cores[(i+3) % cores.length],
          'left:'+(x0-4)+'px',
          'top:'+(y0-4)+'px',
          'z-index:9999',
          'pointer-events:none',
          'transition:all 0.9s ease-out',
          'opacity:1'
        ].join(';');
        document.body.appendChild(dot);
        setTimeout(function(){
          dot.style.left = (x0 + Math.cos(angle)*dist - 4)+'px';
          dot.style.top  = (y0 + Math.sin(angle)*dist - 4)+'px';
          dot.style.opacity = '0';
          dot.style.transform = 'scale(0.1)';
        }, 20);
        setTimeout(function(){ dot.remove(); }, 1000);
      }, 150 + i * 25);
    })(q);
  }

  // play — roda, expande e sobe
  play.style.transition = 'transform 1.4s cubic-bezier(0.25,0.46,0.45,0.94), opacity 1s ease';
  play.style.transform = 'translate(-50%, -220%) rotate(720deg) scale(0.1)';
  play.style.opacity = '0';

  setTimeout(function(){
    skip.style.opacity = '0';
    skip.style.pointerEvents = 'none';
  }, 200);

  vid.play().catch(function(){
    vid.muted = true;
    vid.play();
  });
};

/* SKIP */
skip.onclick = function () {
  hideStartButtons();

  vid.pause();
  vid.currentTime = vid.duration;

  vid.dispatchEvent(new Event('ended'));
};

/* FIM DO VÍDEO */
vid.onended = function () {
  idx.style.opacity = '1';
  idx.style.pointerEvents = 'all';
};

/* ÍNDICE */
idx.onclick = function () {
  window.location.href = 'indice.html?skip=1';
};

</script>
<script src="/notif.js"></script>
</body>
</html>
