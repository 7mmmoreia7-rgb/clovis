const PINCEIS=[{nome:"Fino 1px",tipo:"round",px:1},{nome:"Normal 4px",tipo:"round",px:4},{nome:"Médio 10px",tipo:"round",px:10},{nome:"Grosso 20px",tipo:"round",px:20},{nome:"Quadrado 8px",tipo:"square",px:8},{nome:"Marcador 16px",tipo:"square",px:16}];
let desenhar=false,ferramenta='pincel',tipoCap='round',cor='#000000',grossura=4,tamBorracha=20,fonte="'Nunito',sans-serif",tamTexto=32,hist=[],eS=null,offX=0,offY=0,resizing=false,resW=0,resX=0;
window._playAutorizado=false;
(function(){const v=document.getElementById('meu-video');const p=()=>{if(!window._playAutorizado){v.pause();v.currentTime=0;}};v.addEventListener('loadedmetadata',p);v.addEventListener('canplay',p);v.addEventListener('play',function o(){if(!window._playAutorizado)v.pause();else v.removeEventListener('play',o);});})();
function iniciarVideo(){window._playAutorizado=true;const v=document.getElementById('meu-video');document.getElementById('btn-play').style.display='none';v.play().catch(()=>fazTransicao());v.addEventListener('ended',fazTransicao,{once:true});setTimeout(fazTransicao,15000);}
let trOk=false;
function fazTransicao(){if(trOk)return;trOk=true;const fade=document.getElementById('overlay-fade');fade.classList.add('ativo');setTimeout(()=>{document.getElementById('ecra-video').classList.add('oculto');document.getElementById('ecra-quadro').classList.add('visivel');document.getElementById('btn-idx').classList.add('show');initCanvas();popularPopups();setTimeout(()=>fade.classList.remove('ativo'),100);},650);}
const cv=document.getElementById('meu-canvas'),cx=cv.getContext('2d');
function initCanvas(){sizing();window.addEventListener('resize',sizing);cv.addEventListener('mousedown',e=>{deselAll();ini(e.offsetX,e.offsetY);});cv.addEventListener('mousemove',e=>cont(e.offsetX,e.offsetY));cv.addEventListener('mouseup',fim);cv.addEventListener('mouseleave',fim);cv.addEventListener('touchstart',e=>{e.preventDefault();deselAll();const p=tPos(e.touches[0]);ini(p.x,p.y);},{passive:false});cv.addEventListener('touchmove',e=>{e.preventDefault();const p=tPos(e.touches[0]);cont(p.x,p.y);},{passive:false});cv.addEventListener('touchend',fim);}
function sizing(){const r=cv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;const snap=hist.length?hist[hist.length-1]:null;cv.width=r.width*dpr;cv.height=r.height*dpr;cx.scale(dpr,dpr);if(snap){const i=new Image();i.src=snap;i.onload=()=>cx.drawImage(i,0,0,r.width,r.height);}else guardar();}
function tPos(t){const r=cv.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top};}
function cfgCtx(){if(ferramenta==='borracha'){cx.globalCompositeOperation='destination-out';cx.strokeStyle='rgba(0,0,0,1)';cx.lineWidth=tamBorracha;}else{cx.globalCompositeOperation='source-over';cx.strokeStyle=cor;cx.lineWidth=grossura;}cx.lineCap=tipoCap;cx.lineJoin='round';}
function ini(x,y){desenhar=true;cfgCtx();cx.beginPath();cx.moveTo(x,y);}
function cont(x,y){if(!desenhar)return;cx.lineTo(x,y);cx.stroke();}
function fim(){if(!desenhar)return;desenhar=false;cx.closePath();guardar();}
function guardar(){if(hist.length>30)hist.shift();hist.push(cv.toDataURL());}
function undo(){const cam=document.getElementById('camada-elementos');if(cam.children.length>0){cam.removeChild(cam.lastChild);return;}if(hist.length>1){hist.pop();const i=new Image();i.src=hist[hist.length-1];const r=cv.getBoundingClientRect();i.onload=()=>{cx.clearRect(0,0,r.width,r.height);cx.drawImage(i,0,0,r.width,r.height);};return;}document.getElementById('camada-fundos').innerHTML='';}
function setBorracha(v){tamBorracha=parseInt(v);ferramenta='borracha';cv.style.cursor='cell';document.getElementById('lbl-borracha').textContent=v+'px';FP('pop-borracha');}
function setGross(v){grossura=parseInt(v);ferramenta='pincel';cv.style.cursor='crosshair';document.getElementById('lbl-gross').textContent=v+'px';}
function setCor(c,fechar=true){cor=c;ferramenta='pincel';cv.style.cursor='crosshair';document.querySelectorAll('.bl-cor').forEach(b=>b.classList.toggle('sel',b.dataset.c===c));prvTxt();if(fechar)FP('pop-cores');}
function prvTxt(){const sz=parseInt(document.getElementById('sl-tam').value);tamTexto=sz;document.getElementById('lbl-tam').textContent=sz+'px';const p=document.getElementById('prv-txt');p.style.fontSize=sz+'px';p.style.fontFamily=fonte;p.style.color=cor;p.textContent=document.getElementById('inp-txt').value||'Preview...';}
function addTexto(){const t=document.getElementById('inp-txt').value.trim();if(!t)return;const d=mkW('left:40px;top:40px;');const sp=document.createElement('div');sp.className='txt-elem';sp.style.cssText='font-family:'+fonte+';font-size:'+tamTexto+'px;color:'+cor+';';sp.contentEditable='false';sp.textContent=t;const{hdlDel,hdlRes}=mkH(d);d.appendChild(sp);d.appendChild(hdlDel);d.appendChild(hdlRes);document.getElementById('camada-elementos').appendChild(d);ativaDrag(d,hdlRes,hdlDel);FP('pop-texto');document.getElementById('inp-txt').value='';document.getElementById('prv-txt').textContent='';}
function addElem(url,nome,tipo,ehFundo){if(ehFundo){const cam=document.getElementById('camada-fundos');cam.innerHTML='';let m;if(tipo==='video'){m=document.createElement('video');m.src=url;m.crossOrigin='anonymous';m.autoplay=true;m.loop=true;m.muted=true;m.playsinline=true;}else{m=document.createElement('img');m.src=url;m.alt=nome;m.crossOrigin='anonymous';}cam.appendChild(m);FP('pop-elem');return;}const d=mkW('left:30px;top:30px;width:150px;');let m;if(tipo==='video'){m=document.createElement('video');m.src=url;m.autoplay=true;m.loop=true;m.muted=true;m.playsinline=true;m.style.width='100%';m.style.height='auto';}else{m=document.createElement('img');m.src=url;m.alt=nome;m.crossOrigin='anonymous';m.style.width='100%';m.style.height='auto';m.onload=function(){const ratio=m.naturalHeight/m.naturalWidth;d.style.height=(150*ratio)+'px';};}const{hdlDel,hdlRes}=mkH(d);d.appendChild(m);d.appendChild(hdlDel);d.appendChild(hdlRes);document.getElementById('camada-elementos').appendChild(d);ativaDrag(d,hdlRes,hdlDel);FP('pop-elem');}
function mkW(s){const d=document.createElement('div');d.className='elem-arr';d.style.cssText='position:absolute;'+s;return d;}
function mkH(d){const hd=document.createElement('div');hd.className='hdl-del';hd.textContent='×';hd.addEventListener('mousedown',e=>{e.stopPropagation();d.remove();});hd.addEventListener('touchstart',e=>{e.stopPropagation();d.remove();},{passive:true});const hr=document.createElement('div');hr.className='hdl-resize';return{hdlDel:hd,hdlRes:hr};}
function ativaDrag(el,hdlRes,hdlDel){el.addEventListener('mousedown',e=>{if(e.target===hdlRes||e.target===hdlDel)return;e.stopPropagation();selEl(el);const r=el.getBoundingClientRect();offX=e.clientX-r.left;offY=e.clientY-r.top;eS=el;});el.addEventListener('touchstart',e=>{if(e.target===hdlRes||e.target===hdlDel)return;e.stopPropagation();selEl(el);const r=el.getBoundingClientRect();offX=e.touches[0].clientX-r.left;offY=e.touches[0].clientY-r.top;eS=el;},{passive:true});hdlRes.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();selEl(el);resizing=true;eS=el;resX=e.clientX;resW=el.offsetWidth;});hdlRes.addEventListener('touchstart',e=>{e.stopPropagation();selEl(el);resizing=true;eS=el;resX=e.touches[0].clientX;resW=el.offsetWidth;},{passive:true});}
function selEl(el){deselAll();el.classList.add('sel');cv.style.pointerEvents='none';cv.style.zIndex='3';}
function deselAll(){document.querySelectorAll('.elem-arr').forEach(e=>e.classList.remove('sel'));eS=null;cv.style.pointerEvents='all';}
function mvG(mx,my){if(!eS)return;if(resizing){const delta=mx-resX;const tx=eS.querySelector('.txt-elem');if(tx){const fs=Math.min(200,Math.max(8,parseFloat(tx.style.fontSize||'32')+delta*0.3));tx.style.fontSize=fs+'px';}else{const novaW=Math.min(1000,Math.max(30,resW+delta));const curL=parseFloat(eS.style.left||0);const curT=parseFloat(eS.style.top||0);eS.style.width=novaW+'px';const img=eS.querySelector('img');if(img&&img.naturalWidth){eS.style.height=(novaW*img.naturalHeight/img.naturalWidth)+'px';}eS.style.left=curL+'px';eS.style.top=curT+'px';}resX=mx;resW=eS.offsetWidth;}else{const cr=document.getElementById('camada-elementos').getBoundingClientRect();const novoL=Math.max(0,Math.min(cr.width-20,mx-cr.left-offX));const novoT=Math.max(0,Math.min(cr.height-20,my-cr.top-offY));eS.style.left=novoL+'px';eS.style.top=novoT+'px';}}
document.addEventListener('mousemove',e=>{if(eS)mvG(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(eS)mvG(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
document.addEventListener('mouseup',()=>{eS=null;resizing=false;});
document.addEventListener('touchend',()=>{eS=null;resizing=false;});
document.addEventListener('click',e=>{if(!e.target.closest('.elem-arr')&&!e.target.closest('.pop-ov'))deselAll();});
document.addEventListener('keydown',e=>{if((e.key==='Delete'||e.key==='Backspace')&&e.target.tagName!=='INPUT'){const s=document.querySelector('.elem-arr.sel');if(s){s.remove();eS=null;}}});
function importar(ev){const f=ev.target.files[0];if(!f)return;const url=URL.createObjectURL(f);const d=mkW('left:30px;top:30px;width:200px;');const m=document.createElement('img');m.src=url;m.alt=f.name;m.style.width='100%';m.style.height='auto';m.onload=function(){const ratio=m.naturalHeight/m.naturalWidth;d.style.height=(200*ratio)+'px';};const{hdlDel,hdlRes}=mkH(d);d.appendChild(m);d.appendChild(hdlDel);d.appendChild(hdlRes);document.getElementById('camada-elementos').appendChild(d);ativaDrag(d,hdlRes,hdlDel);ev.target.value='';}
function gerarCanvas(cb){const dpr=window.devicePixelRatio||1,r=cv.getBoundingClientRect();const tmp=document.createElement('canvas');tmp.width=r.width*dpr;tmp.height=r.height*dpr;const c=tmp.getContext('2d');c.scale(dpr,dpr);c.fillStyle='#cfc0a0';c.fillRect(0,0,r.width,r.height);const fm=document.querySelector('#camada-fundos img');const fv=document.querySelector('#camada-fundos video');const p1=fm?[new Promise(res=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{c.drawImage(i,0,0,r.width,r.height);res();};i.onerror=res;i.src=fm.src;})]:fv?[new Promise(res=>{try{c.drawImage(fv,0,0,r.width,r.height);}catch(e){}res();})]:[Promise.resolve()];Promise.all(p1).then(()=>{c.drawImage(cv,0,0,r.width,r.height);const cr=document.getElementById('camada-elementos').getBoundingClientRect();const p2=[];document.querySelectorAll('#camada-elementos .elem-arr').forEach(el=>{const er=el.getBoundingClientRect();const x=er.left-cr.left,y=er.top-cr.top,w=er.width,h=er.height;const im=el.querySelector('img');if(im)p2.push(new Promise(res=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{c.drawImage(i,x,y,w,h);res();};i.onerror=res;i.src=im.src;}));const tx=el.querySelector('.txt-elem');if(tx){const fs=parseFloat(getComputedStyle(tx).fontSize);c.font=fs+'px '+tx.style.fontFamily;c.fillStyle=tx.style.color||'#000';c.fillText(tx.textContent,x,y+fs);}});Promise.all(p2).then(()=>cb(tmp));});}
function expDispositivo(){gerarCanvas(t=>{const a=document.createElement('a');a.download='clube-desenho.png';a.href=t.toDataURL('image/png');document.body.appendChild(a);a.click();setTimeout(()=>document.body.removeChild(a),100);FP('pop-export');});}
function expGaleria(){
  gerarCanvas(function(t){
    var path='desenho_'+Date.now()+'.jpg';
    t.toBlob(function(blob){
      fetch(STORAGE_UP+path,{
        method:'POST',
        headers:Object.assign({'Content-Type':'image/jpeg','x-upsert':'true'},SHDR),
        body:blob
      })
      .then(function(){
        var url=STORAGE_URL+path;
        return fetch(SURL+'/rest/v1/galeria',{
          method:'POST',
          headers:Object.assign({'Content-Type':'application/json','Prefer':'return=minimal'},SHDR),
          body:JSON.stringify({imagem:url,path:path})
        });
      })
      .then(function(){FP('pop-export');alert('Enviado para a Galeria!');})
      .catch(function(){alert('Erro ao enviar para a Galeria');});
    },'image/jpeg',0.92);
  });
}
function popularPopups(){PINCEIS.forEach(p=>{const b=document.createElement('button');b.className='btn-pb';b.innerHTML='<div class="prev-ln" style="height:'+Math.min(p.px,14)+'px"></div>'+p.nome;b.onclick=()=>{grossura=p.px;tipoCap=p.tipo==='square'?'square':'round';ferramenta='pincel';cv.style.cursor='crosshair';document.getElementById('sl-gross').value=p.px;document.getElementById('lbl-gross').textContent=p.px+'px';document.querySelectorAll('.btn-pb').forEach(x=>x.classList.remove('a'));b.classList.add('a');};document.getElementById('g-pinceis').appendChild(b);});CORES.forEach(c=>{const d=document.createElement('div');d.className='bl-cor';d.style.background=c;d.dataset.c=c;if(c==='#FFFFFF')d.style.border='3px solid #ddd';d.onclick=()=>setCor(c);document.getElementById('g-cores').appendChild(d);});function mkCard(container,item,ehFundo){const card=document.createElement('div');card.className='card-el';const tipo=item.tipo||'img';if(tipo==='video'){const v=document.createElement('video');v.src=item.url;v.autoplay=true;v.loop=true;v.muted=true;v.playsinline=true;v.style.cssText='max-width:75%;max-height:72%;object-fit:cover;border-radius:6px;';card.appendChild(v);}else{const im=document.createElement('img');im.src=item.url;im.alt='';card.appendChild(im);}card.onclick=()=>addElem(item.url,item.nome,tipo,ehFundo);container.appendChild(card);}ANIMAIS.forEach(e=>mkCard(document.getElementById('tab-animais'),e,false));OUTROS.forEach(e=>mkCard(document.getElementById('tab-outros'),e,false));FUNDOS.forEach(e=>mkCard(document.getElementById('tab-fundos'),e,true));BRILHOS.forEach(e=>mkCard(document.getElementById('tab-brilhos'),e,false));FONTES.forEach(f=>{const d=document.createElement('div');d.className='item-f';d.innerHTML='<span class="pf" style="font-family:'+f.css+'">'+f.prev+'</span><span class="nf">'+f.nome+'</span>';d.onclick=()=>{fonte=f.css;document.querySelectorAll('.item-f').forEach(x=>x.classList.remove('a'));d.classList.add('a');prvTxt();};document.getElementById('g-fontes').appendChild(d);});document.getElementById('inp-txt').addEventListener('input',prvTxt);}
function showTab(n,btn){['animais','outros','fundos','brilhos'].forEach(t=>document.getElementById('tab-'+t).style.display=t===n?'grid':'none');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('a'));btn.classList.add('a');}
function AP(id){document.querySelectorAll('.pop-ov').forEach(p=>{p.classList.remove('open');p.style.display='none';});const el=document.getElementById(id);el.style.display='block';requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('open')));document.getElementById('pop-bg').classList.add('open');}
function FP(id){const el=document.getElementById(id);el.classList.remove('open');setTimeout(()=>{el.style.display='none';},220);document.getElementById('pop-bg').classList.remove('open');}
function FPTodos(){document.querySelectorAll('.pop-ov').forEach(p=>{p.classList.remove('open');setTimeout(()=>p.style.display='none',220);});document.getElementById('pop-bg').classList.remove('open');}
const tip=document.getElementById('tip');
function TT(e,t){tip.textContent=t;tip.style.left=(e.clientX+10)+'px';tip.style.top=(e.clientY+26)+'px';tip.classList.add('v');}
function HT(){tip.classList.remove('v');}
let locked=false;
function toggleLock(){locked=!locked;document.getElementById('btn-lock').textContent=locked?'🔒':'🔓';const cam=document.getElementById('camada-elementos');cam.style.pointerEvents=locked?'none':'auto';cv.style.zIndex=locked?'10':'3';cv.style.pointerEvents='all';if(locked){deselAll();}}
function irIndice(){window.location.href='/indice';}
</script>
