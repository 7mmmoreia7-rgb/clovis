<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Clube Interativo Completo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; outline:none!important; }
        body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Nunito', sans-serif; }
        
        /* Ecrãs */
        #ecra-video, #ecra-quadro { position:absolute; inset:0; width:100%; height:100%; }
        #ecra-video { z-index:1000; }
        #ecra-quadro { display:none; z-index:5; }
        #meu-video { width:100%; height:100%; object-fit:cover; }

        /* O Quadro de Desenho Real */
        #fundo-design { position:absolute; inset:0; width:100%; height:100%; object-fit:fill; z-index:1; }
        #meu-canvas { position:absolute; left:9.5%; top:14.7%; width:80.8%; height:70.5%; z-index:10; touch-action:none; }
        #camada-elementos { position:absolute; left:9.5%; top:14.7%; width:80.8%; height:70.5%; z-index:8; pointer-events:none; }

        /* Menus e Popups Estilizados */
        .pop-ov { position:fixed; bottom:120px; left:50%; transform:translateX(-50%); width:90%; max-width:600px; background:rgba(255,255,255,0.98); border-radius:25px; padding:20px; display:none; z-index:2000; box-shadow:0 15px 50px rgba(0,0,0,0.5); }
        .grid-it { display:grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap:10px; max-height:350px; overflow-y:auto; }
        .card-el { border:2px solid #eee; border-radius:12px; padding:5px; cursor:pointer; background:#fff; text-align:center; }
        .card-el img { max-width:100%; height:50px; object-fit:contain; }

        /* Barra de Ferramentas Inferior */
        .dock { position:fixed; bottom:25px; left:50%; transform:translateX(-50%); display:flex; gap:10px; z-index:1500; background:rgba(0,0,0,0.3); padding:10px; border-radius:40px; backdrop-filter:blur(10px); }
        .btn-menu { width:60px; height:60px; border-radius:50%; border:none; cursor:pointer; background:#fff; box-shadow:0 5px 15px rgba(0,0,0,0.2); font-size:24px; }
        
        /* Barra de Edição do Elemento Selecionado */
        #barra-elem { position:fixed; background:#fff; border-radius:30px; padding:8px 20px; display:none; gap:15px; z-index:3000; box-shadow:0 10px 30px rgba(0,0,0,0.3); align-items:center; }
        .btn-be { border:none; background:#f0f0f0; width:40px; height:40px; border-radius:50%; font-size:20px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="ecra-video">
        <video id="meu-video" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/interativo/voador.mp4" playsinline></video>
        <button onclick="iniciarVideo()" style="position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:1100; background:none; border:none; cursor:pointer;"><img src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png" width="100"></button>
    </div>

    <div id="ecra-quadro">
        <img id="fundo-design" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/interativo/interativo1.png">
        <canvas id="meu-canvas"></canvas>
        <div id="camada-elementos"></div>

        <div id="barra-elem">
            <button class="btn-be" id="be-plus">➕</button>
            <button class="btn-be" id="be-minus">➖</button>
            <button class="btn-be" id="be-del" style="background:#ffcccc;">🗑️</button>
        </div>

        <div id="pop-pinceis" class="pop-ov"><h3>Pincéis</h3><div id="grid-pinceis" class="grid-it"></div></div>
        <div id="pop-cores" class="pop-ov"><h3>Cores</h3><div id="grid-cores" class="grid-it"></div></div>
        <div id="pop-animais" class="pop-ov"><h3>Animais</h3><div id="grid-animais" class="grid-it"></div></div>

        <div class="dock">
            <button class="btn-menu" onclick="togglePopup('pop-pinceis')">🖌️</button>
            <button class="btn-menu" onclick="togglePopup('pop-cores')">🎨</button>
            <button class="btn-menu" onclick="togglePopup('pop-animais')">🦁</button>
            <button class="btn-menu" onclick="limparCanvas()" style="background:#ff9a9a;">🧹</button>
            <button class="btn-menu" onclick="expDispositivo()" style="background:#6bcb77;">💾</button>
        </div>
    </div>
    <script>
/* ══════════════════════════════════════════════════════
   PARTE 2: LÓGICA COMPLETA E ASSETS
══════════════════════════════════════════════════════ */

const API_BASE = 'https://hidden-hall-2a03.7mmmoreia7.workers.dev';
const CDN = 'https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/interativo/';
const a = (p, fs) => fs.map(f => ({ url: CDN + p + '/' + f }));

// --- LISTAS DE ASSETS (O teu conteúdo original) ---
const ANIMAIS = [
    ...a('animais', ['b1.png', 'b2.png', 'b3.png', 'b4.png', 'b5.jpg', 'b6.png', 'b7.png', 'b10.png', 'b11.png', 'b12.png', 'b13.png', 'b14.png', 'b15.png', 'b16.png', 'b17.png', 'b19.png', 'b21.png', 'b22.png', 'b23.png', 'b24.png', 'b25.png', 'b26.png']),
    ...a('animais1', ['b8.png', 'b9.png', 'doninha.png', 'elefante.gif', 'galinha.gif', 'gato.gif', 'golfinho.gif', 'lama.gif', 'panda.gif', 'peixe.gif', 'pombos.gif', 'rato.gif'])
];
const GAROTOS = a('garotos', ['111.png', '112.png', '113.png', '114.png', '115.png', '116.png', '29.png', '30.png', 'bonecaA.png', 'bonecaB.png', 'ca.png', 'go.png', 'ela.gif', 'pocoyo.gif']);
const CORES = ['#000000', '#FFFFFF', '#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF', '#C77DFF', '#FF9A3C', '#FF6BB5', '#00C9A7', '#E63946', '#F4A261', '#2A9D8F', '#264653', '#A8DADC'];
const PINCEIS = [
    { nome: 'Fino', px: 2 }, { nome: 'Normal', px: 6 }, 
    { nome: 'Grosso', px: 15 }, { nome: 'Enorme', px: 40 }
];

// --- ESTADO GLOBAL ---
let desenhar = false, cor = '#000000', grossura = 6, eS = null;

// --- VÍDEO E TRANSIÇÃO ---
function iniciarVideo() {
    const v = document.getElementById('meu-video');
    v.parentElement.querySelector('button').style.display = 'none';
    v.play().catch(fazTransicao);
    v.onended = fazTransicao;
}

function fazTransicao() {
    document.getElementById('ecra-video').style.display = 'none';
    document.getElementById('ecra-quadro').style.display = 'block';
    initCanvas();
    popularMenus();
}

// --- SISTEMA DE PINTURA ---
const cv = document.getElementById('meu-canvas');
const cx = cv.getContext('2d');

function initCanvas() {
    const r = cv.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    cv.width = r.width * dpr;
    cv.height = r.height * dpr;
    cx.scale(dpr, dpr);

    cv.addEventListener('pointerdown', e => {
        desenhar = true;
        cx.beginPath();
        const rect = cv.getBoundingClientRect();
        cx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        cx.strokeStyle = cor;
        cx.lineWidth = grossura;
        cx.lineCap = 'round';
        cx.lineJoin = 'round';
        deselAll();
    });

    cv.addEventListener('pointermove', e => {
        if (!desenhar) return;
        const rect = cv.getBoundingClientRect();
        cx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        cx.stroke();
    });

    window.addEventListener('pointerup', () => desenhar = false);
}

// --- POPULAR MENUS ---
function popularMenus() {
    // Animais
    const gAnim = document.getElementById('grid-animais');
    [...ANIMAIS, ...GAROTOS].forEach(item => {
        const d = document.createElement('div');
        d.className = 'card-el';
        d.innerHTML = `<img src="${item.url}">`;
        d.onclick = () => { addElem(item.url); togglePopup('pop-animais'); };
        gAnim.appendChild(d);
    });

    // Cores
    const gCores = document.getElementById('grid-cores');
    CORES.forEach(c => {
        const d = document.createElement('div');
        d.style.background = c;
        d.style.height = '40px';
        d.style.borderRadius = '8px';
        d.style.cursor = 'pointer';
        d.onclick = () => { cor = c; togglePopup('pop-cores'); };
        gCores.appendChild(d);
    });

    // Pinceis
    const gPin = document.getElementById('grid-pinceis');
    PINCEIS.forEach(p => {
        const d = document.createElement('div');
        d.className = 'card-el';
        d.innerText = p.nome;
        d.onclick = () => { grossura = p.px; togglePopup('pop-pinceis'); };
        gPin.appendChild(d);
    });
}

// --- GESTÃO DE BONECOS ---
function addElem(url) {
    const d = document.createElement('div');
    d.className = 'elem-arr';
    d.style.left = '100px'; d.style.top = '100px'; d.style.width = '120px';
    const im = document.createElement('img'); im.src = url;
    d.appendChild(im);
    document.getElementById('camada-elementos').appendChild(d);
    
    d.onpointerdown = e => {
        e.stopPropagation();
        selEl(d);
        let sX = e.clientX - d.offsetLeft;
        let sY = e.clientY - d.offsetTop;
        
        const move = ev => {
            d.style.left = (ev.clientX - sX) + 'px';
            d.style.top = (ev.clientY - sY) + 'px';
            posBarra(d);
        };
        document.addEventListener('pointermove', move);
        document.onpointerup = () => document.removeEventListener('pointermove', move);
    };
}

function selEl(el) {
    deselAll(); eS = el;
    el.style.outline = '3px solid #4D96FF';
    const be = document.getElementById('barra-elem');
    be.style.display = 'flex';
    posBarra(el);
    
    document.getElementById('be-plus').onclick = () => { el.style.width = (el.offsetWidth * 1.2) + 'px'; posBarra(el); };
    document.getElementById('be-minus').onclick = () => { el.style.width = (el.offsetWidth * 0.8) + 'px'; posBarra(el); };
    document.getElementById('be-del').onclick = () => { el.remove(); deselAll(); };
}

function deselAll() {
    document.querySelectorAll('.elem-arr').forEach(x => x.style.outline = 'none');
    document.getElementById('barra-elem').style.display = 'none';
    eS = null;
}

function posBarra(el) {
    const r = el.getBoundingClientRect();
    const be = document.getElementById('barra-elem');
    be.style.left = (r.left + r.width/2 - be.offsetWidth/2) + 'px';
    be.style.top = (r.top - 60) + 'px';
}

function togglePopup(id) {
    const p = document.getElementById(id);
    const vis = p.style.display === 'block';
    document.querySelectorAll('.pop-ov').forEach(x => x.style.display = 'none');
    p.style.display = vis ? 'none' : 'block';
}

function limparCanvas() {
    if(confirm("Limpar tudo?")) {
        cx.clearRect(0,0,cv.width,cv.height);
        document.getElementById('camada-elementos').innerHTML = '';
    }
}

// --- EXPORTAR ---
async function carregarImagem(src) {
    return new Promise(res => {
        const img = new Image(); img.crossOrigin = 'anonymous';
        img.onload = () => res(img); img.onerror = () => res(null);
        img.src = API_BASE + "/proxy?url=" + encodeURIComponent(src);
    });
}

async function expDispositivo() {
    const r = cv.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
    const tmp = document.createElement('canvas');
    tmp.width = r.width * dpr; tmp.height = r.height * dpr;
    const ctx = tmp.getContext('2d'); ctx.scale(dpr, dpr);
    
    ctx.fillStyle = "#fff"; ctx.fillRect(0,0,r.width,r.height);
    ctx.drawImage(cv, 0, 0, r.width, r.height);
    
    const elems = Array.from(document.querySelectorAll('.elem-arr'));
    for (const el of elems) {
        const img = await carregarImagem(el.querySelector('img').src);
        if (img) {
            const er = el.getBoundingClientRect(), cr = cv.getBoundingClientRect();
            ctx.drawImage(img, er.left - cr.left, er.top - cr.top, er.width, er.height);
        }
    }
    const a = document.createElement('a');
    a.download = 'meu-clube.png';
    a.href = tmp.toDataURL('image/png');
    a.click();
}
</script>
</body>
</html>
