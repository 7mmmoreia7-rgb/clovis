<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Clube Interativo</title>
<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap');
*{margin:0;padding:0;box-sizing:border-box;outline:none!important;-webkit-tap-highlight-color:transparent!important;-webkit-touch-callout:none;}
button{-webkit-appearance:none;appearance:none;border:none;background:transparent;cursor:pointer;box-shadow:none!important;}
button:focus,button:active{outline:none!important;box-shadow:none!important;}
html,body{width:100%;height:100%;overflow:hidden;background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;}
#app{position:relative;width:100%;height:100%;}

/* VÍDEO */
#ecra-video{position:absolute;inset:0;z-index:100;transition:opacity 1s ease;}
#ecra-video.oculto{opacity:0;pointer-events:none;}
#bg-isto{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
#meu-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1;}
#btn-play{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:10%;z-index:10;padding:0;}
#btn-play img{width:100%;height:auto;display:block;}
#btn-skip{
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:6%;
  z-index:200;
  padding:0;
}

#btn-skip img{
  width:100%;
  height:auto;
  display:block;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35))
          drop-shadow(0 0 6px rgba(255,255,255,0.25));
  transition: transform .2s ease;
}

#btn-skip:hover img{
  content:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/skipa1.png");
  transform: scale(1.30);
}

.gone{
  opacity:0 !important;
  pointer-events:none !important;
}
/* FADE */
#overlay-fade{position:absolute;inset:0;z-index:150;background:#fff;opacity:0;pointer-events:none;transition:opacity .6s ease;}
#overlay-fade.ativo{opacity:1;pointer-events:all;}

/* QUADRO */
#ecra-quadro{position:absolute;width:100%;height:115%;top:-28px;left:0;z-index:5;display:none;}
#ecra-quadro.visivel{display:block;}
#fundo-design{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;display:block;user-select:none;pointer-events:none;z-index:1;}

/* camadas: fundos z2, canvas z3, elementos z4 */
#camada-fundos{position:absolute;left:9.5%;top:14.7%;width:80.8%;height:70.5%;z-index:2;overflow:hidden;pointer-events:none;}
#camada-fundos video,#camada-fundos img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#fundo-cor{position:absolute;inset:0;width:100%;height:100%;}

/* canvas SEMPRE acima de tudo visualmente (z-index 6)
   pointer-events gerido por JS: all quando locked (desenha), none quando não locked (clica elementos) */
#meu-canvas{position:absolute;left:9.5%;top:14.7%;width:80.8%;height:70.5%;z-index:6;background:transparent;touch-action:none;cursor:crosshair;pointer-events:none;}

/* camada de elementos z5 — abaixo do canvas mas acima dos fundos */
#camada-elementos{position:absolute;left:9.5%;top:14.7%;width:80.8%;height:70.5%;z-index:5;overflow:hidden;pointer-events:none;}

/* elementos sempre abaixo do canvas — pointer-events gerido por locked state */
.elem-arr{position:absolute;cursor:grab;user-select:none;touch-action:none;pointer-events:none;z-index:1;}
.elem-arr.movel{pointer-events:all;cursor:grab;}
.elem-arr img,.elem-arr video{display:block;width:100%;height:auto;pointer-events:none;}

/* BARRA BOTÕES TOPO */
#barra-botoes{position:absolute;top:0;left:0;width:100%;height:13.5%;z-index:10;pointer-events:none;}
#barra-botoes button{position:absolute;background:transparent;border:none;cursor:pointer;pointer-events:all;border-radius:50%;top:30%;height:58%;aspect-ratio:1;}
#btn-pincel   {left:12.2%;}
#btn-cores    {left:22.3%;}
#btn-texto    {left:32.4%;}
#btn-elem     {left:42.5%;}
#btn-borracha {left:52.6%;}
#btn-undo     {left:62.7%;}
#btn-guardar  {left:72.8%;}
#btn-importar {left:82.9%;}

/* CADEADO */
#btn-lock{position:absolute;right:6%;top:8%;width:5.5%;z-index:20;padding:0;pointer-events:all;
  filter:drop-shadow(0 0 5px rgba(255,255,255,0.95)) drop-shadow(0 0 10px rgba(255,255,255,0.7));}
#btn-lock img{width:100%;height:auto;display:block;opacity:0.4;transition:opacity .2s;}
#btn-lock.fechado img{opacity:1;}

/* ÍNDICE */
#btn-idx{position:fixed;bottom:3.5%;right:3.4%;width:8%;height:auto;z-index:9999;opacity:0;pointer-events:none;transition:opacity .5s;}
#btn-idx.show{opacity:1;pointer-events:all;}

/* BARRA ELEMENTO */
#barra-elem{position:fixed;display:none;z-index:9998;background:rgba(20,20,40,.92);border-radius:30px;padding:5px 8px;gap:6px;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,.4);}
#barra-elem.vis{display:flex;}
#barra-elem button{width:34px;height:34px;border-radius:50%;border:2.5px solid white!important;color:white;font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;}
#be-plus{background:#6BCB77!important;}#be-minus{background:#FFB703!important;}#be-del{background:#FF6B6B!important;}

/* TOOLTIP */
#tip{position:absolute;background:rgba(20,20,40,.93);color:white;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;pointer-events:none;z-index:9999;opacity:0;transition:opacity .2s;white-space:nowrap;font-family:'Nunito',sans-serif;}
#tip.v{opacity:1;}

/* POPUPS */
.pop-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;}
.pop-bg.open{display:block;}
.pop-ov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);width:660px;max-width:90vw;background:white;border-radius:20px;padding:24px;max-height:75vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:601;display:none;opacity:0;transition:opacity .2s,transform .2s;}
.pop-ov.open{opacity:1;transform:translate(-50%,-50%) scale(1);}
.pop-title{font-family:'Pacifico',cursive;font-size:1.2rem;color:#1a1a2e;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.pop-x{width:34px;height:34px;border-radius:50%;background:#f0f0f0!important;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#333;}
.pop-x:hover{background:#ddd!important;}
.sldr{-webkit-appearance:none;width:100%;height:8px;border-radius:4px;background:#e0e0e0;cursor:pointer;accent-color:#4D96FF;}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab{padding:7px 16px;border-radius:20px;border:2px solid #eee;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;background:white;color:#333;}
.tab:hover,.tab.a{background:#4D96FF!important;color:white;border-color:#4D96FF;}
.grid-pb{display:flex;flex-wrap:wrap;gap:10px;}
.btn-pb{padding:10px 14px;border-radius:12px;border:2px solid #eee;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;background:white!important;display:flex;align-items:center;gap:8px;color:#333;}
.btn-pb:hover,.btn-pb.a{border-color:#4D96FF;background:#f0f7ff!important;}
.prev-ln{background:#1a1a2e;border-radius:4px;width:36px;}
#g-cores{display:flex;flex-wrap:wrap;gap:10px;}
.bl-cor{width:44px;height:44px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.bl-cor:hover{transform:scale(1.15);}
.bl-cor.sel{border-color:#1a1a2e;transform:scale(1.2);}
.g-el{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:12px;}
.card-el{border-radius:14px;border:2px solid #eee;cursor:pointer;transition:all .15s;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fafafa;padding:6px;overflow:hidden;}
.card-el:hover{border-color:#4D96FF;transform:scale(1.06);}
.card-el img,.card-el video{max-width:75%;max-height:72%;object-fit:contain;}
#g-fontes{display:flex;flex-direction:column;gap:8px;}
.item-f{padding:12px 16px;border-radius:12px;border:2px solid #eee;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;background:white;}
.item-f:hover,.item-f.a{border-color:#4D96FF;background:#e8f3ff;}
.pf{font-size:1.2rem;color:#1a1a2e;}.nf{font-size:11px;color:#aaa;}
.btn-ex{width:100%;padding:16px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;display:flex;align-items:center;gap:12px;margin-bottom:12px;justify-content:center;}
.azul{background:#4D96FF!important;color:white;}.verde{background:#6BCB77!important;color:white;}
.g-fundos-cor{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:16px;}
.card-fundo-cor{border-radius:14px;border:3px solid transparent;cursor:pointer;transition:all .15s;height:70px;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:white;text-shadow:0 1px 3px rgba(0,0,0,.5);box-shadow:0 2px 8px rgba(0,0,0,.2);}
.card-fundo-cor:hover{transform:scale(1.05);border-color:#4D96FF;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
</style>
</head>
<body>
<div id="app">
<div id="tip"></div>
<div id="barra-elem">
  <button id="be-plus">+</button>
  <button id="be-minus">−</button>
  <button id="be-del">×</button>
</div>

<div id="ecra-video">
  <img id="bg-isto" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png" alt="">
  <video id="meu-video" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/interativo/voador.mp4" playsinline preload="auto"></video>
  <button id="btn-play" onclick="iniciarVideo()"><img src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png" alt="Play"></button>
  <button id="btn-skip" onclick="fazTransicao()"><img src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/skipa.png" alt="Skip"></button>
</div>
<div id="overlay-fade"></div>

<div id="ecra-quadro">
  <img id="fundo-design" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/interativo/interativo1.png" alt="">
  <div id="camada-fundos">
    <canvas id="fundo-cor" style="display:none;position:absolute;inset:0;width:100%;height:100%;"></canvas>
  </div>
  <canvas id="meu-canvas"></canvas>
  <div id="camada-elementos"></div>
  <div id="barra-botoes">
    <button id="btn-pincel"   onclick="AP('pop-pinceis')"                           onmouseenter="TT(event,'Pincéis')"   onmouseleave="HT()"></button>
    <button id="btn-cores"    onclick="AP('pop-cores')"                             onmouseenter="TT(event,'Cores')"     onmouseleave="HT()"></button>
    <button id="btn-texto"    onclick="AP('pop-texto')"                             onmouseenter="TT(event,'Texto')"     onmouseleave="HT()"></button>
    <button id="btn-elem"     onclick="AP('pop-elem')"                              onmouseenter="TT(event,'Elementos')" onmouseleave="HT()"></button>
    <button id="btn-borracha" onclick="AP('pop-borracha')"                          onmouseenter="TT(event,'Borracha')"  onmouseleave="HT()"></button>
    <button id="btn-undo"     onclick="undo()"                                      onmouseenter="TT(event,'Desfazer')"  onmouseleave="HT()"></button>
    <button id="btn-guardar"  onclick="AP('pop-export')"                            onmouseenter="TT(event,'Guardar')"   onmouseleave="HT()"></button>
    <button id="btn-importar" onclick="document.getElementById('inp-img').click()" onmouseenter="TT(event,'Importar')"  onmouseleave="HT()"></button>
  </div>
  <button id="btn-lock" onclick="toggleLock()">
    <img id="lock-img" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/aloquete.png" alt="lock">

  <img id="btn-idx" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/botao%20(2).png" onclick="irIndice()" style="cursor:pointer;">
</div>

<div class="pop-bg" id="pop-bg" onclick="FPTodos()"></div>
<div id="pop-pinceis" class="pop-ov"><div class="pop-title">🖌️ Pincéis <button class="pop-x" onclick="FP('pop-pinceis')">×</button></div><p style="font-size:13px;font-weight:700;color:#888;margin-bottom:6px">Grossura</p><input type="range" class="sldr" id="sl-gross" min="1" max="50" value="4" oninput="setGross(this.value)"><p style="font-size:12px;color:#4D96FF;font-weight:700;margin:4px 0 16px" id="lbl-gross">4px</p><div class="grid-pb" id="g-pinceis"></div></div>

<div id="pop-cores" class="pop-ov"><div class="pop-title">🎨 Cores <button class="pop-x" onclick="FP('pop-cores')">×</button></div><div id="g-cores"></div><div style="margin-top:16px;display:flex;align-items:center;gap:12px"><label style="font-size:13px;font-weight:700;color:#666">Personalizada:</label><input type="color" id="cor-custom" value="#000000" style="width:44px;height:36px;border:none;cursor:pointer;border-radius:8px" oninput="setCor(this.value,false)"></div></div>

const cv=document.getElementById('meu-canvas'),cx=cv.getContext('2d');
function initCanvas(){
  sizing();window.addEventListener('resize',sizing);
  cv.addEventListener('mousedown',e=>{
    deselAll();
    const r=cv.getBoundingClientRect();
    ini(e.clientX-r.left,e.clientY-r.top);
  });
  cv.addEventListener('mousemove',e=>{
    const r=cv.getBoundingClientRect();cont(e.clientX-r.left,e.clientY-r.top);
  });
  cv.addEventListener('mouseup',fim);cv.addEventListener('mouseleave',fim);
  cv.addEventListener('touchstart',e=>{
    e.preventDefault();deselAll();
    const r=cv.getBoundingClientRect(),t=e.touches[0];
    ini(t.clientX-r.left,t.clientY-r.top);
  },{passive:false});
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    const r=cv.getBoundingClientRect(),t=e.touches[0];
    cont(t.clientX-r.left,t.clientY-r.top);
  },{passive:false});
  cv.addEventListener('touchend',fim);
  atualizarCanvas();
}
function sizing(){
  const r=cv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  const snap=hist.length?hist[hist.length-1]:null;
  cv.width=Math.round(r.width*dpr);cv.height=Math.round(r.height*dpr);cx.scale(dpr,dpr);
  if(snap){const i=new Image();i.src=snap;i.onload=()=>cx.drawImage(i,0,0,r.width,r.height);}
  else salvar();
}
function cfgCtx(){
  if(ferramenta==='borracha'){cx.globalCompositeOperation='destination-out';cx.strokeStyle='rgba(0,0,0,1)';cx.lineWidth=tamBorracha;}
  else{cx.globalCompositeOperation='source-over';cx.strokeStyle=cor;cx.lineWidth=grossura;}
  cx.lineCap=tipoCap;cx.lineJoin='round';
}
function ini(x,y){desenhar=true;cfgCtx();cx.beginPath();cx.moveTo(x,y);}
function cont(x,y){if(!desenhar)return;cx.lineTo(x,y);cx.stroke();}
function fim(){if(!desenhar)return;desenhar=false;cx.closePath();salvar();}
function salvar(){if(hist.length>30)hist.shift();hist.push(cv.toDataURL());}

/* ══════════════════════════════════════════════════════
   UNDO — ordem: elementos → traços → fundo/cenário
══════════════════════════════════════════════════════ */
function undo(){
  const cam=document.getElementById('camada-elementos');
  if(cam.children.length>0){cam.removeChild(cam.lastElementChild);return;}
  if(hist.length>1){
    hist.pop();
    const i=new Image(),r=cv.getBoundingClientRect();
    i.src=hist[hist.length-1];
    i.onload=()=>{cx.clearRect(0,0,r.width,r.height);cx.drawImage(i,0,0,r.width,r.height);};
    return;
  }
  limparFundoCor();
  Array.from(document.getElementById('camada-fundos').children).forEach(el=>{if(el.id!=='fundo-cor')el.remove();});
}

function addElem(url,nome,tipo,ehFundo){
  if(ehFundo){
    const cam=document.getElementById('camada-fundos');
    Array.from(cam.children).forEach(el=>{if(el.id!=='fundo-cor')el.remove();});
    limparFundoCor();
    const m=tipo==='video'?document.createElement('video'):document.createElement('img');
    m.src=url;if(tipo==='video'){m.autoplay=true;m.loop=true;m.muted=true;m.playsinline=true;}
    cam.appendChild(m);FP('pop-elem');return;
  }
  FP('pop-elem');
  requestAnimationFrame(()=>{
    const camEl=document.getElementById('camada-elementos');
    const W=(camEl.getBoundingClientRect().width||camEl.offsetWidth||300);
    const initW=Math.round(W*0.22);
    const d=mkWrap('left:30px;top:30px;width:'+initW+'px;height:'+initW+'px;');
    let m;
    if(tipo==='video'){
      m=document.createElement('video');m.src=url;m.autoplay=true;m.loop=true;m.muted=true;m.playsinline=true;
      m.style.cssText='width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;';
    }else{
      m=document.createElement('img');m.src=url;m.alt=nome||'';
      m.style.cssText='width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;';
      m.onload=()=>{if(m.naturalWidth)d.style.height=Math.round(initW*m.naturalHeight/m.naturalWidth)+'px';};
    }
    const H=mkHandles(d);
    d.appendChild(m);
    colocar(d);
  });
}

/* ══════════════════════════════════════════════════════
   HELPERS ELEMENTOS
══════════════════════════════════════════════════════ */
function mkWrap(s){
  const d=document.createElement('div');d.className='elem-arr';
  d.style.cssText='position:absolute;'+s;return d;
}

// Sem handles visuais dentro do elemento — controlo via #barra-elem flutuante
function mkHandles(d){ return {del:null,res:null,plus:null,minus:null}; }

function redim(d,f){
  const cam=document.getElementById('camada-elementos');
  const tx=d.querySelector('div[style*="font-size"]');
  if(tx&&tx.style.fontSize){
    const fs=Math.min(200,Math.max(8,parseFloat(tx.style.fontSize)*f));tx.style.fontSize=fs+'px';
  }else{
    const nW=Math.min(cam.offsetWidth,Math.max(30,Math.round(d.offsetWidth*f)));
    d.style.width=nW+'px';
    const im=d.querySelector('img');
    if(im&&im.naturalWidth)d.style.height=Math.round(nW*im.naturalHeight/im.naturalWidth)+'px';
    else d.style.height=Math.round(d.offsetHeight*f)+'px';
  }
}

// Coloca elem na camada e configura drag via Pointer Events
function colocar(d){
  const camEl=document.getElementById('camada-elementos');
  camEl.appendChild(d);

  // estado inicial de mobilidade depende do lock
  aplicarMovel(d);

  let ox=0,oy=0,arrastando=false;

  d.addEventListener('pointerdown',e=>{
    if(locked)return;
    if(e.target.closest('button')||e.target.style.cursor==='se-resize')return;
    e.stopPropagation();
    selEl(d);
    const r=d.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;
    arrastando=true;d.setPointerCapture(e.pointerId);
    d.style.cursor='grabbing';
  });
  d.addEventListener('pointermove',e=>{
    if(!arrastando||locked)return;
    const cam=document.getElementById('camada-elementos').getBoundingClientRect();
    const nL=Math.max(0,Math.min(cam.width-d.offsetWidth, e.clientX-cam.left-ox));
    const nT=Math.max(0,Math.min(cam.height-d.offsetHeight,e.clientY-cam.top-oy));
    d.style.left=nL+'px';d.style.top=nT+'px';
    posBarraElem(d);
  });
  d.addEventListener('pointerup',e=>{arrastando=false;d.style.cursor='grab';});
  d.addEventListener('pointercancel',e=>{arrastando=false;});
}

function aplicarMovel(d){
  // aberto=false: .movel activo → z-index 5, pointer-events:all
  // fechado=true: sem .movel → z-index 4, pointer-events:none
  if(locked){d.classList.remove('movel');}
  else{d.classList.add('movel');}
}

function atualizarCanvas(){
  // Canvas sempre com pointer-events:all
  // Quando não locked: o canvas fica ABAIXO dos .movel (z-index 6 vs elementos z-index 5)
  // Mas os .movel têm pointer-events:all e interceptam antes → cliques em elementos → drag
  // Cliques em zonas livres chegam ao canvas → desenha
  // Quando locked: elementos sem pointer-events, canvas recebe tudo → desenha sempre
  cv.style.pointerEvents='all';
  if(locked){
    cv.style.cursor='crosshair';
    cv.style.zIndex='6'; // acima dos elementos
  }else{
    cv.style.cursor='crosshair';
    cv.style.zIndex='4'; // abaixo dos .movel (z-index 5) mas acima dos fundos
  }
}

/* LOCK:
   🔓 aberto  (locked=false) → canvas transparente, elementos movíveis
   🔒 fechado (locked=true)  → canvas recebe tudo, desenha POR CIMA dos elementos */
function toggleLock(){
  locked=!locked;
  document.getElementById('btn-lock').classList.toggle('fechado',locked);
  deselAll();
  document.querySelectorAll('.elem-arr').forEach(aplicarMovel);
  atualizarCanvas();
}

══════════════════════════════════════════════════════ */
function selEl(el){
  if(locked)return;
  deselAll();eS=el;
  // destaca com outline
  el.style.outline='2px dashed rgba(77,150,255,0.8)';
  const be=document.getElementById('barra-elem');be.classList.add('vis');posBarraElem(el);
  document.getElementById('be-plus').onclick= e=>{e.stopPropagation();redim(el,1.25);posBarraElem(el);};
  document.getElementById('be-minus').onclick=e=>{e.stopPropagation();redim(el,0.8);posBarraElem(el);};
  document.getElementById('be-del').onclick=  e=>{e.stopPropagation();el.remove();deselAll();};
}
function deselAll(){
  document.querySelectorAll('.elem-arr').forEach(e=>e.style.outline='none');
  eS=null;document.getElementById('barra-elem').classList.remove('vis');
}
function posBarraElem(el){
  const r=el.getBoundingClientRect(),be=document.getElementById('barra-elem'),bw=be.offsetWidth||120;
  let left=r.left+r.width/2-bw/2,top=r.top-50;
  if(top<4)top=r.bottom+8;if(left<4)left=4;if(left+bw>window.innerWidth-4)left=window.innerWidth-bw-4;
  be.style.left=left+'px';be.style.top=top+'px';
}

// clique fora → deselecciona
document.addEventListener('pointerdown',e=>{
  if(!e.target.closest('.elem-arr')&&!e.target.closest('#barra-elem')&&!e.target.closest('.pop-ov')&&!e.target.closest('#btn-lock'))
    deselAll();
});
document.addEventListener('keydown',e=>{
  if((e.key==='Delete'||e.key==='Backspace')&&e.target.tagName!=='INPUT'){
    const s=eS;if(s){s.remove();deselAll();}
  }
});

// Carrega uma imagem sem taint CORS: tenta crossOrigin, fallback blob via fetch
function carregarImagem(src){
  return new Promise(res=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';

    img.onload = ()=>res(img);
    img.onerror = ()=>res(null);

    // 🔥 FORÇAR SEMPRE proxy (não só r2.dev)
    img.src = API_BASE + "/proxy?url=" + encodeURIComponent(src);
  });
}


function gerarCanvas(cb){
  const r=cv.getBoundingClientRect();
  const W=r.width, H=r.height;
  const dpr=window.devicePixelRatio||1;

  const tmp=document.createElement('canvas');
  tmp.width=Math.round(W*dpr);
  tmp.height=Math.round(H*dpr);
  const c=tmp.getContext('2d');
  c.scale(dpr,dpr);

  // 1. fundo de cor / cenário
  const fc=document.getElementById('fundo-cor');
  if(fc.style.display!=='none'&&fc.width>0){
    c.drawImage(fc,0,0,W,H);
  }else{
    c.fillStyle='#cfc0a0';
    c.fillRect(0,0,W,H);
  }

  // 2. fundo imagem ou vídeo
  const fm=document.querySelector('#camada-fundos img:not([id])');
  const fv=document.querySelector('#camada-fundos video');

  const p1=fm
    ? carregarImagem(fm.getAttribute('src')).then(img=>{if(img)c.drawImage(img,0,0,W,H);})
    : fv
      ? new Promise(res=>{try{c.drawImage(fv,0,0,W,H);}catch(e){}res();})
      : Promise.resolve();

  p1.then(()=>{
    // 3. traços do canvas de desenho
    try{
      c.drawImage(cv,0,0,cv.width,cv.height,0,0,W,H);
    }catch(e){console.warn('draw canvas:',e);}

    // 4. elementos
    const cr=document.getElementById('camada-elementos').getBoundingClientRect();
    const elems=Array.from(document.querySelectorAll('#camada-elementos .elem-arr'));

    const promises=elems.map(el=>{
      const er=el.getBoundingClientRect();
      const x=er.left-cr.left, y=er.top-cr.top, w=er.width, h=er.height;
      const im=el.querySelector('img');
      let txDiv=null;
      el.querySelectorAll('div').forEach(dv=>{if(dv.style.fontSize)txDiv=dv;});

      if(im){
      return carregarImagem(im.getAttribute('src')).then(img=>{
  if (img) c.drawImage(img, x, y, w, h);
         return;
});
      }
      if(txDiv){
        const fs=parseFloat(getComputedStyle(txDiv).fontSize)||32;
        c.save();
        c.font=`${fs}px ${txDiv.style.fontFamily||'sans-serif'}`;
        c.fillStyle=txDiv.style.color||'#000';
        c.fillText(txDiv.textContent,x,y+fs);
        c.restore();
      }
      return Promise.resolve();
    });

    Promise.all(promises).then(()=>cb(tmp));
  });
}

  localStorage.setItem('galeria', JSON.stringify(galeria));

  console.log('Enviado para galeria:', data.key);
  alert('Enviado para a Galeria! ✅');
})
        .catch(e=>{console.error(e);alert('Erro ao enviar: '+e.message);});
      },'image/jpeg',0.92);
    }catch(e){alert('Erro ao exportar: '+e.message);}
  });
}

══════════════════════════════════════════════════════ */
function popularPopups(){
  PINCEIS.forEach(p=>{
    const b=document.createElement('button');b.className='btn-pb';
    b.innerHTML='<div class="prev-ln" style="height:'+Math.min(p.px,14)+'px"></div>'+p.nome;
    b.onclick=()=>{grossura=p.px;tipoCap=p.tipo==='square'?'square':'round';ferramenta='pincel';cv.style.cursor='crosshair';document.getElementById('sl-gross').value=p.px;document.getElementById('lbl-gross').textContent=p.px+'px';document.querySelectorAll('#g-pinceis .btn-pb').forEach(x=>x.classList.remove('a'));b.classList.add('a');};
    document.getElementById('g-pinceis').appendChild(b);
  });
  CORES.forEach(c=>{const d=document.createElement('div');d.className='bl-cor';d.style.background=c;d.dataset.c=c;if(c==='#FFFFFF')d.style.border='3px solid #ddd';d.onclick=()=>setCor(c);document.getElementById('g-cores').appendChild(d);});
  FONTES.forEach(f=>{
    const d=document.createElement('div');d.className='item-f';
    d.innerHTML='<span class="pf" style="font-family:'+f.css+'">'+f.prev+'</span><span class="nf">'+f.nome+'</span>';
    d.onclick=()=>{fonte=f.css;document.querySelectorAll('.item-f').forEach(x=>x.classList.remove('a'));d.classList.add('a');prvTxt();};
    document.getElementById('g-fontes').appendChild(d);
  });
  document.getElementById('inp-txt').addEventListener('input',prvTxt);

  function mkCard(cnt,item,isFundo){
    const card=document.createElement('div');card.className='card-el';
    if(item.tipo==='video'){const v=document.createElement('video');v.src=item.url;v.autoplay=true;v.loop=true;v.muted=true;v.playsinline=true;v.style.cssText='max-width:75%;max-height:72%;object-fit:cover;border-radius:6px;';card.appendChild(v);}
    else{const im=document.createElement('img');im.src=item.url;im.alt='';card.appendChild(im);}
    card.onclick=()=>addElem(item.url,'',item.tipo,isFundo);cnt.appendChild(card);
  }
  ANIMAIS.forEach( e=>mkCard(document.getElementById('tab-animais'), e,false));
  GAROTOS.forEach( e=>mkCard(document.getElementById('tab-garotos'), e,false));
  NATUREZA.forEach(e=>mkCard(document.getElementById('tab-natureza'),e,false));
  CASAS.forEach(   e=>mkCard(document.getElementById('tab-casas'),   e,false));
  TRECOS.forEach(  e=>mkCard(document.getElementById('tab-trecos'),  e,false));
  BRILHOS.forEach( e=>mkCard(document.getElementById('tab-brilhos'), e,false));
  FUNDOS.forEach(  e=>mkCard(document.getElementById('tab-fundos'),  e,true));
  const gc=document.getElementById('g-fundos-cor');
  CENARIOS.forEach(c=>{const card=document.createElement('div');card.className='card-fundo-cor';card.style.background='linear-gradient(to bottom,'+c.g+','+c.g2+')';card.textContent=c.nome;card.onclick=()=>aplicarCenario(c.g,c.g2);gc.appendChild(card);});
}

function showTab(n,btn){
  ['animais','garotos','natureza','casas','trecos','brilhos','fundos','fundos-cor'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===n?(t==='fundos-cor'?'block':'grid'):'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('a'));btn.classList.add('a');
}
function AP(id){document.querySelectorAll('.pop-ov').forEach(p=>{p.classList.remove('open');p.style.display='none';});const el=document.getElementById(id);el.style.display='block';requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('open')));document.getElementById('pop-bg').classList.add('open');}
function FP(id){const el=document.getElementById(id);el.classList.remove('open');setTimeout(()=>el.style.display='none',220);document.getElementById('pop-bg').classList.remove('open');}
function FPTodos(){document.querySelectorAll('.pop-ov').forEach(p=>{p.classList.remove('open');setTimeout(()=>p.style.display='none',220);});document.getElementById('pop-bg').classList.remove('open');}
const tip=document.getElementById('tip');
function TT(e,t){tip.textContent=t;tip.style.left=(e.clientX+10)+'px';tip.style.top=(e.clientY+26)+'px';tip.classList.add('v');}
function HT(){tip.classList.remove('v');}
function irIndice(){window.location.href='indice.html?skip=1';}
