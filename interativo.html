<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Clube Interativo</title>
<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;}
#app{position:relative;width:100%;height:100%;}

/* ── FIX: remover todos os highlights/luzes dos botões ── */
*{outline:none !important;-webkit-tap-highlight-color:transparent !important;-webkit-touch-callout:none;}
button{-webkit-appearance:none;appearance:none;box-shadow:none !important;border:none;background:transparent;}
button:focus,button:active,button:hover{outline:none !important;box-shadow:none !important;background:transparent;}

#ecra-video{position:absolute;inset:0;z-index:100;transition:opacity 1s ease;}
#ecra-video.oculto{opacity:0;pointer-events:none;}
#bg-isto{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;}
#meu-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1;}
#btn-play{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:10%;border:none;background:transparent;cursor:pointer;z-index:10;padding:0;box-shadow:none !important;}
#btn-play img{width:100%;height:auto;display:block;filter:drop-shadow(0 0 14px rgba(0,0,0,.55));}

/* skip button - mesma posição que o btn-idx */
#btn-skip{position:fixed;bottom:3.5%;right:3.4%;width:8%;height:auto;cursor:pointer;z-index:200;border:none;background:transparent;padding:0;box-shadow:none !important;}
#btn-skip img{width:100%;height:auto;display:block;}

#overlay-fade{position:absolute;inset:0;z-index:150;background:#fff;opacity:0;pointer-events:none;transition:opacity .6s ease;}
#overlay-fade.ativo{opacity:1;pointer-events:all;}
#ecra-quadro{position:absolute;width:100%;height:115%;top:-28px;left:0;z-index:5;display:none;}
#ecra-quadro.visivel{display:block;}
#fundo-design{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;display:block;user-select:none;pointer-events:none;z-index:1;}
#camada-fundos{position:absolute;left:9.5%;top:14.7%;width:80.8%;height:70.5%;z-index:2;overflow:hidden;pointer-events:none;}
#camada-fundos video,#camada-fundos img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
#fundo-cor{position:absolute;inset:0;width:100%;height:100%;}
#meu-canvas{position:absolute;left:9.5%;top:14.7%;width:80.8%;height:70.5%;background:transparent;cursor:crosshair;z-index:3;touch-action:none;}
/* camada de elementos sempre visível, pointer-events só nos .elem-arr */
#camada-elementos{position:absolute;left:9.5%;top:14.7%;width:80.8%;height:70.5%;z-index:7;pointer-events:none;overflow:hidden;}
#barra-botoes{position:absolute;top:0;left:0;width:100%;height:13.5%;z-index:10;pointer-events:none;}
#barra-botoes button{position:absolute;background:transparent;border:none;cursor:pointer;pointer-events:all;border-radius:50%;top:28%;height:62%;aspect-ratio:1;box-shadow:none !important;}
#barra-botoes button:focus,#barra-botoes button:active{outline:none !important;box-shadow:none !important;background:transparent !important;}
#btn-pincel   { left: 12.2%; }
#btn-cores    { left: 22.3%; }
#btn-texto    { left: 32.4%; }
#btn-elem     { left: 42.5%; }
#btn-borracha { left: 52.6%; }
#btn-undo     { left: 62.7%; }
#btn-guardar  { left: 72.8%; }
#btn-importar { left: 82.9%; }
#btn-lock{position:absolute;right:6%;top:12%;width:5%;height:auto;background:transparent;border:none;cursor:pointer;pointer-events:all;z-index:20;box-shadow:none !important;padding:0;}
#btn-lock img{width:100%;height:auto;display:block;}
#btn-idx{position:fixed;bottom:3.5%;right:3.4%;width:8%;height:auto;cursor:pointer;z-index:9999;opacity:0;pointer-events:none;transition:opacity .5s;box-shadow:none !important;}
#btn-idx.show{opacity:1;pointer-events:all;}

/* cada elemento recebe eventos individualmente — a camada em si é transparente */
.elem-arr{position:absolute;cursor:grab;user-select:none;touch-action:none;pointer-events:all;}
.elem-arr:active{cursor:grabbing;}
.elem-arr img,.elem-arr video{display:block;width:100%;height:auto;pointer-events:none;}
.hdl-resize{display:none;}
.hdl-del{display:none;}
.hdl-plus{display:none;}
.hdl-minus{display:none;}

#barra-elem{position:fixed;display:none;z-index:9998;background:rgba(20,20,40,.92);border-radius:30px;padding:5px 8px;gap:6px;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:all;}
#barra-elem.vis{display:flex;}
#barra-elem button{width:34px;height:34px;border-radius:50%;border:2.5px solid white !important;color:white;font-size:17px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:transform .1s;}
#barra-elem button:hover{transform:scale(1.15);}
#be-plus{background:#6BCB77 !important;}
#be-minus{background:#FFB703 !important;}
#be-del{background:#FF6B6B !important;}

.txt-elem{display:block;outline:none;white-space:nowrap;cursor:text;pointer-events:all;line-height:1.2;}
#tip{position:absolute;background:rgba(20,20,40,.93);color:white;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;pointer-events:none;z-index:9999;opacity:0;transition:opacity .2s;white-space:nowrap;font-family:'Nunito',sans-serif;}
#tip.v{opacity:1;}
.pop-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;}
.pop-bg.open{display:block;}
.pop-ov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);width:660px;max-width:90vw;background:white;border-radius:20px;padding:24px;max-height:75vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:601;display:none;opacity:0;transition:opacity .2s,transform .2s;}
.pop-ov.open{opacity:1;transform:translate(-50%,-50%) scale(1);}
.pop-title{font-family:'Pacifico',cursive;font-size:1.2rem;color:#1a1a2e;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.pop-x{width:34px;height:34px;border-radius:50%;border:none;background:#f0f0f0 !important;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#333;}
.pop-x:hover{background:#ddd !important;}
.sldr{-webkit-appearance:none;width:100%;height:8px;border-radius:4px;background:#e0e0e0;outline:none;cursor:pointer;accent-color:#4D96FF;}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab{padding:7px 16px;border-radius:20px;border:2px solid #eee;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;background:white;transition:all .15s;color:#333;}
.tab:hover,.tab.a{background:#4D96FF !important;color:white;border-color:#4D96FF;}
.grid-pb{display:flex;flex-wrap:wrap;gap:10px;}
.btn-pb{padding:10px 14px;border-radius:12px;border:2px solid #eee;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;background:white !important;display:flex;align-items:center;gap:8px;transition:all .15s;color:#333;}
.btn-pb:hover,.btn-pb.a{border-color:#4D96FF;background:#f0f7ff !important;}
.prev-ln{background:#1a1a2e;border-radius:4px;width:36px;}
#g-cores{display:flex;flex-wrap:wrap;gap:10px;}
.bl-cor{width:44px;height:44px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.bl-cor:hover{transform:scale(1.15);}
.bl-cor.sel{border-color:#1a1a2e;transform:scale(1.2);}
.g-el{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:12px;}
.card-el{border-radius:14px;border:2px solid #eee;cursor:pointer;transition:all .15s;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fafafa;padding:6px;overflow:hidden;}
.card-el:hover{border-color:#4D96FF;transform:scale(1.06);}
.card-el img,.card-el video{max-width:75%;max-height:72%;object-fit:contain;}
.card-el span{font-size:9px;color:#888;text-align:center;margin-top:4px;font-weight:700;}
#g-fontes{display:flex;flex-direction:column;gap:8px;}
.item-f{padding:12px 16px;border-radius:12px;border:2px solid #eee;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;background:white;}
.item-f:hover{border-color:#4D96FF;background:#f0f7ff;}
.item-f.a{border-color:#4D96FF;background:#e8f3ff;}
.pf{font-size:1.2rem;color:#1a1a2e;}.nf{font-size:11px;color:#aaa;}
.btn-ex{width:100%;padding:16px;border-radius:14px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;display:flex;align-items:center;gap:12px;margin-bottom:12px;transition:transform .15s;justify-content:center;}
.btn-ex:hover{transform:scale(1.02);}
.azul{background:#4D96FF !important;color:white;}.verde{background:#6BCB77 !important;color:white;}
.g-fundos-cor{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:16px;}
.card-fundo-cor{border-radius:14px;border:3px solid transparent;cursor:pointer;transition:all .15s;height:70px;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:white;text-shadow:0 1px 3px rgba(0,0,0,.5);box-shadow:0 2px 8px rgba(0,0,0,.2);}
.card-fundo-cor:hover{transform:scale(1.05);border-color:#4D96FF;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
</style>
</head>
<body>
<div id="app">
<div id="tip"></div>
<div id="barra-elem">
  <button id="be-plus"  title="Aumentar">+</button>
  <button id="be-minus" title="Diminuir">−</button>
  <button id="be-del"   title="Apagar">×</button>
</div>

<div id="ecra-video">
  <img id="bg-isto" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png" alt="">
  <video id="meu-video" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/interativo/voador.mp4" playsinline preload="auto"></video>
  <button id="btn-play" onclick="iniciarVideo()"><img src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png" alt="Play"></button>
  <!-- SKIP: mesma posição que btn-idx, salta o vídeo -->
  <button id="btn-skip"
          onmouseenter="this.firstElementChild.src='https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/r-pido-antes-que-eu-mude-de-id-12-04-2026.png'"
          onmouseleave="this.firstElementChild.src='https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/skipa-l-12-04-2026.png'"
          onclick="fazTransicao()">
    <img src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/skipa-l-12-04-2026.png" alt="Skip">
  </button>
</div>

<div id="overlay-fade"></div>

<div id="ecra-quadro">
  <img id="fundo-design" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/interativo/interativo1.png" alt="">
  <div id="camada-fundos">
    <canvas id="fundo-cor" style="position:absolute;inset:0;width:100%;height:100%;display:none;"></canvas>
  </div>
  <canvas id="meu-canvas"></canvas>
  <div id="camada-elementos"></div>
  <div id="barra-botoes">
    <button id="btn-pincel"   onclick="AP('pop-pinceis')"                           onmouseenter="TT(event,'Pincéis')"   onmouseleave="HT()"></button>
    <button id="btn-cores"    onclick="AP('pop-cores')"                             onmouseenter="TT(event,'Cores')"     onmouseleave="HT()"></button>
    <button id="btn-texto"    onclick="AP('pop-texto')"                             onmouseenter="TT(event,'Texto')"     onmouseleave="HT()"></button>
    <button id="btn-elem"     onclick="AP('pop-elem')"                              onmouseenter="TT(event,'Elementos')" onmouseleave="HT()"></button>
    <button id="btn-borracha" onclick="AP('pop-borracha')"                          onmouseenter="TT(event,'Borracha')"  onmouseleave="HT()"></button>
    <button id="btn-undo"     onclick="undo()"                                      onmouseenter="TT(event,'Undo')"      onmouseleave="HT()"></button>
    <button id="btn-guardar"  onclick="AP('pop-export')"                            onmouseenter="TT(event,'Guardar')"   onmouseleave="HT()"></button>
    <button id="btn-importar" onclick="document.getElementById('inp-img').click()" onmouseenter="TT(event,'Importar')"  onmouseleave="HT()"></button>
  </div>
  <button id="btn-lock" onclick="toggleLock()">
    <img id="lock-img" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/aloquete.png" alt="lock">
  </button>
  <img id="btn-idx" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/botao%20(2).png" onclick="irIndice()" style="cursor:pointer;">
</div>

<div class="pop-bg" id="pop-bg" onclick="FPTodos()"></div>
<div id="pop-pinceis" class="pop-ov"><div class="pop-title">🖌️ Pincéis <button class="pop-x" onclick="FP('pop-pinceis')">×</button></div><p style="font-size:13px;font-weight:700;color:#888;margin-bottom:6px">Grossura</p><input type="range" class="sldr" id="sl-gross" min="1" max="50" value="4" oninput="setGross(this.value)"><p style="font-size:12px;color:#4D96FF;font-weight:700;margin:4px 0 16px" id="lbl-gross">4px</p><div class="grid-pb" id="g-pinceis"></div></div>
<div id="pop-borracha" class="pop-ov"><div class="pop-title">🧹 Borracha <button class="pop-x" onclick="FP('pop-borracha')">×</button></div><p style="font-size:13px;font-weight:700;color:#888;margin-bottom:6px">Tamanho</p><input type="range" class="sldr" id="sl-borracha" min="5" max="100" value="20" oninput="setBorracha(this.value)"><p style="font-size:12px;color:#4D96FF;font-weight:700;margin:4px 0 16px" id="lbl-borracha">20px</p><div class="grid-pb"><button class="btn-pb" onclick="setBorracha(10);document.getElementById('sl-borracha').value=10;">Pequena 10px</button><button class="btn-pb" onclick="setBorracha(20);document.getElementById('sl-borracha').value=20;">Média 20px</button><button class="btn-pb" onclick="setBorracha(40);document.getElementById('sl-borracha').value=40;">Grande 40px</button><button class="btn-pb" onclick="setBorracha(80);document.getElementById('sl-borracha').value=80;">Extra 80px</button></div></div>
<div id="pop-cores" class="pop-ov"><div class="pop-title">🎨 Cores <button class="pop-x" onclick="FP('pop-cores')">×</button></div><div id="g-cores"></div><div style="margin-top:16px;display:flex;align-items:center;gap:12px"><label style="font-size:13px;font-weight:700;color:#666">Personalizada:</label><input type="color" id="cor-custom" value="#000000" style="width:44px;height:36px;border:none;cursor:pointer;border-radius:8px" oninput="setCor(this.value,false)"></div></div>
<div id="pop-texto" class="pop-ov"><div class="pop-title">🔤 Texto <button class="pop-x" onclick="FP('pop-texto')">×</button></div><input type="text" id="inp-txt" placeholder="Escreve aqui..." style="width:100%;padding:12px;border-radius:10px;border:2px solid #eee;font-size:15px;font-family:'Nunito',sans-serif;outline:none;margin-bottom:12px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><label style="font-size:13px;font-weight:700;color:#666">Tamanho:</label><input type="range" class="sldr" id="sl-tam" min="10" max="120" value="32" style="width:140px" oninput="prvTxt()"><span id="lbl-tam" style="font-size:12px;color:#4D96FF;font-weight:700">32px</span></div><div id="prv-txt" style="min-height:44px;padding:10px;background:#f5f5f5;border-radius:10px;margin-bottom:14px;"></div><div id="g-fontes"></div><button onclick="addTexto()" style="margin-top:14px;width:100%;padding:13px;background:#4D96FF;color:white;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer">➕ Adicionar</button></div>

<div id="pop-elem" class="pop-ov">
  <div class="pop-title">🖼️ Elementos <button class="pop-x" onclick="FP('pop-elem')">×</button></div>
  <div class="tabs">
    <button class="tab a" onclick="showTab('animais',this)">🐾 Animais</button>
    <button class="tab" onclick="showTab('garotos',this)">👧 Garotos</button>
    <button class="tab" onclick="showTab('natureza',this)">🌿 Natureza</button>
    <button class="tab" onclick="showTab('casas',this)">🏠 Casas</button>
    <button class="tab" onclick="showTab('trecos',this)">🎁 Trecos</button>
    <button class="tab" onclick="showTab('brilhos',this)">✨ Brilhos</button>
    <button class="tab" onclick="showTab('fundos',this)">🌅 Fundos</button>
    <button class="tab" onclick="showTab('fundos-cor',this)">🎨 Cenários</button>
  </div>
  <div id="tab-animais" class="g-el"></div>
  <div id="tab-garotos" class="g-el" style="display:none"></div>
  <div id="tab-natureza" class="g-el" style="display:none"></div>
  <div id="tab-casas" class="g-el" style="display:none"></div>
  <div id="tab-trecos" class="g-el" style="display:none"></div>
  <div id="tab-brilhos" class="g-el" style="display:none"></div>
  <div id="tab-fundos" class="g-el" style="display:none"></div>
  <div id="tab-fundos-cor" style="display:none">
    <p style="font-size:13px;font-weight:700;color:#888;margin-bottom:12px">Escolhe um cenário ou cria o teu:</p>
    <div class="g-fundos-cor" id="g-fundos-cor"></div>
    <div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center">
      <label style="font-size:13px;font-weight:700;color:#666">Cor personalizada:</label>
      <input type="color" id="cor-fundo-1" value="#87CEEB" style="width:44px;height:36px;border:none;cursor:pointer;border-radius:8px">
      <label style="font-size:13px;font-weight:700;color:#666">+ Degradê:</label>
      <input type="color" id="cor-fundo-2" value="#87CEEB" style="width:44px;height:36px;border:none;cursor:pointer;border-radius:8px">
      <button onclick="aplicarCorPersonalizada()" style="padding:10px 18px;background:#4D96FF;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">Aplicar</button>
      <button onclick="limparFundoCor()" style="padding:10px 18px;background:#eee;color:#333;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">Limpar</button>
    </div>
  </div>
</div>

<div id="pop-export" class="pop-ov" style="max-width:420px"><div class="pop-title">💾 Guardar <button class="pop-x" onclick="FP('pop-export')">×</button></div><button class="btn-ex azul" onclick="expDispositivo()">📱 Guardar no Dispositivo</button><button class="btn-ex verde" onclick="expGaleria()">🖼️ Enviar para a Galeria</button></div>
<input type="file" id="inp-img" accept="image/*,video/*" style="display:none" onchange="importar(event)">
</div>

const ANIMAIS=[

const cv=document.getElementById('meu-canvas'),cx=cv.getContext('2d');
function initCanvas(){
  sizing();

  // canvas recebe sempre eventos de desenho; o lock só afeta os elementos
  cv.addEventListener('mousedown',e=>{ini(e.offsetX,e.offsetY);});
  cv.addEventListener('mousemove',e=>cont(e.offsetX,e.offsetY));
  cv.addEventListener('mouseup',fim);
  cv.addEventListener('mouseleave',fim);
  cv.addEventListener('touchstart',e=>{e.preventDefault();const p=tPos(e.touches[0]);ini(p.x,p.y);},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();const p=tPos(e.touches[0]);cont(p.x,p.y);},{passive:false});
  cv.addEventListener('touchend',fim);
  cv.style.zIndex='6';
  cv.style.pointerEvents='all';
}

// lock=false → pode mover elementos
// lock=true  → elementos fixos (pointer-events:none nos elem-arr), mas continua a desenhar
let locked=false;

function aplicarLock(){
  document.querySelectorAll('.elem-arr').forEach(el=>{
    el.style.pointerEvents=locked?'none':'all';
  });

}
function sizing(){
  const r=cv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  const snap=hist.length?hist[hist.length-1]:null;
  cv.width=r.width*dpr;cv.height=r.height*dpr;
  cx.setTransform(1,0,0,1,0,0);
  cx.scale(dpr,dpr);
  if(snap){const i=new Image();i.src=snap;i.onload=()=>cx.drawImage(i,0,0,r.width,r.height);}
  else guardar();
}
function tPos(t){const r=cv.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top};}
function cfgCtx(){
  if(ferramenta==='borracha'){cx.globalCompositeOperation='destination-out';cx.strokeStyle='rgba(0,0,0,1)';cx.lineWidth=tamBorracha;}
  else{cx.globalCompositeOperation='source-over';cx.strokeStyle=cor;cx.lineWidth=grossura;}
  cx.lineCap=tipoCap;cx.lineJoin='round';
}
function ini(x,y){desenhar=true;cfgCtx();cx.beginPath();cx.moveTo(x,y);}
function cont(x,y){if(!desenhar)return;cx.lineTo(x,y);cx.stroke();}
function fim(){if(!desenhar)return;desenhar=false;cx.closePath();guardar();}
function guardar(){if(hist.length>30)hist.shift();hist.push(cv.toDataURL());}
function undo(){
  const cam=document.getElementById('camada-elementos');
  if(cam.children.length>0){cam.removeChild(cam.lastChild);return;}
  if(hist.length>1){hist.pop();const i=new Image();i.src=hist[hist.length-1];const r=cv.getBoundingClientRect();i.onload=()=>{cx.clearRect(0,0,r.width,r.height);cx.drawImage(i,0,0,r.width,r.height);};return;}
  limparFundoCor();
  Array.from(document.getElementById('camada-fundos').children).forEach(el=>{if(el.id!=='fundo-cor')el.remove();});
}

function aplicarCenario(c1,c2){

function addElem(url,nome,tipo,ehFundo){
  if(ehFundo){

    }else{
      m=document.createElement('img');m.src=url;m.alt=nome||'';
    }
    cam.appendChild(m);FP('pop-elem');return;
  }

  FP('pop-elem');

  requestAnimationFrame(function(){
    const camEl=document.getElementById('camada-elementos');
    const r=camEl.getBoundingClientRect();

      m.style.cssText='width:100%;height:100%;object-fit:contain;display:block;';
    }else{
      m=document.createElement('img');
      m.src=url;m.alt=nome||'';
      m.style.cssText='width:100%;height:100%;object-fit:contain;display:block;';
      m.onload=function(){
        if(m.naturalWidth>0){
          d.style.height=Math.round(initW*(m.naturalHeight/m.naturalWidth))+'px';
        }
      };
      m.onerror=function(){
        d.style.background='rgba(255,0,0,0.3)';

    const{hdlDel,hdlRes,hdlPlus,hdlMinus}=mkH(d);

function mkW(s){const d=document.createElement('div');d.className='elem-arr';d.style.cssText='position:absolute;'+s;return d;}
function mkH(d){
  const hd=document.createElement('div');hd.className='hdl-del';hd.textContent='×';

function redimElem(d,factor){
  const cam=document.getElementById('camada-elementos');
  const maxW=cam.offsetWidth,maxH=cam.offsetHeight;
  const curW=d.offsetWidth,curH=d.offsetHeight;
  const newW=Math.min(maxW,Math.max(30,Math.round(curW*factor)));
  const newH=Math.min(maxH,Math.max(30,Math.round(curH*factor)));
  const tx=d.querySelector('.txt-elem');
  if(tx){const fs=Math.min(200,Math.max(8,parseFloat(tx.style.fontSize||'32')*factor));tx.style.fontSize=fs+'px';}
  else{d.style.width=newW+'px';d.style.height=newH+'px';}
}
function ativaDrag(el,hdlRes,hdlDel){
  el.addEventListener('mousedown',e=>{
    if(e.target===hdlRes||e.target===hdlDel)return;
    e.stopPropagation();selEl(el);
    const r=el.getBoundingClientRect();offX=e.clientX-r.left;offY=e.clientY-r.top;eS=el;
  });
  el.addEventListener('touchstart',e=>{
    if(e.target===hdlRes||e.target===hdlDel)return;
    e.stopPropagation();selEl(el);
    const r=el.getBoundingClientRect();offX=e.touches[0].clientX-r.left;offY=e.touches[0].clientY-r.top;eS=el;
  },{passive:true});
  hdlRes.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();selEl(el);resizing=true;eS=el;resX=e.clientX;resW=el.offsetWidth;});
  hdlRes.addEventListener('touchstart',e=>{e.stopPropagation();selEl(el);resizing=true;eS=el;resX=e.touches[0].clientX;resW=el.offsetWidth;},{passive:true});

function posBarraElem(el){

function mvG(mx,my){

function gerarCanvas(cb){
  const dpr=window.devicePixelRatio||1,r=cv.getBoundingClientRect();
  const tmp=document.createElement('canvas');
  tmp.width=Math.round(r.width*dpr);tmp.height=Math.round(r.height*dpr);
  const c=tmp.getContext('2d');c.scale(dpr,dpr);
  const W=r.width,H=r.height;

  const fc=document.getElementById('fundo-cor');
  if(fc.style.display!=='none'){try{c.drawImage(fc,0,0,W,H);}catch(e){c.fillStyle='#cfc0a0';c.fillRect(0,0,W,H);}}
  else{c.fillStyle='#cfc0a0';c.fillRect(0,0,W,H);}

  const fm=document.querySelector('#camada-fundos img:not([id])');
  const fv=document.querySelector('#camada-fundos video');
  const p1=fm?new Promise(res=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{c.drawImage(i,0,0,W,H);res();};i.onerror=res;i.src=fm.src+'?v=1';}):
             fv?new Promise(res=>{try{c.drawImage(fv,0,0,W,H);}catch(e){}res();}):
             Promise.resolve();

  p1.then(()=>{
    try{c.drawImage(cv,0,0,W,H);}catch(e){}

    const cr=document.getElementById('camada-elementos').getBoundingClientRect();
    const p2=Array.from(document.querySelectorAll('#camada-elementos .elem-arr')).map(el=>{
      const er=el.getBoundingClientRect();
      const x=er.left-cr.left,y=er.top-cr.top,w=er.width,h=er.height;
      const im=el.querySelector('img');
      const tx=el.querySelector('.txt-elem');
      if(im){
        return new Promise(res=>{
          const i=new Image();i.crossOrigin='anonymous';
          i.onload=()=>{c.drawImage(i,x,y,w,h);res();};
          i.onerror=()=>{
            try{c.drawImage(im,x,y,w,h);}catch(e){}res();
          };
          i.src=im.src;
        });
      }
      if(tx){
        const fs=parseFloat(getComputedStyle(tx).fontSize)||32;
        c.save();c.font=fs+'px '+tx.style.fontFamily;
        c.fillStyle=tx.style.color||'#000';
        c.fillText(tx.textContent,x,y+fs);c.restore();
      }
      return Promise.resolve();
    });

    Promise.all(p2).then(()=>cb(tmp));
  });
}
function expDispositivo(){
  gerarCanvas(t=>{
    try{
      const a=document.createElement('a');
      a.download='clube-desenho.png';
      a.href=t.toDataURL('image/png');
      document.body.appendChild(a);a.click();
      setTimeout(()=>document.body.removeChild(a),100);
    }catch(e){alert('Erro ao guardar: '+e.message);}
    FP('pop-export');
  });
}
function expGaleria(){
  gerarCanvas(function(t){
    var path='desenho_'+Date.now()+'.jpg';
    try{
      t.toBlob(function(blob){
        if(!blob){alert('Erro ao gerar imagem');return;}
        fetch(STORAGE_UP+path,{method:'POST',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob})
        .then(function(r){if(!r.ok)throw new Error('Upload falhou: '+r.status);
          return fetch(SURL+'/rest/v1/galeria',{method:'POST',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({imagem:STORAGE_URL+path,path:path})});
        })
        .then(function(){FP('pop-export');alert('Enviado para a Galeria!');})
        .catch(function(err){console.error(err);alert('Erro ao enviar: '+err.message);});
      },'image/jpeg',0.92);
    }catch(e){alert('Erro (canvas tainted?): '+e.message);}
  });
}

// ── POPULAR POPUPS ────────────────────────────────────────────────────────────
function popularPopups(){
  PINCEIS.forEach(p=>{
    const b=document.createElement('button');b.className='btn-pb';
    b.innerHTML='<div class="prev-ln" style="height:'+Math.min(p.px,14)+'px"></div>'+p.nome;
    b.onclick=()=>{grossura=p.px;tipoCap=p.tipo==='square'?'square':'round';ferramenta='pincel';cv.style.cursor='crosshair';document.getElementById('sl-gross').value=p.px;document.getElementById('lbl-gross').textContent=p.px+'px';document.querySelectorAll('.btn-pb').forEach(x=>x.classList.remove('a'));b.classList.add('a');};
    document.getElementById('g-pinceis').appendChild(b);
  });
  CORES.forEach(c=>{const d=document.createElement('div');d.className='bl-cor';d.style.background=c;d.dataset.c=c;if(c==='#FFFFFF')d.style.border='3px solid #ddd';d.onclick=()=>setCor(c);document.getElementById('g-cores').appendChild(d);});
  
  function mkCard(container,item,ehFundo){
    const card=document.createElement('div');card.className='card-el';
    const tipo=item.tipo||'img';
    if(tipo==='video'){
      const v=document.createElement('video');v.src=item.url;v.autoplay=true;v.loop=true;v.muted=true;v.playsinline=true;
      v.style.cssText='max-width:75%;max-height:72%;object-fit:cover;border-radius:6px;';
      card.appendChild(v);
    }else{
      const im=document.createElement('img');im.src=item.url;im.alt='';card.appendChild(im);
    }
    card.onclick=()=>addElem(item.url,item.nome||'',tipo,ehFundo);
    container.appendChild(card);
  }

  ANIMAIS.forEach(e=>mkCard(document.getElementById('tab-animais'),e,false));
  GAROTOS.forEach(e=>mkCard(document.getElementById('tab-garotos'),e,false));
  NATUREZA.forEach(e=>mkCard(document.getElementById('tab-natureza'),e,false));
  CASAS.forEach(e=>mkCard(document.getElementById('tab-casas'),e,false));
  TRECOS.forEach(e=>mkCard(document.getElementById('tab-trecos'),e,false));
  BRILHOS.forEach(e=>mkCard(document.getElementById('tab-brilhos'),e,false));
  FUNDOS.forEach(e=>mkCard(document.getElementById('tab-fundos'),e,true));

  const gc=document.getElementById('g-fundos-cor');
  CENARIOS.forEach(c=>{
    const card=document.createElement('div');card.className='card-fundo-cor';
    card.style.background='linear-gradient(to bottom,'+c.g+','+c.g2+')';
    card.textContent=c.nome;card.onclick=()=>aplicarCenario(c.g,c.g2);gc.appendChild(card);
  });
  FONTES.forEach(f=>{
    const d=document.createElement('div');d.className='item-f';
    d.innerHTML='<span class="pf" style="font-family:'+f.css+'">'+f.prev+'</span><span class="nf">'+f.nome+'</span>';
    d.onclick=()=>{fonte=f.css;document.querySelectorAll('.item-f').forEach(x=>x.classList.remove('a'));d.classList.add('a');prvTxt();};
    document.getElementById('g-fontes').appendChild(d);
  });
  document.getElementById('inp-txt').addEventListener('input',prvTxt);
}

function showTab(n,btn){
  ['animais','garotos','natureza','casas','trecos','brilhos','fundos','fundos-cor'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    el.style.display=t===n?(t==='fundos-cor'?'block':'grid'):'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('a'));btn.classList.add('a');
}
function AP(id){
  document.querySelectorAll('.pop-ov').forEach(p=>{p.classList.remove('open');p.style.display='none';});
  const el=document.getElementById(id);el.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('open')));
  document.getElementById('pop-bg').classList.add('open');
}
function FP(id){
  const el=document.getElementById(id);el.classList.remove('open');
  setTimeout(()=>{el.style.display='none';},220);
  document.getElementById('pop-bg').classList.remove('open');
}
function FPTodos(){
  document.querySelectorAll('.pop-ov').forEach(p=>{p.classList.remove('open');setTimeout(()=>p.style.display='none',220);});
  document.getElementById('pop-bg').classList.remove('open');
}

function HT(){tip.classList.remove('v');}
