<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interativo</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;}
    
    #video-container{position:fixed;inset:0;z-index:10;}
    #meu-video{width:100%;height:100%;object-fit:cover;}
    #btn-play{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:12%;z-index:20;cursor:pointer;}
    
    #canvas-container{position:fixed;inset:0;z-index:5;display:none;background:#f8f0e0;}
    #meu-canvas{width:100%;height:100%;background:transparent;cursor:crosshair;}
    
    #btn-idx{position:fixed;bottom:5%;right:5%;width:8%;z-index:30;cursor:pointer;}
</style>
</head>
<body>

<div id="video-container">
  <video id="meu-video" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/interativo/voador.mp4" playsinline preload="auto"></video>
  <img id="btn-play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png" onclick="iniciarVideo()">
</div>

<div id="canvas-container">
  <canvas id="meu-canvas"></canvas>
  <img id="btn-idx" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/botao%20(2).png" onclick="irIndice()">
</div>

<script>
const videoContainer = document.getElementById('video-container');
const canvasContainer = document.getElementById('canvas-container');
const video = document.getElementById('meu-video');
const canvas = document.getElementById('meu-canvas');
const ctx = canvas.getContext('2d');

function iniciarVideo(){
  videoContainer.style.display = 'none';
  canvasContainer.style.display = 'block';
  resizeCanvas();
}

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

window.addEventListener('resize', resizeCanvas);

let drawing = false;

canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
canvas.addEventListener('mousemove', e => { if(drawing){ ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); }});
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);

function irIndice(){
  window.location.href = 'indice.html?skip=1';
}
</script>
</body>
</html>
