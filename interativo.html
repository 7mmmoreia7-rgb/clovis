<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Interativo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      margin:0;
      font-family:'Nunito',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      background:#111;
      color:#222;
      overflow:hidden;
    }

    /* ECRÃ VIDEO / INTRO */
    #ecra-video{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      z-index:10;
    }
    #meu-video{
      max-width:100%;
      max-height:100%;
      display:block;
    }

    /* PLAY COM SOMBRA DISCRETA */
    #btn-play{
      position:absolute;
      width:90px;
      height:90px;
      border-radius:50%;
      border:none;
      cursor:pointer;
      background:#ffffffcc;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 18px rgba(0,0,0,0.6);
      transition:transform .15s, box-shadow .15s, background .15s;
    }
    #btn-play::before{
      content:'▶';
      font-size:34px;
      color:#333;
      margin-left:4px;
    }
    #btn-play:hover{
      transform:scale(1.05);
      box-shadow:0 0 26px rgba(0,0,0,0.9);
      background:#fff;
    }

    /* BOTÃO SKIP / ÍNDICE */
    #btn-idx{
      position:fixed;
      right:24px;
      bottom:64px; /* MAIS PARA CIMA, NÃO COLADO AO FUNDO */
      width:180px;
      height:52px;
      background:transparent;
      border:none;
      cursor:pointer;
      background-image:url('https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/skipa-l-12-04-2026.png');
      background-size:contain;
      background-repeat:no-repeat;
      background-position:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s;
      z-index:20;
    }
    #btn-idx.show{
      opacity:1;
      pointer-events:auto;
    }
    #btn-idx:hover{
      background-image:url('https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/r-pido-antes-que-eu-mude-de-id-12-04-2026.png');
    }

    /* TRANSIÇÃO */
    #overlay-fade{
      position:fixed;
      inset:0;
      background:#000;
      opacity:0;
      pointer-events:none;
      transition:opacity .6s;
      z-index:15;
    }
    #overlay-fade.ativo{
      opacity:1;
      pointer-events:auto;
    }

    /* ECRÃ QUADRO */
    #ecra-quadro{
      position:fixed;
      inset:0;
      background:#f0e4c0;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .4s;
      z-index:1;
    }
    #ecra-quadro.visivel{
      opacity:1;
      pointer-events:auto;
    }

    .quadro-wrap{
      position:relative;
      width:90vw;
      max-width:1100px;
      height:80vh;
      max-height:700px;
      background:#fdf7e6;
      border-radius:18px;
      box-shadow:0 10px 40px rgba(0,0,0,0.25);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .top-bar{
      height:52px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 16px;
      background:#f5e4c0;
      border-bottom:1px solid #e0cfa5;
    }
    .top-left{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .top-right{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .btn-top{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      background:#fff;
      color:#444;
      box-shadow:0 0 0 1px rgba(0,0,0,0.05);
      display:flex;
      align-items:center;
      gap:6px;
    }
    .btn-top:hover{
      background:#fdfdfd;
      box-shadow:0 0 0 1px rgba(0,0,0,0.12);
    }

    /* LOCK – BRILHO BRANCO, ABERTO = TRABALHAR, FECHADO = DESENHAR */
    #btn-lock{
      position:relative;
      width:40px;
      height:40px;
      border-radius:50%;
      border:none;
      cursor:pointer;
      background:#fdf7e6;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 0 2px rgba(255,255,255,0.9),0 0 16px rgba(255,255,255,0.9);
      transition:box-shadow .2s, transform .15s, background .15s;
    }
    #btn-lock img{
      width:22px;
      height:22px;
      display:block;
    }
    #btn-lock:hover{
      transform:scale(1.05);
      box-shadow:0 0 0 2px rgba(255,255,255,1),0 0 22px rgba(255,255,255,1);
    }
    #btn-lock.lock-fechado{
      background:#f0d890;
    }

    .quadro-main{
      flex:1;
      position:relative;
      background:#cfc0a0;
      overflow:hidden;
    }

    #camada-fundos{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:1;
    }
    #camada-fundos img,
    #camada-fundos video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    #fundo-cor{
      position:absolute;
      inset:0;
      display:none;
    }

    #camada-elementos{
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:auto;
    }

    #meu-canvas{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none; /* por defeito: mexer elementos, não desenhar */
    }

    .elem-arr{
      position:absolute;
      box-sizing:border-box;
      border:2px dashed transparent;
    }
    .elem-arr.sel{
      border-color:#4D96FF;
    }
    .elem-arr img,
    .elem-arr video{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .hdl-del,
    .hdl-resize,
    .hdl-plus,
    .hdl-minus{
      position:absolute;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      color:#333;
      font-size:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 0 4px rgba(0,0,0,0.3);
    }
    .hdl-del{top:-10px;right:-10px;}
    .hdl-resize{bottom:-10px;right:-10px;}
    .hdl-plus{bottom:-10px;left:50%;transform:translateX(-50%);}
    .hdl-minus{top:-10px;left:50%;transform:translateX(-50%);}

    .txt-elem{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:4px;
      box-sizing:border-box;
      word-break:break-word;
    }

    /* BARRA ELEMENTO SELECIONADO */
    #barra-elem{
      position:fixed;
      background:#fff;
      color:#333;
      border-radius:999px;
      padding:4px 8px;
      display:flex;
      align-items:center;
      gap:4px;
      box-shadow:0 6px 18px rgba(0,0,0,0.25);
      font-size:13px;
      z-index:30;
      opacity:0;
      pointer-events:none;
      transition:opacity .15s;
    }
    #barra-elem.vis{
      opacity:1;
      pointer-events:auto;
    }
    #barra-elem button{
      border:none;
      background:transparent;
      cursor:pointer;
      padding:4px 8px;
      border-radius:999px;
      font-size:13px;
    }
    #barra-elem button:hover{
      background:#f0f0f0;
    }

    /* POPUPS MUITO SIMPLIFICADOS (SÓ PARA NÃO PARTIR JS) */
    #pop-bg{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.35);
      opacity:0;
      pointer-events:none;
      transition:opacity .2s;
      z-index:25;
    }
    #pop-bg.open{
      opacity:1;
      pointer-events:auto;
    }
    .pop-ov{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(.9);
      background:#fff;
      color:#333;
      border-radius:14px;
      padding:16px;
      min-width:260px;
      max-width:90vw;
      max-height:80vh;
      overflow:auto;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
      opacity:0;
      pointer-events:none;
      transition:opacity .2s, transform .2s;
      z-index:26;
      display:none;
    }
    .pop-ov.open{
      opacity:1;
      pointer-events:auto;
      transform:translate(-50%,-50%) scale(1);
    }

    .pop-title{
      font-weight:700;
      margin-bottom:8px;
    }
    .pop-close{
      position:absolute;
      right:10px;
      top:8px;
      border:none;
      background:transparent;
      font-size:18px;
      cursor:pointer;
    }

    /* GRUPOS SIMPLES */
    #g-pinceis .btn-pb{
      display:block;
      width:100%;
      margin-bottom:6px;
      border-radius:8px;
      border:none;
      padding:6px 8px;
      text-align:left;
      cursor:pointer;
      background:#f5f5f5;
      font-size:13px;
    }
    #g-pinceis .btn-pb.a{
      background:#e0ecff;
    }
    .prev-ln{
      width:40px;
      background:#333;
      border-radius:999px;
      margin-bottom:3px;
    }

    #g-cores{
      display:grid;
      grid-template-columns:repeat(8,20px);
      gap:6px;
      margin-top:8px;
    }
    .bl-cor{
      width:20px;
      height:20px;
      border-radius:4px;
      cursor:pointer;
      border:2px solid transparent;
    }
    .bl-cor.sel{
      border-color:#000;
    }

    #g-fontes .item-f{
      padding:6px 8px;
      border-radius:8px;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:4px;
      background:#f5f5f5;
      font-size:13px;
    }
    #g-fontes .item-f.a{
      background:#e0ecff;
    }
    .pf{font-size:14px;}
    .nf{opacity:.7;}

    /* TABS ELEMENTOS */
    .tabs-row{
      display:flex;
      gap:4px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }
    .tab{
      border:none;
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      cursor:pointer;
      background:#eee;
    }
    .tab.a{
      background:#4D96FF;
      color:#fff;
    }
    .cards-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
      gap:8px;
    }
    .card-el{
      background:#f5f5f5;
      border-radius:8px;
      padding:4px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      overflow:hidden;
    }
    .card-el img,
    .card-el video{
      max-width:100%;
      max-height:70px;
      object-fit:contain;
      display:block;
    }

    #g-fundos-cor{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
      gap:8px;
      margin-top:8px;
    }
    .card-fundo-cor{
      border-radius:10px;
      padding:8px;
      font-size:13px;
      color:#222;
      cursor:pointer;
      text-shadow:0 1px 2px rgba(255,255,255,0.7);
    }

    /* TOOLTIP SIMPLES */
    #tip{
      position:fixed;
      background:#333;
      color:#fff;
      font-size:11px;
      padding:4px 8px;
      border-radius:6px;
      pointer-events:none;
      opacity:0;
      transition:opacity .1s;
      z-index:40;
    }
    #tip.v{
      opacity:1;
    }

    /* CONTROLOS SLIDERS */
    .row{
      display:flex;
      align-items:center;
      gap:8px;
      margin:6px 0;
      font-size:13px;
    }
    .row input[type=range]{
      flex:1;
    }
    .row label{
      min-width:60px;
      text-align:right;
    }

    .btn-main{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      font-size:13px;
      cursor:pointer;
      background:#4D96FF;
      color:#fff;
      margin-right:6px;
    }
    .btn-main.alt{
      background:#eee;
      color:#333;
    }

    /* INPUT FILE */
    #inp-import{
      display:none;
    }

    @media (max-width:768px){
      .quadro-wrap{
        width:96vw;
        height:82vh;
      }
      #btn-idx{
        right:12px;
        bottom:56px;
        width:150px;
        height:46px;
      }
    }
  </style>
</head>
<body>

  <!-- INTRO / VIDEO -->
  <div id="ecra-video">
    <video id="meu-video" src="intro.mp4" playsinline></video>
    <button id="btn-play"></button>
  </div>

  <div id="overlay-fade"></div>

  <!-- BOTÃO ÍNDICE / SKIP -->
  <button id="btn-idx" onclick="irIndice()"></button>

  <!-- QUADRO INTERATIVO -->
  <div id="ecra-quadro">
    <div class="quadro-wrap">
      <div class="top-bar">
        <div class="top-left">
          <button class="btn-top" onclick="AP('pop-elem')" onmouseenter="TT(event,'Elementos')" onmouseleave="HT()">Elementos</button>
          <button class="btn-top" onclick="AP('pop-cores')" onmouseenter="TT(event,'Cores e pincel')" onmouseleave="HT()">Cores</button>
          <button class="btn-top" onclick="AP('pop-borracha')" onmouseenter="TT(event,'Borracha')" onmouseleave="HT()">Borracha</button>
          <button class="btn-top" onclick="AP('pop-texto')" onmouseenter="TT(event,'Texto')" onmouseleave="HT()">Texto</button>
        </div>
        <div class="top-right">
          <button class="btn-top" onclick="undo()" onmouseenter="TT(event,'Desfazer')" onmouseleave="HT()">↺</button>
          <button class="btn-top" onclick="AP('pop-export')" onmouseenter="TT(event,'Exportar')" onmouseleave="HT()">Exportar</button>
          <button id="btn-lock" onclick="toggleLock()" onmouseenter="TT(event,'Bloquear para desenhar por cima')" onmouseleave="HT()">
            <img id="lock-img" src="lock-aberto.png" alt="lock">
          </button>
        </div>
      </div>
      <div class="quadro-main">
        <div id="camada-fundos">
          <canvas id="fundo-cor"></canvas>
        </div>
        <div id="camada-elementos"></div>
        <canvas id="meu-canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- BARRA ELEMENTO -->
  <div id="barra-elem">
    <button id="be-minus">−</button>
    <button id="be-plus">+</button>
    <button id="be-del">Apagar</button>
  </div>

  <!-- POPUPS -->
  <div id="pop-bg" onclick="FPTodos()"></div>

  <!-- POP ELEMENTOS -->
  <div id="pop-elem" class="pop-ov">
    <button class="pop-close" onclick="FP('pop-elem')">×</button>
    <div class="pop-title">Elementos</div>
    <div class="tabs-row">
      <button class="tab a" onclick="showTab('animais',this)">Animais</button>
      <button class="tab" onclick="showTab('garotos',this)">Garotos</button>
      <button class="tab" onclick="showTab('natureza',this)">Natureza</button>
      <button class="tab" onclick="showTab('casas',this)">Casas</button>
      <button class="tab" onclick="showTab('trecos',this)">Trecos</button>
      <button class="tab" onclick="showTab('brilhos',this)">Brilhos</button>
      <button class="tab" onclick="showTab('fundos',this)">Fundos</button>
      <button class="tab" onclick="showTab('fundos-cor',this)">Cenários</button>
    </div>
    <div id="tab-animais" class="cards-grid"></div>
    <div id="tab-garotos" class="cards-grid" style="display:none"></div>
    <div id="tab-natureza" class="cards-grid" style="display:none"></div>
    <div id="tab-casas" class="cards-grid" style="display:none"></div>
    <div id="tab-trecos" class="cards-grid" style="display:none"></div>
    <div id="tab-brilhos" class="cards-grid" style="display:none"></div>
    <div id="tab-fundos" class="cards-grid" style="display:none"></div>
    <div id="tab-fundos-cor" style="display:none">
      <div id="g-fundos-cor"></div>
      <div class="row" style="margin-top:10px;">
        <span style="font-size:12px;">Personalizar:</span>
        <input type="color" id="cor-fundo-1" value="#87CEEB">
        <input type="color" id="cor-fundo-2" value="#E0F7FA">
        <button class="btn-main alt" onclick="aplicarCorPersonalizada()">Aplicar</button>
      </div>
    </div>
  </div>

  <!-- POP CORES / PINCÉIS -->
  <div id="pop-cores" class="pop-ov">
    <button class="pop-close" onclick="FP('pop-cores')">×</button>
    <div class="pop-title">Cores & Pincel</div>
    <div id="g-pinceis"></div>
    <div class="row">
      <span>Grossura:</span>
      <input type="range" id="sl-gross" min="1" max="40" value="4" oninput="setGross(this.value)">
      <span id="lbl-gross">4px</span>
    </div>
    <div style="margin-top:8px;font-size:13px;">Cores:</div>
    <div id="g-cores"></div>
  </div>

  <!-- POP BORRACHA -->
  <div id="pop-borracha" class="pop-ov">
    <button class="pop-close" onclick="FP('pop-borracha')">×</button>
    <div class="pop-title">Borracha</div>
    <div class="row">
      <span>Tamanho:</span>
      <input type="range" id="sl-borracha" min="5" max="80" value="20" oninput="setBorracha(this.value)">
      <span id="lbl-borracha">20px</span>
    </div>
  </div>

  <!-- POP TEXTO -->
  <div id="pop-texto" class="pop-ov">
    <button class="pop-close" onclick="FP('pop-texto')">×</button>
    <div class="pop-title">Texto</div>
    <div class="row">
      <span>Texto:</span>
      <input type="text" id="inp-txt" style="flex:1;">
    </div>
    <div class="row">
      <span>Tamanho:</span>
      <input type="range" id="sl-tam" min="12" max="120" value="32" oninput="prvTxt()">
      <span id="lbl-tam">32px</span>
    </div>
    <div style="margin-top:6px;font-size:13px;">Fonte:</div>
    <div id="g-fontes" style="margin-top:4px;"></div>
    <div style="margin-top:8px;font-size:13px;">Preview:</div>
    <div id="prv-txt" style="min-height:40px;padding:6px 8px;border-radius:8px;background:#f5f5f5;font-size:32px;"></div>
    <div style="margin-top:10px;">
      <button class="btn-main" onclick="addTexto()">Adicionar texto</button>
    </div>
  </div>

  <!-- POP EXPORT -->
  <div id="pop-export" class="pop-ov">
    <button class="pop-close" onclick="FP('pop-export')">×</button>
    <div class="pop-title">Exportar desenho</div>
    <p style="font-size:13px;margin:6px 0 10px;">Escolhe para onde queres enviar o desenho.</p>
    <button class="btn-main" onclick="expDispositivo()">Guardar no dispositivo</button>
    <button class="btn-main alt" onclick="expGaleria()">Enviar para a Galeria</button>
  </div>

  <!-- TOOLTIP -->
  <div id="tip"></div>

  <!-- INPUT IMPORT -->
  <input type="file" id="inp-import" accept="image/*,video/*" onchange="importar(event)">

  <script>
  // =========================
  // CONFIG / ARRAYS DE ASSETS
  // =========================

  const B1='assets/animais1/';
  const B2='assets/animais2/';
  const B3='assets/natureza1/';
  const B4='assets/natureza2/';
  const B5='assets/garotos/';
  const B6='assets/casas/';
  const B7='assets/trecos/';
  const B8='assets/brilhos/';
  const BF='assets/fundos/';

  function imgs(base,arr){return arr.map(f=>({url:base+f,tipo:f.match(/\.(mp4|webm|ogg)$/i)?'video':'img'}));}

  const ANIMAIS=[
    ...imgs(B1,['b1.png','b2.png','b3.png','b4.png','b5.jpg','b6.png','b7.png',
      'b10.png','b11.png','b12.png','b13.png','b14.png','b15.png','b16.png',
      'b17.png','b18.png','b19.png','b20.png','b21.png','b22.png','b23.png',
      'b24.png','b25.png','b26.png']),
    ...imgs(B2,['b8.png','b7.png','b9.png','doninha.png','thumb(26).png',
      'doninha.gif','elefante.gif','galinha.gif','gato.gif','golfinho.gif',
      'lama.gif','panda.gif','peixe.gif','pombos.gif','rato.gif','unicórnio.gif'])
  ];

  const GAROTOS=imgs(B5,[
    '111.png','112.png','113.png','114.png','115.png','116.png',
    '29.png','30.png','bonecaA.png','bonecaB.png','ca.png','go.png',
    'ela.gif','pocoyo(2).gif','pocoyo.gif'
  ]);

  const NATUREZA=[
    ...imgs(B3,['a.png','b.png','c.png','d.png','e.png','f.png','g.png',
      'h.png','i.png','j.png','k.png','l.png','m.png',
      'arco.png','arvore.png','cogumelo.png','cora.png','coram.png','corl.png',
      'fj.png','n1.png','n2.png','n10.png','n12.png']),
    ...imgs(B4,['n4.png','n7.png','n8.png','n9.png','neve.png','nuv.png',
      'sol.png','trov.png','o.png','p.png','q.png','r.png','s.png',
      'u.png','v.png','w.png','x.png','z.png'])
  ];

  const CASAS=imgs(B6,[
    'c1.png','c2.png','c3.png','c4.png','c5.png','c6.png','c7.png',
    'c8.png','c9.png','c10.png','c11.png','c12.png','c13.png','c14.png','c15.png'
  ]);

  const TRECOS=imgs(B7,[

  function initCanvas(){
    sizing();

    cv.addEventListener('mousedown',e=>{if(!locked)return;ini(e.offsetX,e.offsetY);});
    cv.addEventListener('mousemove',e=>cont(e.offsetX,e.offsetY));

    cv.addEventListener('touchstart',e=>{if(!locked)return;e.preventDefault();const p=tPos(e.touches[0]);ini(p.x,p.y);},{passive:false});
    cv.addEventListener('touchmove',e=>{e.preventDefault();const p=tPos(e.touches[0]);cont(p.x,p.y);},{passive:false});
    cv.addEventListener('touchend',fim);

    cv.style.zIndex='4';
  }

  function sizing(){
    const r=cv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
    const snap=hist.length?hist[hist.length-1]:null;
    cv.width=r.width*dpr;cv.height=r.height*dpr;
    cx.setTransform(1,0,0,1,0,0);
    cx.scale(dpr,dpr);
    if(snap){
      const i=new Image();i.src=snap;i.onload=()=>cx.drawImage(i,0,0,r.width,r.height);
    }else{
      guardar();
    }
  }

  function tPos(t){const r=cv.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top};}

  function cfgCtx(){
    if(ferramenta==='borracha'){
      cx.globalCompositeOperation='destination-out';
      cx.strokeStyle='rgba(0,0,0,1)';
      cx.lineWidth=tamBorracha;
    }else{
      cx.globalCompositeOperation='source-over';
      cx.strokeStyle=cor;
      cx.lineWidth=grossura;
    }
    cx.lineCap=tipoCap;cx.lineJoin='round';
  }
  function ini(x,y){desenhar=true;cfgCtx();cx.beginPath();cx.moveTo(x,y);}
  function cont(x,y){if(!desenhar)return;cx.lineTo(x,y);cx.stroke();}
  function fim(){if(!desenhar)return;desenhar=false;cx.closePath();guardar();}
  function guardar(){if(hist.length>30)hist.shift();hist.push(cv.toDataURL());}

  function undo(){
    const cam=document.getElementById('camada-elementos');
    if(cam.children.length>0){
      cam.removeChild(cam.lastChild);
      return;
    }
    if(hist.length>1){
      hist.pop();
      const i=new Image();i.src=hist[hist.length-1];
      const r=cv.getBoundingClientRect();
      i.onload=()=>{cx.clearRect(0,0,r.width,r.height);cx.drawImage(i,0,0,r.width,r.height);};
      return;
    }
    limparFundoCor();
    Array.from(document.getElementById('camada-fundos').children).forEach(el=>{if(el.id!=='fundo-cor')el.remove();});
  }

  function redimElem(d,factor){
    const cam=document.getElementById('camada-elementos');
    const maxW=cam.offsetWidth,maxH=cam.offsetHeight;
    const curW=d.offsetWidth,curH=d.offsetHeight;
    const newW=Math.min(maxW,Math.max(30,Math.round(curW*factor)));
    const newH=Math.min(maxH,Math.max(30,Math.round(curH*factor)));
    const tx=d.querySelector('.txt-elem');
    if(tx){
      const fs=Math.min(200,Math.max(8,parseFloat(tx.style.fontSize||'32')*factor));
      tx.style.fontSize=fs+'px';
    }else{
      d.style.width=newW+'px';
      d.style.height=newH+'px';
    }
  }

  function ativaDrag(el,hdlRes,hdlDel){
    el.addEventListener('mousedown',e=>{
      if(e.target===hdlRes||e.target===hdlDel)return;
      e.stopPropagation();selEl(el);
      const r=el.getBoundingClientRect();offX=e.clientX-r.left;offY=e.clientY-r.top;eS=el;
    });
    el.addEventListener('touchstart',e=>{
      if(e.target===hdlRes||e.target===hdlDel)return;
      e.stopPropagation();selEl(el);
      const r=el.getBoundingClientRect();offX=e.touches[0].clientX-r.left;offY=e.touches[0].clientY-r.top;eS=el;
    },{passive:true});
    hdlRes.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();selEl(el);resizing=true;eS=el;resX=e.clientX;resW=el.offsetWidth;});
    hdlRes.addEventListener('touchstart',e=>{e.stopPropagation();selEl(el);resizing=true;eS=el;resX=e.touches[0].clientX;resW=el.offsetWidth;},{passive:true});

  function posBarraElem(el){
    const r=el.getBoundingClientRect();

    if(left+bw>window.innerWidth-4)left=window.innerWidth-bw-4;
    be.style.left=left+'px';be.style.top=top+'px';

  function mvG(mx,my){
    if(!eS)return;
    const cr=document.getElementById('camada-elementos').getBoundingClientRect();
    if(resizing){
      const delta=mx-resX;
      const tx=eS.querySelector('.txt-elem');
      if(tx){
        const fs=Math.min(200,Math.max(8,parseFloat(tx.style.fontSize||'32')+delta*0.3));tx.style.fontSize=fs+'px';
      }else{
        const novaW=Math.min(cr.width,Math.max(30,resW+delta));eS.style.width=novaW+'px';

      resX=mx;resW=eS.offsetWidth;
    }else{
      const elW=eS.offsetWidth,elH=eS.offsetHeight;
      const novoL=Math.max(0,Math.min(cr.width-elW,mx-cr.left-offX));

  function gerarCanvas(cb){
    const dpr=window.devicePixelRatio||1,r=cv.getBoundingClientRect();
    const tmp=document.createElement('canvas');
    tmp.width=Math.round(r.width*dpr);tmp.height=Math.round(r.height*dpr);
    const c=tmp.getContext('2d');c.scale(dpr,dpr);
    const W=r.width,H=r.height;

    // fundo cor
    const fc=document.getElementById('fundo-cor');
    if(fc.style.display!=='none'){
      try{c.drawImage(fc,0,0,W,H);}catch(e){c.fillStyle='#cfc0a0';c.fillRect(0,0,W,H);}
    }else{
      c.fillStyle='#cfc0a0';c.fillRect(0,0,W,H);
    }

    // fundo imagem/video
    const fm=document.querySelector('#camada-fundos img:not([id])');
    const fv=document.querySelector('#camada-fundos video');
    const p1=fm?new Promise(res=>{
      const i=new Image();i.crossOrigin='anonymous';
      i.onload=()=>{c.drawImage(i,0,0,W,H);res();};
      i.onerror=()=>{try{c.drawImage(fm,0,0,W,H);}catch(e){}res();};
      i.src=fm.src+(fm.src.includes('?')?'&':'?')+'v=1';
    }):
    fv?new Promise(res=>{try{c.drawImage(fv,0,0,W,H);}catch(e){}res();}):
    Promise.resolve();

    p1.then(()=>{
      // canvas de desenho
      try{c.drawImage(cv,0,0,W,H);}catch(e){}

      // elementos
      const cr=document.getElementById('camada-elementos').getBoundingClientRect();
      const p2=Array.from(document.querySelectorAll('#camada-elementos .elem-arr')).map(el=>{
        const er=el.getBoundingClientRect();
        const x=er.left-cr.left,y=er.top-cr.top,w=er.width,h=er.height;
        const im=el.querySelector('img');
        const tx=el.querySelector('.txt-elem');
        if(im){
          return new Promise(res=>{
            const i=new Image();i.crossOrigin='anonymous';
            i.onload=()=>{c.drawImage(i,x,y,w,h);res();};
            i.onerror=()=>{try{c.drawImage(im,x,y,w,h);}catch(e){}res();};
            i.src=im.src;
          });
        }
        if(tx){
          const fs=parseFloat(getComputedStyle(tx).fontSize)||32;
          c.save();c.font=fs+'px '+(tx.style.fontFamily||'sans-serif');
          c.fillStyle=tx.style.color||'#000';
          c.textAlign='center';
          c.textBaseline='middle';
          c.fillText(tx.textContent,x+w/2,y+h/2);
          c.restore();
        }
        return Promise.resolve();
      });

      Promise.all(p2).then(()=>cb(tmp));
    });
  }

  function expDispositivo(){
    gerarCanvas(t=>{
      try{
        const a=document.createElement('a');
        a.download='clube-desenho.png';
        a.href=t.toDataURL('image/png');
        document.body.appendChild(a);a.click();
        setTimeout(()=>document.body.removeChild(a),100);
      }catch(e){alert('Erro ao guardar: '+e.message);}
      FP('pop-export');
    });
  }

  // Ajusta estes valores para o teu R2:
  const R2_UPLOAD_URL='https://teu-endpoint-r2/upload'; // <-- trocar
  const R2_PUBLIC_BASE='https://teu-bucket-publico/';   // <-- trocar

  function expGaleria(){
    gerarCanvas(function(t){
      const path='desenho_'+Date.now()+'.jpg';
      try{
        t.toBlob(function(blob){
          if(!blob){alert('Erro ao gerar imagem');return;}
          fetch(R2_UPLOAD_URL,{
            method:'POST',
            body:blob
          })
          .then(function(r){
            if(!r.ok)throw new Error('Upload falhou: '+r.status);
            // se tiveres API para registar na galeria, chama aqui
            alert('Enviado para a Galeria!');
            FP('pop-export');
          })
          .catch(function(err){console.error(err);alert('Erro ao enviar: '+err.message);});
        },'image/jpeg',0.92);
      }catch(e){alert('Erro (canvas tainted?): '+e.message);}
    });
  }

  // =========================
  // POPUPS / TABS / TOOLTIP
  // =========================

  function popularPopups(){
    // pinceis
    PINCEIS.forEach(p=>{
      const b=document.createElement('button');b.className='btn-pb';
      b.innerHTML='<div class="prev-ln" style="height:'+Math.min(p.px,14)+'px"></div>'+p.nome;
      b.onclick=()=>{
        grossura=p.px;tipoCap=p.tipo==='square'?'square':'round';ferramenta='pincel';cv.style.cursor='crosshair';
        document.getElementById('sl-gross').value=p.px;
        document.getElementById('lbl-gross').textContent=p.px+'px';
        document.querySelectorAll('.btn-pb').forEach(x=>x.classList.remove('a'));b.classList.add('a');
      };
      document.getElementById('g-pinceis').appendChild(b);
    });

    // cores
    CORES.forEach(c=>{
      const d=document.createElement('div');d.className='bl-cor';d.style.background=c;d.dataset.c=c;
      if(c==='#FFFFFF')d.style.border='3px solid #ddd';
      d.onclick=()=>setCor(c);
      document.getElementById('g-cores').appendChild(d);
    });

    // elementos
    function mkCard(container,item,ehFundo){
      const card=document.createElement('div');card.className='card-el';
      const tipo=item.tipo||'img';
      if(tipo==='video'){
        const v=document.createElement('video');v.src=item.url;v.autoplay=true;v.loop=true;v.muted=true;v.playsinline=true;
        v.style.cssText='max-width:75%;max-height:72%;object-fit:cover;border-radius:6px;';
        card.appendChild(v);
      }else{
        const im=document.createElement('img');im.src=item.url;im.alt='';card.appendChild(im);
      }
      card.onclick=()=>addElem(item.url,item.nome||'',tipo,ehFundo);
      container.appendChild(card);
    }

    ANIMAIS.forEach(e=>mkCard(document.getElementById('tab-animais'),e,false));
    GAROTOS.forEach(e=>mkCard(document.getElementById('tab-garotos'),e,false));
    NATUREZA.forEach(e=>mkCard(document.getElementById('tab-natureza'),e,false));
    CASAS.forEach(e=>mkCard(document.getElementById('tab-casas'),e,false));
    TRECOS.forEach(e=>mkCard(document.getElementById('tab-trecos'),e,false));
    BRILHOS.forEach(e=>mkCard(document.getElementById('tab-brilhos'),e,false));
    FUNDOS.forEach(e=>mkCard(document.getElementById('tab-fundos'),e,true));

    const gc=document.getElementById('g-fundos-cor');
    CENARIOS.forEach(c=>{
      const card=document.createElement('div');card.className='card-fundo-cor';
      card.style.background='linear-gradient(to bottom,'+c.g+','+c.g2+')';
      card.textContent=c.nome;card.onclick=()=>aplicarCenario(c.g,c.g2);gc.appendChild(card);
    });

    FONTES.forEach(f=>{
      const d=document.createElement('div');d.className='item-f';
      d.innerHTML='<span class="pf" style="font-family:'+f.css+'">'+f.prev+'</span><span class="nf">'+f.nome+'</span>';
      d.onclick=()=>{fonte=f.css;document.querySelectorAll('.item-f').forEach(x=>x.classList.remove('a'));d.classList.add('a');prvTxt();};
      document.getElementById('g-fontes').appendChild(d);
    });

    document.getElementById('inp-txt').addEventListener('input',prvTxt);
  }

  function showTab(n,btn){
    ['animais','garotos','natureza','casas','trecos','brilhos','fundos','fundos-cor'].forEach(t=>{
      const el=document.getElementById('tab-'+t);
      el.style.display=t===n?(t==='fundos-cor'?'block':'grid'):'none';
    });
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('a'));btn.classList.add('a');
  }

  function AP(id){
    document.querySelectorAll('.pop-ov').forEach(p=>{p.classList.remove('open');p.style.display='none';});
    const el=document.getElementById(id);el.style.display='block';
    requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('open')));
    document.getElementById('pop-bg').classList.add('open');
  }
  function FP(id){
    const el=document.getElementById(id);el.classList.remove('open');
    setTimeout(()=>{el.style.display='none';},220);
    document.getElementById('pop-bg').classList.remove('open');
  }
  function FPTodos(){
    document.querySelectorAll('.pop-ov').forEach(p=>{p.classList.remove('open');setTimeout(()=>p.style.display='none',220);});
    document.getElementById('pop-bg').classList.remove('open');
  }

  const tip=document.getElementById('tip');
  function TT(e,t){tip.textContent=t;tip.style.left=(e.clientX+10)+'px';tip.style.top=(e.clientY+26)+'px';tip.classList.add('v');}
  function HT(){tip.classList.remove('v');}

  // =========================
  // LOCK
  // =========================

  function aplicarLock(){
    // locked = FECHADO = desenhar por cima
    const els=document.querySelectorAll('.elem-arr');
    els.forEach(el=>{
      el.style.pointerEvents=locked?'none':'all';
    });
    cv.style.pointerEvents=locked?'all':'none';

    const img=document.getElementById('lock-img');
    if(locked){
      document.getElementById('btn-lock').classList.add('lock-fechado');
      img.src='https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/lock%20aberto.png'; // FECHADO VISUALMENTE MAIS FORTE
    }else{
      document.getElementById('btn-lock').classList.remove('lock-fechado');
      img.src='lock-aberto.png'; // ABERTO NORMAL (ajusta se quiseres outra imagem)
    }
  }

  function toggleLock(){
    locked=!locked;
    deselAll();
    aplicarLock();
  }

  // =========================
  // ARRANQUE / INTRO SKIP
  // =========================

  window.addEventListener('load',()=>{
    document.getElementById('btn-play').addEventListener('click',iniciarVideo);

    const params=new URLSearchParams(location.search);
    const skip=params.get('skip');
    const introSeen=localStorage.getItem('introSeen')==='1';

    if(skip==='1' || introSeen){
      // salta intro
      document.getElementById('ecra-video').style.display='none';
      document.getElementById('ecra-quadro').classList.add('visivel');
      document.getElementById('btn-idx').classList.add('show');
      initCanvas();
      popularPopups();
      aplicarLock();
    }
  });
  </script>
</body>
