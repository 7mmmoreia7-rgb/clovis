<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clube Interativo</title>
<link rel="icon" href="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png" />
<link rel="apple-touch-icon" href="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png" />

<style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    #app {
        position: relative;
        width: 100%;
        height: 100%;
    }

    /* Vídeo inicial full screen */
    #ecra-video {
        position: fixed;
        inset: 0;
        z-index: 100;
        transition: opacity 1s ease;
    }
    #ecra-video.oculto {
        opacity: 0;
        pointer-events: none;
    }

    #meu-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;        /* Alterado de 'contain' para 'cover' */
        display: block;
    }

    #btn-play {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 10%;
        border: none;
        background: transparent;
        cursor: pointer;
        z-index: 10;
        padding: 0;
    }
    #btn-play img {
        width: 100%;
        height: auto;
        display: block;
    }

    /* Resto do estilo mantido igual (só corrigi o fundo) */
    #overlay-fade {
        position: fixed;
        inset: 0;
        z-index: 150;
        background: #fff;
        opacity: 0;
        pointer-events: none;
        transition: opacity .6s ease;
    }
    #overlay-fade.ativo {
        opacity: 1;
        pointer-events: all;
    }

    #ecra-quadro {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 5;
    }
    #ecra-quadro.visivel {
        display: block;
    }

    #fundo-design {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    #camada-fundos, #meu-canvas, #camada-elementos {
        position: absolute;
        left: 9.5%;
        top: 14.7%;
        width: 80.8%;
        height: 70.6%;
        z-index: 2;
    }

    #meu-canvas {
        background: transparent;
        cursor: crosshair;
        z-index: 3;
        touch-action: none;
    }

    #barra-botoes, #btn-lock, #btn-idx {
        position: fixed;
        z-index: 10;
    }

    #btn-idx {
        right: 5%;
        bottom: 10%;
        width: 8%;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transition: opacity .5s;
    }
    #btn-idx.show {
        opacity: 1;
        pointer-events: all;
    }

    /* Mantém todo o resto do teu CSS original */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Pacifico&display=swap');
    /* ... todo o resto do teu CSS fica igual ... */
</style>
</head>
<body>
<div id="app">
  <!-- Todo o teu HTML anterior fica igual, só mudei o vídeo para full screen -->
  <div id="ecra-video">
    <video id="meu-video" src="https://res.cloudinary.com/dxdemxfpe/video/upload/v1773256897/voador_dtcheb.mp4" playsinline preload="auto"></video>
    <button id="btn-play" onclick="iniciarVideo()">
      <img src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1772958888/26_ujjdad.png" alt="Play">
    </button>
  </div>

  <div id="overlay-fade"></div>
  <div id="ecra-quadro">
    <img id="fundo-design" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773321525/isto_n%C3%A3o_%C3%A9_para_todos_gplnpd.png" alt="">
    <div id="camada-fundos"></div>
    <canvas id="meu-canvas"></canvas>
    <div id="camada-elementos"></div>
    <!-- resto do teu HTML (barra-botoes, pop-ups, etc.) fica igual -->
    <div id="barra-botoes"> ... teu código ... </div>
    <button id="btn-lock" onclick="toggleLock()">🔓</button>
    <img id="btn-idx" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png" onclick="irIndice()">
  </div>

  <!-- Todos os teus pop-ups ficam exatamente iguais -->
  <!-- ... (mantive tudo igual) ... -->
</div>

<script>
  // Todo o teu JavaScript fica **exatamente igual** (não mexi em nada)
  // ... (cola aqui todo o teu script original) ...
</script>
</body>
</html>
