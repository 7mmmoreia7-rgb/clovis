
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat</title>
<link rel="icon" href="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
        width:100%; height:100%; overflow:hidden; background:#c8b99a;
    }
    #wrap {
        position:fixed; top:0; left:0; width:100%; height:100%;
        display:flex; align-items:center; justify-content:center;
    }
    #stage {
        position:relative; width:100%; height:100%; overflow:hidden;
    }

    /* Backgrounds */
    #bg-login, #bg-chat {
        position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    }

    /* Páginas */
    .pagina { position:absolute; inset:0; }
    #pag-login { z-index:5; }
    #pag-chat  { z-index:4; display:none; }

    /* ==================== LOGIN ==================== */
    #login-input {
        position:absolute;
        left:50%; top:58%;
        transform:translate(-50%, -50%);
        width:38%; height:7%;
        border:none; outline:none; background:transparent;
        font-family:'Caveat', cursive; font-size:1.45em; text-align:center; color:#111;
        z-index:20;
    }
    #btn-entra {
        position:absolute;
        left:50%; top:69%;
        transform:translate(-50%, -50%);
        width:26%; height:14%;
        background:transparent; border:none; cursor:pointer;
        z-index:20;
    }

    /* ==================== CHAT ==================== */
    #msgs-box {
        position:absolute;
        left:14.5%; top:17.5%;
        width:71%; height:50%;
        overflow-y:auto; overflow-x:hidden;
        padding:20px 25px;
        display:flex; flex-direction:column; gap:8px;
        z-index:10;
    }
    .msg {
        display:flex; flex-shrink:0; line-height:1.6;
        animation:fadeIn 0.3s ease;
    }
    .msg .autor {
        font-family:'Caveat', cursive; font-size:1.18em; font-weight:700;
        color:#c00; margin-right:8px; white-space:nowrap;
    }
    .msg .texto {
        font-family:Georgia, serif; font-size:0.96em; color:#111;
        overflow-wrap:break-word;
    }
    .msg .texto img.emoji, .msg .texto img.media-img, .msg .texto video {
        max-height:3.8em; vertical-align:middle; margin:3px 5px; border-radius:6px;
    }

    @keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1;} }

    /* Input Chat */
    #chat-input {
        position:absolute;
        left:19%; top:72.5%;
        width:60%; height:9.8%;
        border:none; outline:none; background:transparent;
        font-family:Georgia, serif; font-size:0.97em; color:#111;
        padding:14px 20px; line-height:1.45; overflow-y:auto;
        display:none; cursor:text;
    }
    #chat-input:empty::before {
        content:attr(data-ph); color:#777;
    }

    /* Botões Chat */
    #btn-clovis  { position:absolute; left:14.5%; top:71.5%; width:6.8%; height:15%; background:transparent; border:none; cursor:pointer; }
    #btn-enviar  { position:absolute; left:81%;   top:71.5%; width:9.2%; height:15%; background:transparent; border:none; cursor:pointer; }
    #btn-export  { position:absolute; left:64.5%; top:4%;    width:10%;  height:12%; background:transparent; border:none; cursor:pointer; }
    #btn-import  { position:absolute; left:77.5%; top:4%;    width:10%;  height:12%; background:transparent; border:none; cursor:pointer; }
    #btn-idx     { position:absolute; right:3%; bottom:9%; width:8%; cursor:pointer; z-index:30; opacity:0; transition:opacity .5s; }
    #btn-idx.show { opacity:1; pointer-events:all; }

    /* Emoji Panel */
    #emoji-panel {
        position:absolute; left:14.5%; top:24%; width:47%; height:40%;
        background:rgba(255,255,255,0.97); border:2px solid #ccc; border-radius:14px;
        box-shadow:0 8px 35px rgba(0,0,0,0.3); padding:15px; gap:12px;
        display:none; flex-wrap:wrap; overflow-y:auto; z-index:40;
    }
    #emoji-panel.open { display:flex; }
    #emoji-panel img { width:70px; height:70px; object-fit:contain; cursor:pointer; }

    /* Fullscreen */
    #fs-overlay {
        position:fixed; inset:0; z-index:500;
        background:ur[](https://res.cloudinary.com/dxdemxfpe/image/upload/v1771887590/isto_f3c09e.png) center/cover;
        display:none; align-items:center; justify-content:center; flex-direction:column; gap:15px;
    }
    #fs-overlay.open { display:flex; }
    #fs-overlay img, #fs-overlay video { max-width:90%; max-height:76%; border-radius:10px; object-fit:contain; }

    .fs-btn {
        background:rgba(0,0,0,0.65); color:#fff; border:1px solid rgba(255,255,255,0.5);
        padding:10px 28px; border-radius:8px; font-weight:700; cursor:pointer;
    }
    .fs-btn:hover { background:rgba(0,0,0,0.9); }

    /* Scrollbar escondida */
    #msgs-box::-webkit-scrollbar, #chat-input::-webkit-scrollbar { display:none; }
    #msgs-box, #chat-input { scrollbar-width:none; }
</style>
</head>
<body>

<div id="wrap">
  <div id="stage">

    <!-- LOGIN -->
    <div id="pag-login" class="pagina">
      <img id="bg-login" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1771845348/chat_2_xxurxp.png" alt="">
      <input id="login-input" type="text" maxlength="20" autocomplete="off" spellcheck="false" placeholder="">
      <button id="btn-entra"></button>
    </div>

    <!-- CHAT -->
    <div id="pag-chat" class="pagina">
      <img id="bg-chat" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773599543/isto_n%C3%A3o_%C3%A9_para_todos_3_ntshdn.png" alt="">

      <div id="msgs-box"></div>
      <div id="emoji-panel"></div>

      <div id="chat-input" contenteditable="true" data-ph="escreve aqui…"></div>

      <button id="btn-clovis"></button>
      <button id="btn-enviar"></button>
      <button id="btn-export"></button>
      <button id="btn-import"></button>
      <input id="file-import" type="file" accept="image/*,video/*" multiple style="display:none">

      <img id="btn-idx" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png" alt="índice">

      <!-- Fullscreen Overlay -->
      <div id="fs-overlay">
        <img id="fs-img" src="" alt="">
        <video id="fs-vid" controls playsinline></video>
        <div style="display:flex; gap:15px; margin-top:15px;">
          <button class="fs-btn" id="fs-close">✕ Fechar</button>
          <button class="fs-btn" id="fs-save">💾 Guardar</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ==================== TEU JAVASCRIPT AQUI ====================
// Cola aqui todo o teu script original (a partir de "function resize()" até o final)

function resize(){
  document.getElementById('stage').style.width = '100%';
  document.getElementById('stage').style.height = '100%';
}
resize();
window.addEventListener('resize', resize);

// ... resto do teu código (entrar, iniciarChat, addMsg, enviar, etc.)

// Exemplo mínimo para o login funcionar:
document.getElementById('btn-entra').onclick = function(){
  const v = document.getElementById('login-input').value.trim();
  if(v){
    nome = v;
    document.getElementById('pag-login').style.display = 'none';
    document.getElementById('pag-chat').style.display = 'block';
    document.getElementById('btn-idx').classList.add('show');
    document.getElementById('chat-input').style.display = 'block';
    iniciarChat();
  }
};

document.getElementById('login-input').onkeydown = function(e){
  if(e.key === 'Enter') document.getElementById('btn-entra').onclick();
};

document.getElementById('btn-idx').onclick = function(){ window.location.href = 'indice.html'; };

// ... continua com o teu código original de mensagens, emojis, upload, etc.
</script>
</body>
</html>
