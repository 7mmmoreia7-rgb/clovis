<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beatriz</title>
  <link rel="icon" href="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/app%20nova/comuns/botao%20(2).png" />
  <link rel="apple-touch-icon" href="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/app%20nova/comuns/botao%20(2).png" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #wrap { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#000; }
    #stage { position:relative; overflow:hidden; }
    #vid { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
    #play { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:10%; cursor:pointer; z-index:10; transition:transform .2s, opacity .5s; }
    #play.gone { opacity:0; pointer-events:none; }
    #btn-email { position:absolute; bottom:12%; left:3%; width:7%; cursor:pointer; z-index:10; opacity:0; pointer-events:none; transition:opacity .5s; background:rgba(255,255,255,0.15); border:none; border-radius:50%; padding:8px; display:flex; align-items:center; justify-content:center; }
    #btn-email.show { opacity:1; pointer-events:all; }
    #btn-email:hover { background:rgba(255,255,255,0.35); filter:drop-shadow(0 0 8px rgba(255,255,255,0.8)); }
    #btn-email svg { width:100%; height:auto; fill:white; }
    #btn-idx { position:fixed; bottom:3.5%; right:3.4%; width:8%; cursor:pointer; z-index:9999; opacity:0; pointer-events:none; transition:opacity .8s; }
    #btn-idx.show { opacity:1; pointer-events:all; }
  </style>
</head>
<body>
<div id="wrap"><div id="stage">
  <video id="vid" src="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/app%20nova/chat/beatriz.mp4" preload="auto" playsinline></video>
  <img id="play" src="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/app%20nova/comuns/play.png" />
  <button id="btn-email" title="Enviar email">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
  </button>
</div></div>
<img id="btn-idx" src="https://itqzgxotbzsuwevjpnoi.supabase.co/storage/v1/object/public/assets/app%20nova/comuns/botao%20(2).png" />
<script>
function resize(){
  var wrap=document.getElementById('wrap'), stage=document.getElementById('stage');
  var ww=wrap.clientWidth, wh=wrap.clientHeight, ratio=16/9, w, h;
  if(ww/wh>ratio){h=wh;w=h*ratio;}else{w=ww;h=w/ratio;}
  stage.style.width=w+'px'; stage.style.height=h+'px';
}
resize(); window.addEventListener('resize',resize);
var vid=document.getElementById('vid');
document.getElementById('play').onclick=function(){
  this.classList.add('gone');
  vid.play().catch(function(){vid.muted=true;vid.play();});
};
vid.addEventListener('ended',function(){
  document.getElementById('btn-email').classList.add('show');
  document.getElementById('btn-idx').classList.add('show');
});
document.getElementById('btn-email').onclick=function(){
  window.open('mailto:beatrizfreimor4@gmail.com');
};
document.getElementById('btn-idx').onclick=function(e){
  e.stopPropagation();
  window.location.href='indice.html?skip=1';
};
</script>
</body>
</html>
