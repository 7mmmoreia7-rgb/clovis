<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Índice</title>
<link rel="icon" href="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png" />
<link rel="apple-touch-icon" href="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png" />

<style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    #vid {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;        /* ← Esta é a linha mais importante */
        z-index: 1;
    }

    #play {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 10%;
        cursor: pointer;
        z-index: 10;
        transition: opacity .3s;
    }

    #gbg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 1.4s;
        z-index: 2;
        pointer-events: none;
    }
    #gbg.show { 
        opacity: 1; 
        pointer-events: all; 
    }

    .hs {
        position: absolute;
        cursor: pointer;
        z-index: 10;
        opacity: 0;
        pointer-events: none;
    }
    .hs.show {
        opacity: 1;
        pointer-events: all;
    }

    #btn-home {
        position: fixed;
        bottom: 10%;
        right: 5%;
        width: 8%;
        cursor: pointer;
        z-index: 10;
        opacity: 0;
        pointer-events: none;
        transition: opacity .3s;
    }
    #btn-home.show {
        opacity: 1;
        pointer-events: all;
    }

    /* Ajustes para mobile */
    @media (max-width: 768px) {
        #play { width: 20%; }
        #btn-home { width: 16%; }
    }
    @media (max-width: 480px) {
        #play { width: 28%; }
        #btn-home { width: 22%; }
    }
</style>
</head>
<body>

  <video id="vid" src="https://res.cloudinary.com/dxdemxfpe/video/upload/v1773442855/0313_4_hzikou.mp4" preload="auto" playsinline></video>
  <img id="play" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1772958888/26_ujjdad.png" />
  <img id="gbg" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773550252/isto_n%C3%A3o_%C3%A9_para_todos_1_vumssn.png" />

  <!-- Hotspots -->
  <div class="hs" id="hs-ignora"   style="left:10.422%; top:16.895%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-carolina" style="left:30.737%; top:16.583%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-gloria"   style="left:51.053%; top:16.895%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-daniela"  style="left:71.893%; top:16.739%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-beatriz"  style="left:10.422%; top:38.066%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-lurdes"   style="left:30.562%; top:38.533%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-clovis"   style="left:51.228%; top:37.755%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-fatima"   style="left:71.630%; top:37.132%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-rabisca"  style="left:16.727%; top:59.860%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-clicks"   style="left:42.384%; top:60.483%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-blabla"   style="left:65.851%; top:59.704%; width:18%; height:22%;"></div>

  <img id="btn-home" src="https://res.cloudinary.com/dxdemxfpe/image/upload/v1773223424/botao_2_eu0w6r.png" />

<script>
  const vid = document.getElementById('vid');
  const playBtn = document.getElementById('play');
  const gbg = document.getElementById('gbg');
  const btnHome = document.getElementById('btn-home');

  playBtn.onclick = function() {
    playBtn.style.opacity = '0';
    playBtn.style.pointerEvents = 'none';
    vid.play().catch(() => { vid.muted = true; vid.play(); });
  };

  vid.onended = function() {
    gbg.classList.add('show');
    document.querySelectorAll('.hs').forEach(h => h.classList.add('show'));
    btnHome.classList.add('show');
  };

  if (window.location.search.includes('skip=1')) {
    playBtn.style.display = 'none';
    gbg.classList.add('show');
    document.querySelectorAll('.hs').forEach(h => h.classList.add('show'));
    btnHome.classList.add('show');
  }

  const nav = {
    'hs-ignora':   '/regras',
    'hs-carolina': '/carolina',
    'hs-gloria':   '/gloria',
    'hs-daniela':  '/daniela',
    'hs-beatriz':  '/beatriz',
    'hs-lurdes':   '/lurdes',
    'hs-clovis':   '/clovis',
    'hs-fatima':   '/fatima',
    'hs-rabisca':  '/interativo',
    'hs-clicks':   '/galeria',
    'hs-blabla':   '/chat'
  };

  Object.keys(nav).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.onclick = () => window.location.href = nav[id];
  });

  btnHome.onclick = () => window.location.href = '/';

  // Double tap para saltar
  let lastTap = 0;
  vid.addEventListener('touchend', function() {
    const now = Date.now();
    if (now - lastTap < 350) vid.onended();
    lastTap = now;
  });
  vid.addEventListener('dblclick', () => vid.onended());
</script>
</body>
</html>
