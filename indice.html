<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Índice</title>

<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />

<style>
*, *::before, *::after { 
  margin:0; 
  padding:0; 
  box-sizing:border-box; 
  outline:none !important; 
  -webkit-tap-highlight-color:transparent !important;
}

html, body { 
  width:100%; 
  height:100%; 
  overflow:hidden; 
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

#stage { 
  position:fixed; 
  top:0; left:0; 
  width:100%; height:100%; 
  overflow:hidden; 
}

#vid { 
  position:absolute; 
  inset:0; 
  width:100%; 
  height:100%; 
  object-fit:cover; 
  z-index:1; 
  opacity:0;
  transition:opacity .5s;
}

#play { 
  position:fixed; 
  left:50%; 
  top:50%; 
  transform:translate(-50%,-50%); 
  width:10%; 
  cursor:pointer; 
  z-index:10; 
  transition:opacity .5s;
}

#play.gone { opacity:0; pointer-events:none; }

/* ⭐ BOTÃO SKIP */
#skip {
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:6%;
  cursor:pointer;
  z-index:10;
  opacity:1;
  pointer-events:all;
  transition:opacity .3s;
}

#skip.gone {
  opacity:0;
  pointer-events:none;
}
#skip{
  transition: transform .2s ease;
}

#skip:hover{
  content:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/skip11.png");
  transform:scale(1.15);
}
#gbg { 
  position:absolute; 
  inset:0; 
  width:100%; 
  height:100%; 
  object-fit:cover; 
  z-index:2; 
  opacity:0; 
  transition:opacity 1.4s ease; 
  pointer-events:none; 
}

#gbg.show { opacity:1; }

.hs { 
  position:absolute; 
  cursor:pointer; 
  z-index:10; 
  background:transparent; 
  border:none; 
  opacity:0; 
  pointer-events:none; 
  border-radius:8px; 
}

.hs.show { opacity:1; pointer-events:all; }

#btn-home { 
  position:fixed; 
  bottom:3.5%; 
  right:3.4%; 
  width:8%; 
  cursor:pointer; 
  z-index:9999; 
  opacity:0; 
  pointer-events:none; 
  transition:opacity .3s; 
}

#btn-home.show { opacity:1; pointer-events:all; }
  /* BOLAS DE SABÃO */
.bola {
  position:fixed;
  z-index:50;
  cursor:pointer;
  pointer-events:all;
  transform-origin:center;
}
.bola img {
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}
</style>
</head>

<body>
<div id="stage">

  <!-- VÍDEO -->
  <video id="vid" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/indice/indice%20(2).mp4" playsinline></video>

  <img id="play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png" />

<script>
var vid=document.getElementById('vid');
var play=document.getElementById('play');
var skip=document.getElementById('skip');
var audioCtx=null;
var bolaVerdadeiraEl=null;
var bolaVideo=null;

var CDN='https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/indice/';
var CLOVIS=[
  CDN+'clovis01.png',
  CDN+'clovis04.png',
  CDN+'clovis03.png',
  CDN+'clovis02.png',
  CDN+'clovis05.png'
];
var VERDADEIRA_IDX=1;

function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function somPlock(vol){
  try{
    var c=getCtx();
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';
    o.frequency.setValueAtTime(220,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(40,c.currentTime+0.18);
    g.gain.setValueAtTime(vol||1.0,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.18);
    o.start();o.stop(c.currentTime+0.18);
  }catch(e){}
}

function somFuga(){
  try{
    var c=getCtx();
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(600,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.3);
    g.gain.setValueAtTime(0.8,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);
    o.start();o.stop(c.currentTime+0.3);
  }catch(e){}
}

function somSusto(){
  try{
    var c=getCtx();
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='square';
    o.frequency.setValueAtTime(80,c.currentTime);
    o.frequency.setValueAtTime(400,c.currentTime+0.05);
    o.frequency.setValueAtTime(80,c.currentTime+0.1);
    g.gain.setValueAtTime(0.9,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);
    o.start();o.stop(c.currentTime+0.25);
  }catch(e){}
}

function somPincha(){
  try{
    var c=getCtx();
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';
    o.frequency.setValueAtTime(300,c.currentTime);
    o.frequency.setValueAtTime(600,c.currentTime+0.08);
    o.frequency.setValueAtTime(300,c.currentTime+0.16);
    o.frequency.setValueAtTime(600,c.currentTime+0.24);
    g.gain.setValueAtTime(0.7,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.35);
    o.start();o.stop(c.currentTime+0.35);
  }catch(e){}
}

function somVento(){
  try{
    var c=getCtx();
    var buf=c.createBuffer(1,c.sampleRate*1.5,c.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.15;
    var src=c.createBufferSource();
    src.buffer=buf;
    var filt=c.createBiquadFilter();
    filt.type='bandpass';
    filt.frequency.value=500;
    var g=c.createGain();
    g.gain.setValueAtTime(0,c.currentTime);
    g.gain.linearRampToValueAtTime(0.5,c.currentTime+0.3);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+1.5);
    src.connect(filt);filt.connect(g);g.connect(c.destination);
    src.start();src.stop(c.currentTime+1.5);
  }catch(e){}
}

var styleAnim=document.createElement('style');
styleAnim.textContent=`
@keyframes rodarIris{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pinchar{
  0%{transform:translateY(0) scale(1)}
  25%{transform:translateY(-40px) scale(1.1,0.9)}
  50%{transform:translateY(0) scale(0.9,1.1)}
  75%{transform:translateY(-20px) scale(1.05,0.95)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes tremer{
  0%,100%{transform:translate(0,0) rotate(0deg)}
  20%{transform:translate(-5px,3px) rotate(-3deg)}
  40%{transform:translate(5px,-3px) rotate(3deg)}
  60%{transform:translate(-3px,5px) rotate(-2deg)}
  80%{transform:translate(3px,-5px) rotate(2deg)}
}
@keyframes rodar{
  from{transform:rotate(0deg) scale(1)}
  50%{transform:rotate(180deg) scale(1.1)}
  to{transform:rotate(360deg) scale(1)}
}
@keyframes flutuarBola{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}
`;
document.head.appendChild(styleAnim);

function criarBolaSabao(x,y,sz,clovisUrl){
  var el=document.createElement('div');
  el.style.cssText=[
    'position:fixed',
    'left:'+x+'px',
    'top:'+y+'px',
    'width:'+sz+'px',
    'height:'+sz+'px',
    'border-radius:50%',
    'background:radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6) 0%, rgba(200,230,255,0.15) 40%, rgba(150,200,255,0.05) 70%, transparent 100%)',
    'box-shadow:inset -'+Math.round(sz*0.15)+'px -'+Math.round(sz*0.1)+'px '+Math.round(sz*0.3)+'px rgba(100,180,255,0.3), inset '+Math.round(sz*0.05)+'px '+Math.round(sz*0.05)+'px '+Math.round(sz*0.2)+'px rgba(255,255,255,0.5), 0 0 '+Math.round(sz*0.2)+'px rgba(150,200,255,0.2)',
    'border:1.5px solid rgba(180,220,255,0.4)',
    'pointer-events:all',
    'cursor:pointer',
    'z-index:200',
    'display:flex',
    'align-items:center',
    'justify-content:center',
    'overflow:hidden',
    'transition:transform 0.3s ease, opacity 0.3s ease',
    'opacity:0'
  ].join(';');

  var iris=document.createElement('div');
  iris.style.cssText=[
    'position:absolute','inset:0','border-radius:50%',
    'background:conic-gradient(from 0deg, rgba(255,100,100,0.08), rgba(255,200,100,0.08), rgba(100,255,100,0.08), rgba(100,200,255,0.08), rgba(200,100,255,0.08), rgba(255,100,100,0.08))',
    'animation:rodarIris '+(4+Math.random()*3)+'s linear infinite',
    'pointer-events:none'
  ].join(';');
  el.appendChild(iris);

  var ref=document.createElement('div');
  ref.style.cssText=[
    'position:absolute','width:30%','height:20%',
    'background:rgba(255,255,255,0.5)','border-radius:50%',
    'top:15%','left:20%','transform:rotate(-30deg)',
    'pointer-events:none','filter:blur(2px)'
  ].join(';');
  el.appendChild(ref);

  if(clovisUrl){
    var img=document.createElement('img');
    img.src=clovisUrl;
    img.style.cssText='width:95%;height:95%;object-fit:contain;position:absolute;inset:0;z-index:1;pointer-events:none;';
    el.appendChild(img);
  }

document.getElementById('stage').appendChild(el);

  // nasce minúscula em baixo
  el.style.transform='scale(0.05)';
  el.style.opacity='0';

  return el;
}

function explodirBola(el,grande){
  var r=el.getBoundingClientRect();
  var cx=r.left+r.width/2, cy=r.top+r.height/2;
  var n=grande?24:14;
  var tamanho=grande?28:16;
  var distancia=grande?140:80;
  for(var p=0;p<n;p++){
    (function(i){
      var dot=document.createElement('div');
      var angle=(i/n)*Math.PI*2;
      var dist=distancia+Math.random()*60;
      var sz=tamanho+Math.random()*tamanho;
      var cores=['rgba(180,220,255,0.95)','rgba(200,240,255,0.95)','rgba(150,200,255,0.95)','rgba(255,255,255,0.9)','rgba(120,180,255,0.95)'];
      dot.style.cssText=[
        'position:fixed',
        'width:'+sz+'px','height:'+sz+'px',
        'border-radius:50%',
        'background:'+cores[i%cores.length],
        'box-shadow:0 0 '+sz+'px rgba(150,200,255,0.6)',
        'left:'+(cx-sz/2)+'px','top:'+(cy-sz/2)+'px',
        'z-index:9999','pointer-events:none',
        'transition:all 0.7s cubic-bezier(0.25,0.46,0.45,0.94)',
        'opacity:1'
      ].join(';');
      document.body.appendChild(dot);
      setTimeout(function(){
        dot.style.left=(cx+Math.cos(angle)*dist-sz/2)+'px';
        dot.style.top=(cy+Math.sin(angle)*dist-sz/2)+'px';
        dot.style.opacity='0';
        dot.style.transform='scale(0.1)';
      },20);
   setTimeout(function(){
    el.style.transition='transform 1.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease';
    el.style.opacity='1';
    el.style.transform='scale(1)';
  },50);
  }
}

function chuvaDeBolasSabao(cb){
  var n=18;
  var W=window.innerWidth, H=window.innerHeight;

  for(var i=0;i<n;i++){
    (function(idx){
      setTimeout(function(){
        // tamanho FINAL grande
        var sz=80+Math.random()*70;
        var x,y;

        if(idx<11){
          x=W*0.55+Math.random()*W*0.38;
        } else {
          x=Math.random()*(W-sz);
        }

        // começa em baixo
        y=H-sz;

        var el=criarBolaSabao(x,y,sz,null);

        // aparece e sobe crescendo ao mesmo tempo
        setTimeout(function(){
          el.style.transition='transform 2.5s ease-out, top 2.5s ease-out, opacity 0.4s ease';
          el.style.opacity='1';
          el.style.transform='scale(1)';
          // sobe até posição aleatória
          el.style.top=(H*0.1+Math.random()*H*0.6)+'px';
        },50);

        // quando chega ao tamanho máximo — cresce mais e PLOCK
        setTimeout(function(){
          el.style.transition='transform 0.8s cubic-bezier(0.34,1.56,0.64,1)';
          el.style.transform='scale(2.8)';
          setTimeout(function(){
            somPlock(0.8);
            explodirBola(el,false);
            el.style.opacity='0';
            setTimeout(function(){el.remove();},500);
          },700);
        }, 2800+Math.random()*800);

      }, idx*120);
    })(i);
  }

  setTimeout(cb, n*120+4500);
}

var bolasClovis=[];

function criarBolaClovis(idx,clovisUrl,verdadeira){
  var W=window.innerWidth, H=window.innerHeight;
  var sz=Math.round(W*0.11);

  var pos=[
    {x:W*0.08, y:H*0.15},
    {x:W*0.72, y:H*0.20},
    {x:W*0.40, y:H*0.08},
    {x:W*0.15, y:H*0.55},
    {x:W*0.65, y:H*0.55}
  ];

  var p=pos[idx]||{x:Math.random()*(W-sz), y:Math.random()*(H-sz)};
  var el=criarBolaSabao(p.x, p.y, sz, clovisUrl);
  bolasClovis.push(el);

  if(verdadeira){
    bolaVerdadeiraEl=el;
    el.style.animation='flutuarBola 2s ease-in-out infinite';
    animarVerdadeira(el,sz);
  } else {
    var W2=W, H2=H;
    var personalidades=[
      function(e){
        e.style.animation='tremer 0.3s ease-in-out infinite';
        e.onclick=function(){
          somSusto();
          e.style.transition='left 0.3s ease-out, top 0.3s ease-out';
          e.style.left=(Math.random()*(W2-sz))+'px';
          e.style.top=(Math.random()*(H2-sz))+'px';
        };
      },
      function(e){
        e.style.animation='flutuarBola 2.5s ease-in-out infinite';
        e.onclick=function(){
          somFuga();
          e.style.transition='left 0.25s cubic-bezier(0.5,-0.5,0.7,1.2), top 0.25s cubic-bezier(0.5,-0.5,0.7,1.2)';
          e.style.left=(Math.random()*(W2-sz))+'px';
          e.style.top=(Math.random()*(H2-sz))+'px';
          if(!e._fugas) e._fugas=0;
          e._fugas++;
          if(e._fugas>=3) setTimeout(function(){estoirarClovis(e);},500);
        };
      },
      function(e){
        e.style.animation='pinchar 0.8s ease-in-out infinite';
        e.onclick=function(){
          somPincha();
          e.style.transition='left 0.4s ease, top 0.4s ease';
          e.style.left=(Math.random()*(W2-sz))+'px';
          e.style.top=(Math.random()*(H2-sz))+'px';
          if(!e._pinches) e._pinches=0;
          e._pinches++;
          if(e._pinches>=3) setTimeout(function(){estoirarClovis(e);},600);
        };
      },
      function(e){
        e.style.animation='rodar 2s linear infinite';
        e.onclick=function(){
          somFuga();
          e.style.animation='rodar 0.3s linear infinite';
          var sai=Math.random()<0.5;
          e.style.transition='left 0.5s ease-in, top 0.5s ease-in';
          e.style.left=(sai?-sz:W2+sz)+'px';
          e.style.top=(Math.random()*(H2-sz))+'px';
          setTimeout(function(){
            e.style.transition='none';
            e.style.left=(sai?W2+sz:-sz)+'px';
            setTimeout(function(){
              e.style.transition='left 0.5s ease-out, top 0.5s ease-out';
              e.style.animation='rodar 2s linear infinite';
              e.style.left=(Math.random()*(W2-sz))+'px';
              e.style.top=(Math.random()*(H2-sz))+'px';
            },100);
          },600);
          if(!e._rodas) e._rodas=0;
          e._rodas++;
          if(e._rodas>=3) setTimeout(function(){estoirarClovis(e);},800);
        };
      }
    ];

    personalidades[idx%personalidades.length](el);

    var tempos=[6000,9000,12000,15000];
    setTimeout(function(){if(el.parentNode)estoirarClovis(el);}, tempos[idx]||8000);
  }

  return el;
}

function estoirarClovis(el){
  if(!el.parentNode) return;
  el.style.transition='transform 1s cubic-bezier(0.34,1.56,0.64,1)';
  el.style.transform='scale(3)';
  setTimeout(function(){
    somPlock(1.5);
    explodirBola(el,true);
    el.style.opacity='0';
    setTimeout(function(){if(el.parentNode)el.remove();},500);
  },900);
}

function animarVerdadeira(el,sz){
  var W=window.innerWidth, H=window.innerHeight;
  el.style.transition='left 3s ease-in-out, top 2s ease-in-out';
  var tentativas=0;

  function mover(){
    if(!el.parentNode) return;
    el.style.left=(sz+Math.random()*(W-sz*3))+'px';
    el.style.top=(sz+Math.random()*(H-sz*3))+'px';
    setTimeout(mover, 3000+Math.random()*1000);
  }

  el.addEventListener('click',function(e){
    tentativas++;
    if(tentativas<3){
      somFuga();
      el.style.transition='left 0.2s ease-out, top 0.2s ease-out';
      el.style.left=(Math.random()*(W-sz))+'px';
      el.style.top=(Math.random()*(H-sz))+'px';
      setTimeout(function(){
        el.style.transition='left 3s ease-in-out, top 3s ease-in-out';
      },300);
      e.stopImmediatePropagation();
    } else {
      window.location.href='/album';
    }
  });

  setTimeout(mover,500);
}

function showPage(){
  if(bolaVideo){bolaVideo.remove();bolaVideo=null;}
  vid.pause();
  vid.style.opacity='0';
  document.getElementById('gbg').classList.add('show');
  document.querySelectorAll('.hs').forEach(function(h){h.classList.add('show');});
  document.getElementById('btn-home').classList.add('show');

  somVento();
  chuvaDeBolasSabao(function(){
    [0,1,2,3,4].forEach(function(cIdx,i){
      setTimeout(function(){
        criarBolaClovis(i, CLOVIS[cIdx], i===VERDADEIRA_IDX);
      }, i*300);
    });
  });
}

function iniciarBolaVideo(){
  var W=window.innerWidth, H=window.innerHeight;
  var sz=Math.round(W*0.11);
  var el=criarBolaSabao(-sz, H*0.3, sz, CLOVIS[0]);
  el.style.transition='left 1.5s ease, top 1.5s ease, opacity 0.3s ease';
  bolaVideo=el;

  setTimeout(function(){el.style.left=(W*0.42)+'px';},300);
  setTimeout(function(){el.style.top=(H*0.2)+'px';},2000);
  setTimeout(function(){el.style.top=(H*0.55)+'px';},4000);
  setTimeout(function(){el.style.left=(-sz)+'px';},6000);
  setTimeout(function(){
    el.style.transition='none';
    el.style.left=(W+sz)+'px';
    el.style.top=(H*0.4)+'px';
  },7500);
  setTimeout(function(){
    el.style.transition='left 1.5s ease';
    el.style.left=(W*0.35)+'px';
  },7600);
  setTimeout(function(){el.style.left=(W+sz)+'px';},11000);
}

play.onclick=function(){
  try{
    var c=new(window.AudioContext||window.webkitAudioContext)();
    audioCtx=c;
    var o1=c.createOscillator(),o2=c.createOscillator();
    var g1=c.createGain(),g2=c.createGain();
    o1.connect(g1);g1.connect(c.destination);
    o2.connect(g2);g2.connect(c.destination);
    o1.type='sine';
    o1.frequency.setValueAtTime(440,c.currentTime);
    o1.frequency.setValueAtTime(550,c.currentTime+0.15);
    o1.frequency.setValueAtTime(440,c.currentTime+0.3);
    g1.gain.setValueAtTime(1.0,c.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5);
    o2.type='sine';
    o2.frequency.setValueAtTime(330,c.currentTime+0.2);
    o2.frequency.setValueAtTime(440,c.currentTime+0.4);
    g2.gain.setValueAtTime(0,c.currentTime);
    g2.gain.setValueAtTime(1.5,c.currentTime+0.2);
    g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.7);
    o1.start();o1.stop(c.currentTime+0.5);
    o2.start(c.currentTime+0.2);o2.stop(c.currentTime+0.7);
  }catch(e){}

  play.style.transition='transform 0.15s ease';
  play.style.transform='translate(-50%,-50%) scale(1.3)';
  setTimeout(function(){play.style.transform='translate(-50%,-50%) scale(0.85)';},150);
  setTimeout(function(){play.style.transform='translate(-50%,-50%) scale(1.15)';},280);
  setTimeout(function(){
    play.style.transition='transform 1s ease-in, opacity 0.8s ease';
    play.style.transform='translate(-50%,-280%) rotate(15deg) scale(0.3)';
    play.style.opacity='0';
  },400);
  setTimeout(function(){
    play.classList.add('gone');
    skip.classList.add('gone');
    vid.style.opacity='1';
    vid.play().catch(function(){vid.muted=true;vid.play();});
    iniciarBolaVideo();
  },500);
};

skip.onclick=function(){
  play.classList.add('gone');
  skip.classList.add('gone');
  showPage();
};

vid.addEventListener('ended',showPage);

var nav={
  'hs-ignora':'/a_regras','hs-carolina':'/carolina',

  'hs-clovis':'/clovis','hs-fatima':'/fatima',
  'hs-rabisca':'/interativo','hs-clicks':'/galeria',
  'hs-blabla':'/chat'
};

  document.getElementById(id).onclick=function(){window.location.href=nav[id];};
});

</script>
