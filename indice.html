<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Índice</title>

<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-512.png" />

<style>
*, *::before, *::after { 
  margin:0; 
  padding:0; 
  box-sizing:border-box; 
  outline:none !important; 
  -webkit-tap-highlight-color:transparent !important;
}

html, body { 
  width:100%; 
  height:100%; 
  overflow:hidden; 
  background:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;
}

#stage { 
  position:fixed; 
  top:0; left:0; 
  width:100%; height:100%; 
  overflow:hidden; 
}

#vid { 
  position:absolute; 
  inset:0; 
  width:100%; 
  height:100%; 
  object-fit:cover; 
  z-index:1; 
  opacity:0;
  transition:opacity .5s;
}

#play { 
  position:fixed; 
  left:50%; 
  top:50%; 
  transform:translate(-50%,-50%); 
  width:10%; 
  cursor:pointer; 
  z-index:10; 
  transition:opacity .5s;
}

#play.gone { opacity:0; pointer-events:none; }

/* ⭐ BOTÃO SKIP */
#skip {
  position:fixed;
  bottom:3.5%;
  right:3.4%;
  width:6%;
  cursor:pointer;
  z-index:10;
  opacity:1;
  pointer-events:all;
  transition:opacity .3s;
}

#skip.gone {
  opacity:0;
  pointer-events:none;
}
#skip{
  transition: transform .2s ease;
}

#skip:hover{
  content:url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/skip11.png");
  transform:scale(1.15);
}
#gbg { 
  position:absolute; 
  inset:0; 
  width:100%; 
  height:100%; 
  object-fit:cover; 
  z-index:2; 
  opacity:0; 
  transition:opacity 1.4s ease; 
  pointer-events:none; 
}

#gbg.show { opacity:1; }

.hs { 
  position:absolute; 
  cursor:pointer; 
  z-index:10; 
  background:transparent; 
  border:none; 
  opacity:0; 
  pointer-events:none; 
  border-radius:8px; 
}

.hs.show { opacity:1; pointer-events:all; }

#btn-home { 
  position:fixed; 
  bottom:3.5%; 
  right:3.4%; 
  width:8%; 
  cursor:pointer; 
  z-index:9999; 
  opacity:0; 
  pointer-events:none; 
  transition:opacity .3s; 
}

#btn-home.show { opacity:1; pointer-events:all; }
  /* BOLAS DE SABÃO */
.bola {
  position:fixed;
  z-index:50;
  cursor:pointer;
  pointer-events:all;
  transform-origin:center;
}
.bola img {
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}
</style>
</head>

<body>
<div id="stage">

  <!-- VÍDEO -->
  <video id="vid" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/indice/indice%20(2).mp4" playsinline></video>

  <!-- PLAY -->
  <img id="play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png" />

  <!-- ⭐ SKIP -->
  <img id="skip" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/skip1.png" />

  <!-- PÁGINA FIXA -->
  <img id="gbg" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/indice/indice.png" />

  <!-- HOTSPOTS -->
  <div class="hs" id="hs-ignora"   style="left:10.422%; top:16.895%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-carolina" style="left:30.737%; top:16.583%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-gloria"   style="left:51.053%; top:16.895%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-daniela"  style="left:71.893%; top:16.739%; width:18%; height:22%;"></div>

  <div class="hs" id="hs-beatriz"  style="left:10.422%; top:38.066%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-lurdes"   style="left:30.562%; top:38.533%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-clovis"   style="left:51.228%; top:37.755%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-fatima"   style="left:71.630%; top:37.132%; width:18%; height:22%;"></div>

  <div class="hs" id="hs-rabisca"  style="left:16.727%; top:59.860%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-clicks"   style="left:42.384%; top:60.483%; width:18%; height:22%;"></div>
  <div class="hs" id="hs-blabla"   style="left:65.851%; top:59.704%; width:18%; height:22%;"></div>

  <!-- BOTÃO HOME -->
  <img id="btn-home" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/botao%20(2).png" />

</div>

<script>
<script>
var vid=document.getElementById('vid');
var play=document.getElementById('play');
var skip=document.getElementById('skip');
var paginaAtiva=false;
var audioCtx=null;

function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// 🔊 vento suave em loop
var ventoNode=null;
function iniciarVento(){
  try{
    var ctx=getCtx();
    var buf=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.12;
    var src=ctx.createBufferSource();
    src.buffer=buf;
    src.loop=true;
    var filt=ctx.createBiquadFilter();
    filt.type='bandpass';
    filt.frequency.value=400;
    var gain=ctx.createGain();
    gain.gain.value=0.4;
    src.connect(filt);filt.connect(gain);gain.connect(ctx.destination);
    src.start();
    ventoNode={src:src,gain:gain};
  }catch(e){}
}

function pararVento(){
  if(ventoNode){
    try{ventoNode.gain.gain.exponentialRampToValueAtTime(0.001,getCtx().currentTime+1);
    setTimeout(function(){try{ventoNode.src.stop();}catch(e){}},1100);}catch(e){}
    ventoNode=null;
  }
}

// 🔊 PLOCK
function plock(){
  try{
    var ctx=getCtx();
    var o=ctx.createOscillator();
    var g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(180,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.15);
    g.gain.setValueAtTime(1.0,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
  }catch(e){}
}

// URLs das bolas
var BOLAS=[
  'https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/indice/50.png',
  'https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/indice/51.png',
  'https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/indice/52.png', // ← VERDADEIRA
  'https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/indice/53.png',
  'https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/indice/54.png'
];
var VERDADEIRA=2; // índice da 52.png

// partículas do plock
function explodirBola(el){
  var r=el.getBoundingClientRect();
  var cx=r.left+r.width/2;
  var cy=r.top+r.height/2;
  for(var p=0;p<10;p++){
    (function(i){
      var dot=document.createElement('div');
      var angle=(i/10)*Math.PI*2;
      var dist=40+Math.random()*30;
      dot.style.cssText=[
        'position:fixed',
        'width:8px','height:8px',
        'border-radius:50%',
        'background:rgba(180,220,255,0.8)',
        'left:'+(cx-4)+'px',
        'top:'+(cy-4)+'px',
        'z-index:9999',
        'pointer-events:none',
        'transition:all 0.4s ease-out',
        'opacity:1'
      ].join(';');
      document.body.appendChild(dot);
      setTimeout(function(){
        dot.style.left=(cx+Math.cos(angle)*dist-4)+'px';
        dot.style.top=(cy+Math.sin(angle)*dist-4)+'px';
        dot.style.opacity='0';
        dot.style.transform='scale(0.1)';
      },20);
      setTimeout(function(){dot.remove();},500);
    })(p);
  }
}

// bola durante o vídeo — só uma a espreitar
var bolaVideo=null;
function iniciarBolaVideo(){
  var el=document.createElement('div');
  el.className='bola';
  var sz=Math.round(window.innerWidth*0.09);
  el.style.cssText='width:'+sz+'px;height:'+sz+'px;right:-'+sz+'px;top:30%;transition:right 2s ease;';
  var img=document.createElement('img');
  img.src=BOLAS[0];
  el.appendChild(img);
  document.getElementById('stage').appendChild(el);
  bolaVideo=el;

  // entra
  setTimeout(function(){el.style.right='2%';},500);
  // sai
  setTimeout(function(){el.style.right='-'+sz+'px';},4000);
  // entra outra vez
  setTimeout(function(){
    el.style.top='55%';
    el.style.right='3%';
  },9000);
  // sai de vez
  setTimeout(function(){el.style.right='-'+sz+'px';},12000);
}

// bolas na página fixa
var bolasAtivas=[];
var bolaVerdadeiraEl=null;
var animVerdadeira=null;

function criarBolasFixas(){
  iniciarVento();

  var sz=Math.round(window.innerWidth*0.10);
  var stage=document.getElementById('stage');

  // posições iniciais espalhadas
  var posicoes=[
    {x:10,y:15},{x:35,y:25},{x:60,y:10},{x:75,y:40},{x:20,y:55}
  ];

  BOLAS.forEach(function(url,i){
    var el=document.createElement('div');
    el.className='bola';
    var px=posicoes[i].x/100*window.innerWidth;
    var py=posicoes[i].y/100*window.innerHeight;
    el.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+px+'px;top:'+py+'px;transition:transform 0.3s ease,opacity 0.3s ease;opacity:0;';
    var img=document.createElement('img');
    img.src=url;
    el.appendChild(img);
    stage.appendChild(el);
    bolasAtivas.push(el);

    // aparecer com delay
    setTimeout(function(){
      el.style.opacity='1';
      // flutuação suave
      animarFlutuar(el);
    }, i*400+200);

    if(i===VERDADEIRA){
      bolaVerdadeiraEl=el;
      el.style.cursor='pointer';
      setTimeout(function(){
        animarVerdadeira();
      }, i*400+200);
    } else {
      // estoira após delay diferente para cada uma
      var delays=[3500,5500,7000,9000];
      var d=delays[i<VERDADEIRA?i:i-1]||3500;
      setTimeout(function(){
        estoirarBola(el);
      }, d);
    }
  });

  // bola verdadeira clicável → álbum
  setTimeout(function(){
    if(bolaVerdadeiraEl){
      bolaVerdadeiraEl.onclick=function(){
        window.location.href='/album';
      };
    }
  },1000);
}

function animarFlutuar(el){
  var dy=8+Math.random()*6;
  var dur=2000+Math.random()*1000;
  var start=null;
  var initTop=parseFloat(el.style.top)||0;
  function step(ts){
    if(!start)start=ts;
    var p=(ts-start)/dur;
    var y=Math.sin(p*Math.PI*2)*dy;
    el.style.top=(initTop+y)+'px';
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function animarVerdadeira(){
  if(!bolaVerdadeiraEl)return;
  var el=bolaVerdadeiraEl;
  var W=window.innerWidth;
  var sz=el.offsetWidth||Math.round(W*0.10);
  var y=window.innerHeight*0.45;
  el.style.transition='left 3s ease-in-out, top 2s ease';
  el.style.top=y+'px';

  function mover(){
    if(!bolaVerdadeiraEl)return;
    // vai para a direita
    el.style.left=(W-sz-20)+'px';
    setTimeout(function(){
      if(!bolaVerdadeiraEl)return;
      // vai para a esquerda
      el.style.left='20px';
      setTimeout(mover,3100);
    },3100);
  }
  mover();

  // sai e entra pelos lados
  setInterval(function(){
    if(!bolaVerdadeiraEl)return;
    // sai pela direita
    el.style.transition='left 1s ease-in';
    el.style.left=(W+sz)+'px';
    setTimeout(function(){
      if(!bolaVerdadeiraEl)return;
      // entra pela esquerda
      el.style.left=(-sz)+'px';
      el.style.transition='none';
      setTimeout(function(){
        if(!bolaVerdadeiraEl)return;
        el.style.transition='left 3s ease-in-out';
        el.style.left=(W/2-sz/2)+'px';
      },100);
    },1100);
  },12000);
}

function estoirarBola(el){
  // cresce
  el.style.transition='transform 0.4s ease-in';
  el.style.transform='scale(1.5)';
  setTimeout(function(){
    plock();
    explodirBola(el);
    el.style.opacity='0';
    el.style.transform='scale(2)';
    setTimeout(function(){el.remove();},400);
  },400);
}

// PLAY
play.onclick = function(){
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var o1 = ctx.createOscillator();
    var o2 = ctx.createOscillator();
    var g1 = ctx.createGain();
    var g2 = ctx.createGain();
    o1.connect(g1); g1.connect(ctx.destination);
    o2.connect(g2); g2.connect(ctx.destination);
    o1.type = 'sine';
    o1.frequency.setValueAtTime(440, ctx.currentTime);
    o1.frequency.setValueAtTime(550, ctx.currentTime + 0.15);
    o1.frequency.setValueAtTime(440, ctx.currentTime + 0.3);
    g1.gain.setValueAtTime(1.0, ctx.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o2.type = 'sine';
    o2.frequency.setValueAtTime(330, ctx.currentTime + 0.2);
    o2.frequency.setValueAtTime(440, ctx.currentTime + 0.4);
    g2.gain.setValueAtTime(0.0, ctx.currentTime);
    g2.gain.setValueAtTime(1.5, ctx.currentTime + 0.2);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
    o1.start(ctx.currentTime); o1.stop(ctx.currentTime + 0.5);
    o2.start(ctx.currentTime + 0.2); o2.stop(ctx.currentTime + 0.7);
  } catch(e) {}

  play.style.transition = 'transform 0.15s ease';
  play.style.transform = 'translate(-50%, -50%) scale(1.3)';
  setTimeout(function(){ play.style.transform = 'translate(-50%, -50%) scale(0.85)'; }, 150);
  setTimeout(function(){ play.style.transform = 'translate(-50%, -50%) scale(1.15)'; }, 280);
  setTimeout(function(){
    play.style.transition = 'transform 1s ease-in, opacity 0.8s ease';
    play.style.transform = 'translate(-50%, -280%) rotate(15deg) scale(0.3)';
    play.style.opacity = '0';
  }, 400);
  setTimeout(function(){
    play.classList.add('gone');
    skip.classList.add('gone');
    vid.style.opacity = '1';
    vid.play().catch(function(){ vid.muted=true; vid.play(); });
    iniciarBolaVideo();
  }, 500);
};

skip.onclick=function(){
  play.classList.add('gone');
  skip.classList.add('gone');
  showPage();
};

vid.addEventListener('ended', showPage);

function showPage(){
  paginaAtiva=true;
  if(bolaVideo){bolaVideo.remove();bolaVideo=null;}
  vid.pause();
  vid.style.opacity='0';
  document.getElementById('gbg').classList.add('show');
  document.querySelectorAll('.hs').forEach(h=>h.classList.add('show'));
  document.getElementById('btn-home').classList.add('show');
  criarBolasFixas();
}

var nav={
  'hs-ignora':'/a_regras','hs-carolina':'/carolina',
  'hs-gloria':'/gloria','hs-daniela':'/daniela',
  'hs-beatriz':'/beatriz','hs-lurdes':'/lurdes',
  'hs-clovis':'/clovis','hs-fatima':'/fatima',
  'hs-rabisca':'/interativo','hs-clicks':'/galeria',
  'hs-blabla':'/chat'
};
Object.keys(nav).forEach(function(id){
  document.getElementById(id).onclick=function(){window.location.href=nav[id];};
});
document.getElementById('btn-home').onclick=function(){window.location.href='/';};
</script>
<script src="/notif.js"></script>
</body>
</html>
