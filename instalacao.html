<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Instalação</title>

  <link rel="manifest" href="/manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/fundilho.png');
      background-size: cover;
      background-position: center;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      flex-direction: column;
      font-family: sans-serif;
    }

    .logo {
      width: 260px;
      transform-style: preserve-3d;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35));
      border-radius: 50%;
      display: none;
    }

    .rodar {
      animation: rodar 1.2s ease-out 2 forwards;
    }

    @keyframes rodar {
      0%   { transform: rotateY(0deg) scale(1); }
      40%  { transform: rotateY(180deg) scale(0.9); }
      100% { transform: rotateY(360deg) scale(1); }
    }

    #play {
      width: 260px;
      cursor: pointer;
      transition: 0.3s;
    }

    #play:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 0 10px #fff);
    }

    #frase-final {
      margin-top: 30px;
      color: white;
      font-size: 22px;
      display: none;
      cursor: pointer;
      transition: 0.3s;
    }

    #frase-final:hover {
      color: #ffea00;
      text-shadow: 0 0 10px #fff;
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <img src="/icon-512.png" class="logo" id="logo">

  <!-- SOM -->
  <audio id="som-moeda" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/coin.wav"></audio>

  <!-- BOTÃO PLAY -->
  <img id="play"
       src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

  <!-- FRASE FINAL -->
  <div id="frase-final">Abrir a aplicação</div>

<script>
  let deferredPrompt = null;
  const som = document.getElementById('som-moeda');
  const logo = document.getElementById('logo');
  const play = document.getElementById('play');
  const frase = document.getElementById('frase-final');

  // Guardar evento de instalação
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  // Clicar no PLAY → arranca tudo
  play.addEventListener('click', () => {
    // som
    som.currentTime = 0;
    som.play().catch(()=>{});

    // esconder play
    play.style.display = 'none';

    // mostrar logo + animação
    logo.style.display = 'block';
    logo.classList.add('rodar');
  });

  // Som durante a animação
  logo.addEventListener('animationstart', () => {
    som.volume = 1;
    som.currentTime = 0;
    som.play().catch(()=>{});
  });

  logo.addEventListener('animationiteration', () => {
    som.volume = 0.4;
    som.currentTime = 0;
    som.play().catch(()=>{});
  });

  // Quando a animação termina → instalar
  logo.addEventListener('animationend', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const escolha = await deferredPrompt.userChoice;

      if (escolha.outcome === 'accepted') {
        frase.style.display = 'block';
      }

      deferredPrompt = null;
    }
  });

  // Clicar na frase → abrir home
  frase.addEventListener('click', () => {
    window.location.href = 'index.html';
  });
</script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
