<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Instalação</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: sans-serif;
    }
    #btn-play {
      width: 15%;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <img id="btn-play" src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

<script>
  // === TESTE FORÇADO - APAGA DEPOIS ===
  localStorage.removeItem('appInstalled');

  // Se já foi instalado, vai direto para home
  if (localStorage.getItem('appInstalled') === 'true') {
    window.location.href = 'index.html';
  }

  document.getElementById('btn-play').onclick = function() {
    localStorage.setItem('appInstalled', 'true');
    window.location.href = 'index.html';
  };
</script>
</body>
</html>
