<head>
  <meta charset="UTF-8">
  <title>Instalação</title>

  <link rel="manifest" href="/manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/fundilho.png');
      background-size: cover;
      background-position: center;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .logo {
      width: 260px;
      transform-style: preserve-3d;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35));
      transition: box-shadow 0.2s ease-out;
      border-radius: 50%;
    }

    .rodar {
      animation: rodar 1.2s ease-out 2 forwards;
    }

    @keyframes rodar {
      0%   { transform: rotateY(0deg) scale(1); }
      40%  { transform: rotateY(180deg) scale(0.9); }
      100% { transform: rotateY(360deg) scale(1); }
    }

    .brilhar {
      box-shadow: 0 0 9px 3px rgba(255,255,255,0.9);
    }

    #botao-final {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      cursor: pointer;
      width: 260px;
      transition: opacity 0.3s ease;
    }

    #botao-final:hover {
      content: url('https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/mas-se-der-asneira-n-o-fui-eu.png');
    }
  </style>
</head>
