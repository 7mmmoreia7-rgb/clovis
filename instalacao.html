<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Teste Instalação</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: white;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      text-align: center;
    }
    button {
      padding: 20px 40px;
      font-size: 20px;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>TESTE - Página de Instalação</h1>
  <p>Se estás a ver esta página, a instalação está a funcionar.</p>
  <button onclick="irParaHome()">Ir para Home</button>

<script>
  // Força mostrar sempre durante o teste
  localStorage.removeItem('appInstalled');

  function irParaHome() {
    localStorage.setItem('appInstalled', 'true');
    window.location.href = 'index.html';
  }

  // Se já estiver marcado como instalada, vai direto (mas agora estamos a forçar o contrário)
  console.log("Página de instalação carregada");
</script>
</body>
</html>
