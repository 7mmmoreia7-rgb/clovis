<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Instalação</title>

<link rel="manifest" href="/manifest.json">

<style>
body {
  margin:0;
  overflow:hidden;
  background-image: url('https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png');
  background-size: cover;
  background-position: center;
}

/* 🎬 VIDEO */
#video {
  position: fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit: cover;
  display:none;
}

/* ▶️ PLAY */
#play {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:140px;
  cursor:pointer;
  z-index:10;
}

/* 🌀 LOGO (clicável) */
#logo {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:220px;
  display:none;
  z-index:20;
  cursor:pointer;
  transition: transform .3s;
}

#logo:hover {
  transform:translate(-50%,-50%) scale(1.05);
}

/* 🚀 BOTÃO FINAL */
#btn {
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  display:none;
  cursor:pointer;
  z-index:30;
}

#btn:hover {
  content: url('https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/mas-se-der-asneira-n-o-fui-eu.png');
}
</style>
</head>

<body>

<!-- ▶️ PLAY -->
<img id="play"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

<!-- 🎬 VIDEO -->
<video id="video" playsinline preload="auto">
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/instalar.mp4">
</video>

<!-- 🌀 LOGO -->
<img id="logo"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/icon-512.png">

<!-- 🚀 BOTÃO FINAL -->
<img id="btn"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/pronto-j-est-acho-eu.png">

<script>
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

const video = document.getElementById("video");
const play = document.getElementById("play");
const logo = document.getElementById("logo");
const btn = document.getElementById("btn");

// 👉 se já está instalada → entra direto
if (localStorage.getItem("app_instalada") === "true") {
  window.location.href = "index.html";
}

// ▶️ PLAY
play.onclick = () => {
  play.style.display = "none";
  video.style.display = "block";
  video.play();
};

// 🎬 fim do vídeo → mostra logo
video.onended = () => {
  logo.style.display = "block";
};

// 🌀 LOGO = instalar + entrar
logo.onclick = async () => {

  if (deferredPrompt) {
    deferredPrompt.prompt();

    const escolha = await deferredPrompt.userChoice;

    if (escolha.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
      btn.style.display = "block"; // mostra botão final
      return;
    }

    deferredPrompt = null;
  }

  // fallback → entra na app
  window.location.href = "index.html";
};

// 🚀 BOTÃO FINAL → entrar na app
btn.onclick = () => {
  window.location.href = "index.html";
};

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
