<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>App</title>

<link rel="manifest" href="/manifest.json">

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  body {background: url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;

}

/* 🎬 VÍDEO */
#video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: transparent;
}

/* ▶️ PLAY */
#play {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 140px;
  cursor: pointer;
  z-index: 10;
}

/* 🟡 CLICK FINAL (instalação) */
#installZone {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: none;
  background: transparent;
}
</style>
</head>

<body>

<!-- 🎬 VÍDEO (a tua instalação está DENTRO do vídeo) -->
<video id="video" playsinline preload="auto" muted>
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/instalar.mp4">
</video>

<!-- ▶️ PLAY -->
<img id="play"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

<!-- 🟡 ZONA CLICÁVEL FINAL -->
<div id="installZone"></div>

<script>
<script>
// 👉 se já está em modo standalone (aberta pelo ícone) → vai direto
const isStandalone =
  window.matchMedia('(display-mode: standalone)').matches ||
  window.navigator.standalone === true;

if (isStandalone) {
  window.location.replace("index.html");
}

// 👉 se já foi instalada antes → vai direto
if (localStorage.getItem("app_instalada") === "true") {
  window.location.replace("index.html");
}

let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

async function tryInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;
    if (choice.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
    }
    deferredPrompt = null;
    window.location.replace("index.html");
    return;
  }
  showFallbackInstall();
}

function showFallbackInstall() {
  const fallback = document.createElement("div");
  fallback.innerHTML = `
    <div style="
      position:fixed;inset:0;background:black;color:white;
      display:flex;flex-direction:column;justify-content:center;
      align-items:center;text-align:center;font-family:sans-serif;
      z-index:9999;padding:20px;">
      <h2>Instalar App</h2>
      <p>Chrome → ⋮ → <b>"Adicionar ao ecrã inicial"</b></p>
    </div>
  `;
  document.body.appendChild(fallback);
}

const video = document.getElementById("video");
const play = document.getElementById("play");
const installZone = document.getElementById("installZone");

video.addEventListener("loadeddata", () => {
  video.currentTime = 0.01;
});

play.onclick = async () => {
  play.style.display = "none";
  video.muted = false;
  await video.play().catch(() => {});
};

video.onended = () => {
  installZone.style.display = "block";
  installZone.onclick = tryInstall;
};

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</script>

</body>
</html>
