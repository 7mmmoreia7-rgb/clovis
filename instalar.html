<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Instalação</title>

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
}

/* 🎬 VÍDEO (sem flash) */
#video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

/* ▶️ PLAY */
#play {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 140px;
  cursor: pointer;
  z-index: 10;
}

/* 🌀 LOGO (vem no vídeo/design e só ativa no fim) */
#logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 220px;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  cursor: pointer;
  transition: opacity 0.3s ease;
}
</style>
</head>

<body>

<!-- 🎬 VÍDEO -->
<video id="video" playsinline preload="auto" poster="">
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/instalar.mp4">
</video>

<!-- ▶️ PLAY -->
<img id="play"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

<!-- 🌀 LOGO (já está no design) -->
<img id="logo"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/icon-512.png">

<script>
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

const video = document.getElementById("video");
const play = document.getElementById("play");
const logo = document.getElementById("logo");

/* ▶️ PLAY → vídeo */
play.onclick = async () => {
  play.style.display = "none";
  await video.play().catch(() => {});
};

/* 🎬 FIM DO VÍDEO → mostra logo clicável */
video.onended = () => {
  logo.style.opacity = "1";
  logo.style.pointerEvents = "auto";
};

/* 🌀 LOGO → instalação PWA oficial */
logo.onclick = async () => {

  if (deferredPrompt) {
    deferredPrompt.prompt();

    const choice = await deferredPrompt.userChoice;

    if (choice.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
    }

    deferredPrompt = null;
  }

  window.location.href = "index.html";
};
</script>

</body>
</html>
