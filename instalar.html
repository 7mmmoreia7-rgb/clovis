<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>App</title>

<link rel="manifest" href="/manifest.json">

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
}

/* 🎬 VÍDEO */
#video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

/* ▶️ PLAY */
#play {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 140px;
  cursor: pointer;
  z-index: 10;
}

/* 🟡 CLICK FINAL (instalação) */
#installZone {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: none;
  background: transparent;
}
</style>
</head>

<body>

<!-- 🎬 VÍDEO (a tua instalação está DENTRO do vídeo) -->
<video id="video" playsinline preload="auto">
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/instalar.mp4">
</video>

<!-- ▶️ PLAY -->
<img id="play"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

<!-- 🟡 ZONA CLICÁVEL FINAL -->
<div id="installZone"></div>

<script>
const isStandalone =
  window.matchMedia('(display-mode: standalone)').matches ||
  window.navigator.standalone === true;

if (isStandalone) {
  window.location.href = "index.html";
}
let deferredPrompt = null;

// PWA install hook
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

const video = document.getElementById("video");
const play = document.getElementById("play");
const installZone = document.getElementById("installZone");

// ▶️ play → inicia vídeo
play.onclick = async () => {
  play.style.display = "none";
  await video.play().catch(() => {});
};

// 🎬 fim do vídeo → ativa clique
video.onended = () => {
  installZone.style.display = "block";
};

// 🟡 clique → instalação + app
installZone.onclick = async () => {

  if (deferredPrompt) {
    deferredPrompt.prompt();

    const choice = await deferredPrompt.userChoice;

    if (choice.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
    }

    deferredPrompt = null;
  }

  window.location.href = "index.html";
};

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
