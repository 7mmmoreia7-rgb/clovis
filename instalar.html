<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Instalação</title>

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
}

/* 🎬 VÍDEO É O FUNDO */
#video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: black;
}

/* ▶️ PLAY por cima do primeiro frame */
#play {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 140px;
  cursor: pointer;
  z-index: 10;
}

/* 🟡 ZONA INVISÍVEL (instalação no fim) */
#installZone {
  position: fixed;
  inset: 0;
  z-index: 20;
  background: transparent;
  display: none;
}
</style>
</head>

<body>

<!-- 🎬 VIDEO (já visível desde o início) -->
<video id="video" playsinline preload="auto">
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/instalar.mp4">
</video>

<!-- ▶️ PLAY -->
<img id="play"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

<!-- 🟡 CLICK FINAL -->
<div id="installZone"></div>

<script>
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

const video = document.getElementById("video");
const play = document.getElementById("play");
const installZone = document.getElementById("installZone");

// ▶️ play → inicia vídeo
play.onclick = async () => {
  play.style.display = "none";

  try {
    await video.play();
  } catch (e) {
    console.log(e);
  }
};

// 🎬 fim do vídeo → ativa instalação
video.onended = () => {
  installZone.style.display = "block";
};

// 🟡 instalação
installZone.onclick = async () => {

  if (deferredPrompt) {
    deferredPrompt.prompt();

    const escolha = await deferredPrompt.userChoice;

    if (escolha.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
      window.location.href = "index.html";
    }

    deferredPrompt = null;
    return;
  }

  window.location.href = "index.html";
};

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
