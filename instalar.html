<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Instalação</title>

<link rel="manifest" href="/manifest.json">

<style>
body {
  margin:0;
  overflow:hidden;
  background-image: url('https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png');
  background-size: cover;
  background-position: center;
}

#video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background-image: url('https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png');
  background-size: cover;
  background-position: center;
}

#btn {
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  display:none;
  cursor:pointer;
}
</style>
</head>

<body>

<img id="play"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png"
style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;cursor:pointer;z-index:10;">

<video id="video" playsinline preload="auto" style="display:none;">
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/instalar.mp4">
</video>
<img id="logo"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/icon-512.png"
style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:200px;
display:none;
z-index:20;
cursor:pointer;
">
<img id="btn"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/pronto-j-est-acho-eu.png">

<script>
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

const video = document.getElementById("video");
const btn = document.getElementById("btn");
const play = document.getElementById("play");
const logo = document.getElementById("logo");
video.onended = () => {
  logo.style.display = "block";
};  
// 👉 se já instalou → salta tudo (primeiro!)
if (localStorage.getItem("app_instalada") === "true") {
  window.location.href = "index.html";
}

// ▶️ PLAY
play.onclick = () => {
  play.style.pointerEvents = "none";
  play.style.display = "none";
  video.style.display = "block";
  video.play();
};

  let instaladoAgora = false;

  if (deferredPrompt) {
    deferredPrompt.prompt();

    const escolha = await deferredPrompt.userChoice;

    if (escolha.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
      instaladoAgora = true;
    }

    deferredPrompt = null;
  }

  // 👉 só mostra botão se instalou
  if (instaladoAgora || localStorage.getItem("app_instalada") === "true") {
    btn.style.display = "block";
  } else {
    // 👉 fallback: entra direto
    window.location.href = "index.html";
  }
};

// 👉 botão
btn.onclick = async () => {

  // tenta instalar
  if (deferredPrompt) {
    deferredPrompt.prompt();

    const escolha = await deferredPrompt.userChoice;

    if (escolha.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
    }

    deferredPrompt = null;
  }

  // SEMPRE entra na app
  window.location.href = "index.html";
};

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
  logo.onclick = async () => {

  if (deferredPrompt) {
    deferredPrompt.prompt();

    const escolha = await deferredPrompt.userChoice;

    if (escolha.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
    }

    deferredPrompt = null;
  }

  // 👉 entra sempre na app
  window.location.href = "index.html";
};
</script>

</body>
</html>
