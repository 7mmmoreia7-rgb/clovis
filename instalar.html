<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>App</title>

<link rel="manifest" href="/manifest.json">

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  body {background: url("https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/isto.png") center/cover no-repeat;

}

/* 🎬 VÍDEO */
#video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: transparent;
}

/* ▶️ PLAY */
#play {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 140px;
  cursor: pointer;
  z-index: 10;
}

/* 🟡 CLICK FINAL (instalação) */
#installZone {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: none;
  background: transparent;
}
</style>
</head>

<body>

<!-- 🎬 VÍDEO (a tua instalação está DENTRO do vídeo) -->
<video id="video" playsinline preload="auto" muted>
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/instalar.mp4">
</video>

<!-- ▶️ PLAY -->
<img id="play"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/play.png">

<!-- 🟡 ZONA CLICÁVEL FINAL -->
<div id="installZone"></div>

<script>
if (localStorage.getItem("app_instalada") === "true") {
  window.location.href = "index.html";
}  
const isStandalone =
  window.matchMedia('(display-mode: standalone)').matches ||
  window.navigator.standalone === true;

// 👉 se já está instalada → vai direto à app
if (isStandalone) {
  window.location.href = "index.html";
}

// 👉 estado da instalação
let deferredPrompt = null;
let installAvailable = false;

// 👉 captura do install prompt
  
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installAvailable = true;
});
async function tryInstall() {

  if (deferredPrompt) {
    deferredPrompt.prompt();

    const choice = await deferredPrompt.userChoice;

    if (choice.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
    }

    deferredPrompt = null;
    return;
  }

  showFallbackInstall();
}
  function showFallbackInstall() {

  const fallback = document.createElement("div");

  fallback.innerHTML = `
    <div style="
      position:fixed;
      inset:0;
      background:black;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      font-family:sans-serif;
      z-index:9999;
      padding:20px;
    ">
      <h2>Instalar App</h2>
      <p>Se não apareceu automaticamente:</p>
      <p><b>Chrome → ⋮ → “Adicionar ao ecrã inicial”</b></p>
      <p>ou “Instalar app” no menu do browser</p>
    </div>
  `;

  document.body.appendChild(fallback);
}
const video = document.getElementById("video");
  // 🔥 força primeiro frame (adeus flash preto)
video.addEventListener("loadeddata", () => {
  video.currentTime = 0.01;
});
const play = document.getElementById("play");
const installZone = document.getElementById("installZone");

// ▶️ play → inicia vídeo
play.onclick = async () => {
  play.style.display = "none";

  video.muted = false; // 🔊 DEVOLVE O SOM

  await video.play().catch(() => {});
};

// 🎬 fim do vídeo → ativa clique
video.onended = () => {
  installZone.onclick = tryInstall;
  installZone.style.display = "block";
};

// 🟡 clique → instalação + app
installZone.onclick = async () => {

  if (deferredPrompt) {
    deferredPrompt.prompt();

    const choice = await deferredPrompt.userChoice;

    if (choice.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
    }

    deferredPrompt = null;
  }

  window.location.href = "index.html";
};

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

</script>

</body>
</html>
