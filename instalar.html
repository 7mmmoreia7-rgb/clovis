<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Instalação</title>

<link rel="manifest" href="/manifest.json">

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
}

#video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

#btn {
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  display:none;
  cursor:pointer;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline>
  <source src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/instalar.mp4">
</video>

<img id="btn"
src="https://pub-4f2a2814e5924e32b4d88e68fc0f96d1.r2.dev/comuns/pronto-j-est-acho-eu.png">

<script>
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

const video = document.getElementById("video");
const btn = document.getElementById("btn");

// 👉 se já instalou → salta tudo
if (localStorage.getItem("app_instalada") === "true") {
  window.location.href = "index.html";
}

// 👉 quando vídeo acaba → mostra botão
video.onended = () => {
  btn.style.display = "block";
};

// 👉 botão
btn.onclick = async () => {

  // tenta instalar
  if (deferredPrompt) {
    deferredPrompt.prompt();

    const escolha = await deferredPrompt.userChoice;

    if (escolha.outcome === "accepted") {
      localStorage.setItem("app_instalada", "true");
    }

    deferredPrompt = null;
  }

  // SEMPRE entra na app
  window.location.href = "index.html";
};

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
